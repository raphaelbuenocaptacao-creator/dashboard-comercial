button,input,select,textarea{font:inherit}button{cursor:pointer}h1,h2,h3{margin:0}.mut{color:var(--mut)}.hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;padding:22px}.loginCard{width:min(590px,100%);background:linear-gradient(180deg,#10203be8,#08111fe8);border:1px solid #2b4568;border-radius:32px;padding:30px;box-shadow:0 35px 110px #000b;backdrop-filter:blur(18px)}

label{display:block;font-size:12px;text-transform:uppercase;color:#cbd5e1;font-weight:900;margin:10px 0 7px}
input,select,textarea{width:100%;background:#050b16;border:1px solid var(--line);border-radius:16px;color:var(--txt);padding:13px;outline:none}textarea{min-height:90px}
.btn{border:1px solid var(--line);background:#0d1729;color:#fff;border-radius:14px;padding:11px 14px;font-weight:900}.btn.gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#061120;border:0}.btn.green{background:#12351f;color:#bbf7d0}.btn.red{background:#3b1018;color:#fecaca}.btn.full{width:100%}
.app{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#06101d,#07172b);border-right:1px solid #17263d;padding:18px 14px;display:flex;flex-direction:column;gap:14px}
.brand{display:flex;gap:12px;align-items:center}.brand .logo{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,var(--gold),var(--pink),var(--blue));display:grid;place-items:center;font-size:30px;box-shadow:0 0 42px #c084fc55}.brand b{font-size:18px;text-transform:uppercase;line-height:1.05}
.nav{display:flex;flex-direction:column;gap:7px;overflow:auto}.nav button{background:transparent;border:0;text-align:left;color:#e5edf8;padding:11px 12px;border-radius:13px;font-weight:900}.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--gold),var(--orange));color:#061120;box-shadow:0 10px 30px #f9731644}

.main{padding:18px 22px 32px;min-width:0}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;background:rgba(5,11,22,.46);border:1px solid rgba(56,189,248,.13);border-radius:20px;padding:12px 14px}.actions{display:flex;gap:8px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px}.card{background:linear-gradient(180deg,rgba(17,31,55,.95),rgba(8,16,31,.95));border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden;backdrop-filter:blur(15px)}.pad{padding:16px}

table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid #1f314b;text-align:left;white-space:nowrap}th{font-size:11px;color:#8ec5ff;text-transform:uppercase}tr:hover{background:#12213a}.tableWrap{overflow:auto}.pill{display:inline-flex;gap:6px;padding:5px 9px;border:1px solid var(--line);border-radius:999px;color:#dbeafe;font-size:12px;font-weight:800}
.command{position:relative;min-height:520px;background:radial-gradient(circle at center,#0c2344 0,#071426 45%,#050914 100%)}.aiCore{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:170px;height:170px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,#38bdf8,#7c3aed 58%,#091527 60%);box-shadow:0 0 70px #38bdf888,0 0 120px #a855f755;font-size:56px;animation:pulse 2.2s infinite}.aiCore small{position:absolute;bottom:32px;font-size:12px;font-weight:900}

.post,.story{border-bottom:1px solid var(--line);padding:14px}.post{display:flex;gap:12px}.storyRow{display:flex;gap:12px;overflow:auto}.story{min-width:105px;text-align:center;border:0}.story .circle{width:82px;height:82px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--gold),var(--pink),var(--blue));margin:auto}.story .circle div{height:100%;border-radius:50%;background:#07111f;display:grid;place-items:center;font-size:28px}
.avatar{width:76px;height:76px;border-radius:26px;background:linear-gradient(135deg,var(--gold),var(--pink),var(--blue));display:grid;place-items:center;font-size:30px;font-weight:1000;color:#061120;box-shadow:0 0 28px #ec489944}.photoMini{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--purple));display:inline-grid;place-items:center;margin-right:8px;font-weight:1000;color:#061120}
.formgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.formgrid .wide{grid-column:span 2}.formgrid .full{grid-column:span 6}.calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}.calDay{min-height:92px;border:1px solid var(--line);border-radius:14px;background:#0b172b;color:#fff;text-align:left;padding:10px;font-weight:900}.calDay span,.calDay small{display:block;color:#9fb2ca;margin-top:5px}
.coin{background:linear-gradient(135deg,#fbbf24,#f97316);color:#061120;border-radius:999px;padding:4px 9px;font-weight:1000}.versionFooter{margin-top:22px;border:1px solid rgba(56,189,248,.18);background:linear-gradient(90deg,rgba(5,11,22,.9),rgba(17,24,39,.7));border-radius:18px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;color:#cbd5e1}.versionFooter b{color:#fff}
@media(max-width:1100px){.app{display:block}.side{position:relative;height:auto;border-right:0;padding:18px 24px}.brand .logo{width:72px;height:72px;border-radius:24px;font-size:38px}.brand b{font-size:24px}.nav{display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow:visible}.nav button{font-size:21px;line-height:1.08;padding:16px;min-height:70px}.main{padding:22px}.top{align-items:flex-start;flex-direction:column}.top h2{font-size:34px}.grid{grid-template-columns:1fr}.span3,.span4,.span5,.span6,.span7,.span8,.span12,.kpi{grid-column:span 1!important}.formgrid{grid-template-columns:1fr}.formgrid .wide,.formgrid .full{grid-column:span 1}.btn,input,select,textarea{font-size:20px;padding:18px;border-radius:20px}.card{border-radius:26px}.pad{padding:22px}.section{font-size:24px}.big{font-size:40px}.command{min-height:760px}.portal{position:relative!important;left:auto!important;right:auto!important;top:auto!important;bottom:auto!important;transform:none!important;width:100%;margin:10px 0}.aiCore{position:relative;left:auto;top:auto;transform:none;margin:20px auto}.calendarGrid{grid-template-columns:repeat(2,1fr)}}

function norm(s){return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

async function login(email){email=String(email||'').trim().toLowerCase(); if(!email)return alert('Digite seu e-mail'); try{if(supa){let {data,error}=await supa.from('acessos').select('*').eq('email',email).eq('aprovado',true).maybeSingle(); if(error)throw error; if(data){state.user={email,nome:data.nome||email,perfil:email===CEO_EMAIL?'CEO':(data.funcao||data.perfil||'PROFISSIONAL'),empresa:data.empresa||'',cpf:data.cpf||''}; localStorage.setItem('sx_user',JSON.stringify(state.user)); await loadAll(); renderApp();return}}} if(email===CEO_EMAIL){state.user={email,nome:'Raphael Bueno',perfil:'CEO',empresa:'SX',cpf:''};localStorage.setItem('sx_user',JSON.stringify(state.user));await loadAll();renderApp();return} alert('E-mail não aprovado. Solicite acesso.')}catch(e){alert('Erro no login: '+e.message)}}

function renderLogin(){root.innerHTML=`<div class="login"><div class="loginCard"><div class="logoBig">🧠</div><br><h1>SX Pulse</h1><h3>Controle de Resultado Local</h3><p class="mut">Centro de Comando IA + CRM + Rede Social + Banco SX Coin</p><label>E-mail aprovado</label><input id="email" placeholder="seuemail@gmail.com"><br><br><button class="btn gold full" onclick="login(email.value)">Entrar</button><hr style="border-color:#203653;margin:24px 0"><h3>Solicitar acesso</h3><label>Nome completo</label><input id="reqNome"><label>CPF</label><input id="reqCpf"><label>E-mail</label><input id="reqEmail"><label>Equipe/Empresa</label><input id="reqEmpresa" placeholder="PARK ou EXTERNA"><label>Função</label><select id="reqFuncao"><option>Promotor</option><option>Liner</option><option>Closer</option><option>Gestor</option></select><br><button class="btn full" onclick="solicitar()">Enviar solicitação</button></div></div>`}
function shell(content,title='SX Pulse',sub='Controle de Resultado Local'){root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">🪙</div><div><b>SX Pulse</b><div class="mut">Controle de Resultado Local</div></div></div><nav class="nav">${navBtn('comando','🧠 Comando IA')}${navBtn('executivo','📊 Executivo')}${navBtn('meu','👤 Meu Painel')}${navBtn('pulse','📱 SX Pulse')}${navBtn('banco','🪙 Banco SX')}${navBtn('hall','🏆 Hall da Fama')}${navBtn('agenda','📒 Agenda')}${navBtn('bordero','💰 Borderô')}${navBtn('pontos','📍 Pontos')}${navBtn('relatorios','📈 Relatórios')}${navBtn('ceo','👑 Central CEO')}</nav><div class="profile"><div class="profileAvatar">${initials(state.user?.nome||'SX')}</div><b>${state.user?.nome||''}</b><p class="mut">${state.user?.perfil||'Profissional'} • ${state.user?.empresa||'SX'}</p><button class="btn full" onclick="localStorage.removeItem('sx_user');state.user=null;renderLogin()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${title}</h2><div class="mut">${sub}</div></div><div class="actions"><span class="pill">🟢 Online</span><span class="pill">👑 ${isCEO()?'CEO':'Acesso aprovado'}</span><span class="pill">Versão ${APP_VERSION}</span></div></div>${content}<footer class="versionFooter"><b>SX Pulse — Controle de Resultado Local</b><span>Versão ${APP_VERSION} • Campos do Jordão • Sistema Online</span></footer></main></div>`}

function myName(){return state.user?.nome||'Profissional SX'}
function viewMeu(){const name=myName();shell(`<div class="grid"><div class="card pad span4"><div class="avatar">${initials(name)}</div><h2>${name}</h2><p class="mut">Área Individual • Acesso por Nome + CPF</p><span class="pill">🥇 Ouro SX</span> <span class="pill">🪙 ${calcCoins(name)} SX Coins</span></div><div class="card pad span8"><h3>Meu Pulsador</h3><div class="grid">${kpi('Casais',0)}${kpi('Vendas',0)}${kpi('VGV',money(0))}${kpi('Comissão 1%',money(0))}${kpi('Meta', '0/22')}${kpi('Eficiência','0%')}</div></div><div class="card pad span6"><h3>📒 Minha Agenda</h3>${formAgenda()}${tableAgenda(true)}</div><div class="card pad span6"><h3>💰 Meu Borderô</h3>${tableBordero(true)}</div></div>`,'Meu Painel Individual','Privado para o profissional')}
function viewPulse(){shell(`<div class="grid"><div class="card pad span12"><h3>⚡ Stories SX</h3><div class="storyRow">${['Meta do Dia','Top VGV','PARK','EXTERNA','Desafio','Hall'].map(s=>`<div class="story"><div class="circle"><div>${s[0]}</div></div><b>${s}</b></div>`).join('')}</div></div><div class="card pad span5"><h3>Novo Post</h3><label>Mensagem</label><textarea id="postTxt" placeholder="Publique uma meta, venda, conquista..."></textarea><label>Tipo</label><select id="postTipo"><option>Post</option><option>Conquista</option><option>Venda</option><option>Aviso</option></select><br><button class="btn gold" onclick="savePost()">Publicar no SX Pulse</button></div><div class="card span7"><div class="pad"><h3>Feed SX Pulse</h3></div><div id="feedList">${renderPosts()}</div></div></div>`,'SX Pulse','Rede social interna da operação')}
function renderPosts(){let posts=state.posts.length?state.posts:[{autor:'Raphael Bueno',conteudo:'🚀 Bem-vindos ao SX Pulse. Nossa nova plataforma oficial de resultado, metas, ranking, SX Coin e comunicação.',tipo:'Aviso',likes:31},{autor:'IA SX',conteudo:'🏆 Conquista desbloqueada: Meta Maio batida em VGV.',tipo:'Conquista',likes:18}];return posts.map(p=>`<div class="post"><div class="photoMini">${initials(p.autor||p.nome||'SX')}</div><div><b>${p.autor||p.nome||'SX Pulse'}</b> <span class="pill">${p.tipo||'Post'}</span><p>${p.conteudo||p.texto||''}</p><span>❤️ ${p.likes||0}</span> <span>💬 0</span> <span>🔥 Reagir</span></div></div>`).join('')}
async function savePost(){let conteudo=postTxt.value,tipo=postTipo.value;if(!conteudo)return;let row={autor:state.user.nome,email:state.user.email,conteudo,tipo,likes:0};try{if(supa)await supa.from('sx_posts').insert(row);state.posts.unshift(row);viewPulse()}catch(e){alert('Post salvo localmente. SQL/Permissão pode estar pendente.');state.posts.unshift(row);viewPulse()}}
function viewBanco(){shell(`<div class="grid"><div class="card pad span4"><h3>🏦 Banco SX</h3><div class="big"><span class="coin">🪙 ${calcCoins(myName())}</span></div><p class="mut">Seu resultado vale mais.</p></div><div class="card pad span8"><h3>Como ganhar SX Coin</h3><table><tr><th>Ação</th><th>Moedas</th></tr><tr><td>Casal</td><td>10</td></tr><tr><td>Venda</td><td>100</td></tr><tr><td>Meta batida</td><td>500</td></tr><tr><td>Top 1</td><td>1000</td></tr><tr><td>Desafio</td><td>100 a 1000</td></tr></table></div><div class="card pad span12"><h3>🛒 Loja SX</h3><table><tr><th>Prêmio</th><th>Custo</th><th>Ação</th></tr>${['Café especial|100','Vale R$20|500','Vale R$50|1000','Vale R$100|2000','Day Off|5000','Jantar|10000','Final de Semana|20000'].map(x=>{let[a,b]=x.split('|');return `<tr><td>${a}</td><td>🪙 ${b}</td><td><button class="btn">Solicitar resgate</button></td></tr>`}).join('')}</table></div></div>`,'Banco SX Coin','Moeda interna e recompensas')}
function calcCoins(nome){return 0}
function viewHall(){shell(`<div class="grid"><div class="card pad span12"><h3>🏆 Hall da Fama SX</h3><p class="mut">Histórico permanente por mês.</p></div>${['🥇 Top VGV - André Carriço','🥇 Top Casais - Ana Caroline','🥇 Top Vendas - Adriano Moreira','🪙 Top SX Coin - Pedro Henrique','🔥 Capitão da Semana - A definir'].map(x=>`<div class="card pad span4"><div class="avatar">${x[0]}</div><h3>${x}</h3><p class="mut">Maio 2026</p></div>`).join('')}</div>`,'Hall da Fama SX','Reconhecimento e legado')}
function formAgenda(){return `<label>Nome do casal</label><input id="agCasal"><label>Telefone</label><input id="agTel"><label>Retorno</label><input id="agRet" type="date"><label>Observação</label><textarea id="agObs"></textarea><button class="btn gold" onclick="saveAgenda()">Salvar anotação</button>`}
async function saveAgenda(){let row={profissional:state.user.nome,email:state.user.email,casal:agCasal.value,telefone:agTel.value,retorno:agRet.value,observacao:agObs.value,status:'ABERTO'};try{if(supa)await supa.from('agenda_privada').insert(row);state.agenda.unshift(row);viewAgenda()}catch(e){alert('Agenda salva localmente. SQL/Permissão pode estar pendente.');state.agenda.unshift(row);viewAgenda()}}
function tableAgenda(onlyMine=false){let rows=(onlyMine?state.agenda.filter(a=>a.email===state.user.email):state.agenda); if(!rows.length)return '<p class="mut">Nenhuma anotação ainda.</p>';return `<table><tr><th>Casal</th><th>Retorno</th><th>Status</th></tr>${rows.map(a=>`<tr><td>${a.casal}</td><td>${a.retorno||''}</td><td>${a.status||'ABERTO'}</td></tr>`).join('')}</table>`}
function viewAgenda(){shell(`<div class="grid"><div class="card pad span5"><h3>Nova anotação privada</h3>${formAgenda()}</div><div class="card pad span7"><h3>Minha Agenda</h3>${tableAgenda(!isGestor())}</div></div>`,'Agenda Inteligente','CRM pessoal de casais e follow-up')}
function viewBordero(){shell(`<div class="grid"><div class="card pad span5"><h3>Lançar Borderô</h3><label>Cliente/Casal</label><input id="boCliente"><label>Consultor</label><input id="boConsultor"><label>VGV vendido</label><input id="boVgv" type="number" oninput="calcBo()"><label>Entrada</label><input id="boEntrada" type="number"><label>Forma</label><select id="boForma" onchange="calcBo()"><option>PIX</option><option>Cartão de Crédito</option></select><p id="boPrev" class="goldtxt">Comissão: R$ 0,00</p><button class="btn gold" onclick="saveBordero()">Salvar Borderô</button></div><div class="card pad span7"><h3>Borderôs</h3>${tableBordero(!isGestor())}</div></div>`,'Borderô Inteligente','Comissão 1% sobre VGV vendido')}
function calcBo(){let v=Number(boVgv.value||0),c=v*0.01,forma=boForma.value;boPrev.innerHTML=`Comissão 1%: <b>${money(c)}</b><br>Pagamento: ${forma==='PIX'?'próximo dia 25':'60 dias após crédito'}`}
async function saveBordero(){let v=Number(boVgv.value||0);let row={profissional:state.user.nome,email:state.user.email,cliente:boCliente.value,consultor:boConsultor.value,valor_cota:v,entrada:Number(boEntrada.value||0),forma_pagamento:boForma.value,comissao:v*0.01,status:'PENDENTE'};try{if(supa)await supa.from('bordero').insert(row);state.bordero.unshift(row);viewBordero()}catch(e){alert('Borderô salvo localmente. SQL/Permissão pode estar pendente.');state.bordero.unshift(row);viewBordero()}}
function tableBordero(onlyMine=false){let rows=(onlyMine?state.bordero.filter(b=>b.email===state.user.email||b.profissional===state.user.nome):state.bordero); if(!rows.length)return '<p class="mut">Nenhum borderô ainda.</p>';return `<table><tr><th>Cliente</th><th>VGV</th><th>Comissão</th><th>Forma</th><th>Status</th></tr>${rows.map(b=>`<tr><td>${b.cliente||b.casal||''}</td><td>${money(b.valor_cota||b.valor_venda||0)}</td><td>${money(b.comissao||((b.valor_cota||0)*.01))}</td><td>${b.forma_pagamento||''}</td><td>${b.status||'PENDENTE'}</td></tr>`).join('')}</table>`}
function viewPontos(){shell(`<div class="grid"><div class="card pad span12"><h3>📍 Pontos de Captação</h3><p class="mut">Duplicados por responsável para saber se foi Raphael ou Francisco.</p></div>${PONTOS.map((p,i)=>`<div class="card pad span3"><h3>${p}</h3><p class="mut">Casais: ${i%5}</p><p>Vendas: ${i%3}</p><p>VGV: ${money((i%4)*87000)}</p></div>`).join('')}</div>`,'Mapa de Captação','Ranking por ponto e responsável')}
function viewRelatorios(){shell(`<div class="grid"><div class="card pad span12"><h3>Relatórios Premium</h3><p>Executivo, Equipes, Individual, Pontos, Financeiro, Banco SX, Social, Hall da Fama e IA SX.</p></div>${['Comparativo mensal','Previsão de meta','Ranking por horário','Ranking por dia','Funil casal → venda','Comissões a pagar','SX Coins distribuídas','Engajamento SX Pulse','Pontos mais fortes','Inativos histórico'].map(x=>`<div class="card pad span4"><h3>${x}</h3><div class="bar"><i style="width:${40+Math.random()*50}%"></i></div><p class="mut">Relatório disponível no painel CEO.</p></div>`).join('')}</div>`,'Relatórios IA SX','Todos os relatórios possíveis')}
function viewCEO(){if(!isGestor())return shell('<div class="card pad"><h2>Acesso restrito ao CEO/Gestores.</h2></div>','Central CEO','Restrito');shell(`<div class="grid"><div class="card pad span12"><h3>👑 Central CEO</h3><p>Você controla metas, pessoas, gestores, SX Coin, loja, mural, pontos, feed, stories e permissões sem mexer no GitHub.</p></div><div class="card pad span6"><h3>Gestão de Pessoas</h3><table><tr><th>Nome</th><th>Equipe</th><th>Status</th><th>Ação</th></tr>${state.profissionais.map(p=>`<tr><td>${p.nome}</td><td>${p.equipe}</td><td>${p.status}</td><td><button class="btn" onclick="togglePessoa('${p.nome}')">${p.status==='ATIVO'?'Inativar':'Ativar'}</button></td></tr>`).join('')}</table></div><div class="card pad span6"><h3>Configurações SX Coin</h3><label>Moedas por casal</label><input value="${state.config.coinCasal}"><label>Moedas por venda</label><input value="${state.config.coinVenda}"><label>Comissão % VGV</label><input value="${state.config.comissao}"><button class="btn gold">Salvar configurações</button><hr><h3>Metas</h3><p>Maio: 590 casais / 118 vendas / ${money(10030000)}</p><p>Junho: 720 casais / 180 vendas / ${money(15000000)}</p></div><div class="card pad span12"><h3>Aprovações</h3><p class="mut">Aprovação continua pela tabela acessos, e esta área está preparada para puxar solicitações do Supabase.</p></div></div>`,'Central CEO','Sala de controle do dono')}
function togglePessoa(nome){let p=state.profissionais.find(x=>x.nome===nome);if(p)p.status=p.status==='ATIVO'?'INATIVO':'ATIVO';viewCEO()}
(async function init(){let saved=localStorage.getItem('sx_user');if(saved){state.user=JSON.parse(saved);await loadAll();renderApp()}else renderLogin()})()
</script></body></html>
