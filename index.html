function equipes(c){c.innerHTML=`<div class="grid"><div class="card panel span12"><h2>📣 Promotores de Marketing</h2>${rankTable(sortBy(aggregate('promotor'),'vgv'))}</div><div class="card panel span6"><h2>🧭 Liners</h2>${rankTable(sortBy(aggregate('liner'),'vendas'))}</div><div class="card panel span6"><h2>🤝 Closers / Fechadores</h2>${rankTable(sortBy(aggregate('closer'),'vendas'))}</div><div class="card panel span12"><h2>📍 Locais de Captação</h2>${rankTable(sortBy(aggregate('local'),'vendas'))}</div></div>`}
function detalhes(c){let rows=DB.records;c.innerHTML=`<div class="card panel"><h2>Detalhes da base</h2><input id="q" placeholder="Pesquisar nome, cliente, closer, liner, local..." oninput="filterDetails()"><div id="detailTable"></div></div>`;window._details=rows;filterDetails()}
function filterDetails(){let q=norm($('#q')?.value||''),rows=(window._details||DB.records).filter(r=>!q||norm(Object.values(r).join(' ')).includes(q));$('#detailTable').innerHTML=`<table><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Valor</th><th>Venda</th><th>Q/NQ</th><th>Local</th><th>Closer</th><th>Liner</th></tr></thead><tbody>${rows.slice(0,300).map(r=>`<tr><td>${r.dataHora}</td><td><button class="namebtn" onclick="openPerson('${r.promotor}')">${r.promotor}</button></td><td>${r.cliente}</td><td>${money(r.valor)}</td><td>${saleCount(r)||'—'}</td><td>${r.qualificacao}</td><td>${r.local}</td><td>${r.closer}</td><td>${r.liner}</td></tr>`).join('')}</tbody></table>`}
let chartObj=null;function barChart(id,labels,data,label){let ctx=document.getElementById(id);if(!ctx)return;if(chartObj)chartObj.destroy();chartObj=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label,data}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'}}}}})}
function openPerson(nome){let rows=DB.records.filter(r=>r.promotor===nome||r.closer===nome||r.liner===nome),p=aggregate('promotor').find(x=>x.nome===nome)||aggregate('closer').find(x=>x.nome===nome)||aggregate('liner').find(x=>x.nome===nome);if(!p)return alert('Não encontrado');modal.classList.add('show');let byDay={};rows.forEach(r=>byDay[r.data]=(byDay[r.data]||0)+(r.valor||0));modalBody.innerHTML=`<h1>🫀 Pulsador — ${nome}</h1><div class="grid"><div class="card kpi"><span class="pill">Casais</span><b>${p.casais}</b></div><div class="card kpi"><span class="pill">Vendas</span><b>${p.vendas}</b></div><div class="card kpi"><span class="pill">VGV</span><b>${money(p.vgv)}</b></div><div class="card kpi"><span class="pill">Eficiência</span><b>${pct(p.ef)}</b></div><div class="card panel span6"><h2>Meta</h2><h1>${goalBadge(p)}</h1><p>Meta 1: 22 casais = R$ 2.000 • Meta 2: 35 casais = R$ 2.500</p><div class="bar"><i style="width:${Math.min(100,p.casais/35*100)}%"></i></div></div><div class="card panel span6"><h2>Resumo</h2><p>Cancelamentos: <b>${p.cancel}</b></p><p>Q: <b>${p.q}</b> • NQ: <b>${p.nq}</b></p><p>Ticket médio: <b>${money(p.ticket)}</b></p></div><div class="card panel span12"><canvas id="personChart"></canvas></div><div class="card panel span12"><h2>Registros</h2><table><thead><tr><th>Data</th><th>Cliente</th><th>Valor</th><th>Venda</th><th>Status</th><th>Closer</th><th>Liner</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.dataHora}</td><td>${r.cliente}</td><td>${money(r.valor)}</td><td>${saleCount(r)||'—'}</td><td>${r.statusContrato}</td><td>${r.closer}</td><td>${r.liner}</td></tr>`).join('')}</tbody></table></div></div>`;setTimeout(()=>{let labs=Object.keys(byDay).sort();new Chart(document.getElementById('personChart'),{type:'line',data:{labels:labs,datasets:[{label:'VGV por dia',data:labs.map(d=>byDay[d])}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'}}}}})},50)}
screenLogin();</script></body></html>
