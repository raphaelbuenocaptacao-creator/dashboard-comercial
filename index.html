const $=s=>document.querySelector(s);const money=n=>(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});const pct=n=>`${(n||0).toFixed(1).replace('.',',')}%`;const norm=s=>(s||'').toString().trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');const initials=s=>norm(s).split(' ').slice(0,2).map(x=>x[0]).join('');

function seed(){if(!LS.get('goals')){let g={};DB.summary.forEach(p=>g[p.profissional]={casais:20,vendas:3,vgv:300000});LS.set('goals',g)} if(!LS.get('approved'))LS.set('approved',[]); if(!LS.get('pending'))LS.set('pending',[])} seed();
function aggregate(records=DB.records){const map={};records.forEach(r=>{const p=r.profissional;if(!map[p])map[p]={profissional:p,nome:title(p),casais:0,vendas:0,vgv:0,q:0,nq:0,locais:{},closers:{},liners:{},dias:{}};let m=map[p];m.casais++; if(r.venda)m.vendas++; m.vgv+=r.valor||0; if(r.qualificacao==='Q')m.q++; if(r.qualificacao==='NQ')m.nq++; m.locais[r.local]=(m.locais[r.local]||0)+1; m.closers[r.closer]=(m.closers[r.closer]||0)+1; m.liners[r.liner]=(m.liners[r.liner]||0)+1; if(r.dia)m.dias[r.dia]=(m.dias[r.dia]||0)+1;});return Object.values(map).map(x=>({...x,eficiencia:x.casais?x.vendas/x.casais*100:0}));}
function title(s){return norm(s).toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}
function kpis(rows=DB.records){let casais=rows.length,vendas=rows.filter(r=>r.venda).length,vgv=rows.reduce((a,r)=>a+(r.valor||0),0),prof=new Set(rows.map(r=>r.profissional)).size;return{casais,vendas,vgv,prof,ef:casais?vendas/casais*100:0}}
function screenLogin(){document.body.className='';app.innerHTML=`<div class="wrap"><div class="login card"><div class="brand"><div class="logo">🏆</div><div><h1 class="h1">Dashboard Comercial</h1><div class="sub">Acesso por e-mail com aprovação do gestor</div></div></div><div class="tabs" style="margin-top:18px"><button class="tab active" onclick="loginMode('entrar')">Entrar</button><button class="tab" onclick="loginMode('cadastro')">Solicitar acesso</button></div><div id="loginBox"></div><div class="notice" style="margin-top:14px"><b>Gestor:</b> use RAPHAEL ou seu e-mail + senha <b>GESTOR2026</b>. Profissionais entram apenas com e-mail aprovado.</div></div></div>`;loginMode('entrar')}
function loginMode(mode){document.querySelectorAll('.login .tab').forEach((b,i)=>b.classList.toggle('active',(mode==='entrar')=== (i===0))); const box=$('#loginBox'); if(mode==='entrar')box.innerHTML=`<label>E-mail autorizado</label><input id="email" placeholder="seu@email.com"><label>Senha do gestor (somente Raphael)</label><input id="pass" type="password" placeholder="Apenas para administrador"><button class="btn" style="width:100%;margin-top:14px" onclick="doLogin()">Entrar</button><div id="msg" class="small" style="margin-top:10px">Profissional aprovado entra somente com o e-mail.</div>`; else box.innerHTML=`<label>Nome completo</label><input id="rnome" placeholder="Ex: Ana Caroline"><label>E-mail</label><input id="remail" placeholder="seu@email.com"><label>Empresa que atua</label><input id="rempresa" placeholder="Ex: CSX / Campos do Jordão"><button class="btn green" style="width:100%;margin-top:14px" onclick="register()">Solicitar aprovação</button><div class="small" style="margin-top:10px">Nome, e-mail e empresa são obrigatórios para Raphael identificar quem solicitou. Depois de aprovado, o acesso será só pelo e-mail.</div>`}
function doLogin(){let email=norm($('#email').value), pass=$('#pass').value; if((email==='RAPHAEL'||email===norm(ADMIN_EMAIL))&&pass===ADMIN_PASS){state.user={role:'admin',nome:'Raphael',email:ADMIN_EMAIL};state.view='dash';render();return} let approved=LS.get('approved',[]);let u=approved.find(x=>norm(x.email)===email); if(!u){$('#msg').innerHTML='E-mail não aprovado ou ainda pendente. Solicite acesso e aguarde Raphael aprovar.';return} state.user={role:'prof',...u};state.view='dash';render()}
function register(){let nome=$('#rnome').value.trim(),email=$('#remail').value.trim(),empresa=$('#rempresa').value.trim(); if(!nome||!email||!empresa){alert('Preencha nome, e-mail e empresa.');return} let pending=LS.get('pending',[]); if(pending.some(x=>norm(x.email)===norm(email))){alert('Essa solicitação já está pendente.');return} pending.push({id:Date.now(),nome,email,empresa,date:new Date().toLocaleString('pt-BR')});LS.set('pending',pending);alert('Solicitação enviada. Aguarde aprovação do gestor.');loginMode('entrar')}
function header(){return `<div class="hero"><div class="brand"><div class="logo">🏆</div><div><h1 class="h1">Dashboard Comercial</h1><div class="sub">01 a 31 • VGV, Casais, Vendas e Eficiência</div></div></div><button class="btn secondary" onclick="logout()">Sair</button></div>`}
function logout(){state={view:'login',tab:'geral',user:null};render()}
function tabs(){let arr=state.user.role==='admin'?[['geral','Geral'],['ranking','Rankings'],['metas','Metas'],['acessos','Acessos'],['detalhes','Detalhes']]:[['meu','Meu resultado'],['detalhes','Meus casais']];return `<div class="tabs">${arr.map(x=>`<button class="tab ${state.tab===x[0]?'active':''}" onclick="state.tab='${x[0]}';render()">${x[1]}</button>`).join('')}</div>`}
function render(){if(state.view==='login')return screenLogin(); let content=state.user.role==='admin'?adminContent():profContent();app.innerHTML=`<div class="wrap">${header()}${tabs()}${content}<div class="mobileNav">${(state.user.role==='admin'?['geral','ranking','metas','acessos']:['meu','detalhes']).map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${t}</button>`).join('')}</div></div>`}
function adminContent(){if(state.tab==='ranking')return ranking(); if(state.tab==='metas')return metas(); if(state.tab==='acessos')return acessos(); if(state.tab==='detalhes')return detalhes(); return geral()}
function geral(){let k=kpis();let sum=aggregate().sort((a,b)=>b.vgv-a.vgv);let week=weeklyHighlight(),month=sum[0];return `<div class="grid kpi"><div class="kpiBox"><span class="tag">Casais</span><b>${k.casais}</b></div><div class="kpiBox"><span class="tag">Vendas</span><b>${k.vendas}</b></div><div class="kpiBox"><span class="tag">VGV</span><b>${money(k.vgv)}</b></div><div class="kpiBox"><span class="tag">Eficiência</span><b>${pct(k.ef)}</b></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h2 class="sectionTitle">🏅 Top 3 automático</h2>${topCards(sum.slice(0,3))}</div><div class="card"><h2 class="sectionTitle">🔥 Destaques</h2><div class="kpiBox"><span class="tag">Destaque do mês</span><b>${month.nome}</b><div class="small">${money(month.vgv)} • ${month.vendas} vendas • ${month.casais} casais</div></div><div class="kpiBox" style="margin-top:10px"><span class="tag">Destaque da semana</span><b>${week?week.nome:'Sem dados'}</b><div class="small">${week?money(week.vgv)+' • últimos 7 dias da base':''}</div></div></div></div><div class="card" style="margin-top:14px"><h2 class="sectionTitle">Ranking geral por VGV</h2>${rankTable(sum)}</div>`}
function topCards(arr){return `<div class="grid three">${arr.map((p,i)=>`<div class="kpiBox"><div class="medal">${['🥇','🥈','🥉'][i]}</div><b>${p.nome}</b><div class="small">${money(p.vgv)}</div><div class="bar"><span style="width:${Math.min(100,p.vgv/(arr[0].vgv||1)*100)}%"></span></div></div>`).join('')}</div>`}
function rankTable(rows){return `<table><thead><tr><th>#</th><th>Profissional</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th></tr></thead><tbody>${rows.map((p,i)=>`<tr><td>${i<3?['🥇','🥈','🥉'][i]:i+1}</td><td><div class="row"><div class="avatar">${initials(p.nome)}</div><b>${p.nome}</b></div></td><td>${p.casais}</td><td>${p.vendas}</td><td>${money(p.vgv)}</td><td>${pct(p.eficiencia)}</td></tr>`).join('')}</tbody></table>`}
function ranking(){let sum=aggregate();let by={VGV:[...sum].sort((a,b)=>b.vgv-a.vgv),Casais:[...sum].sort((a,b)=>b.casais-a.casais),Vendas:[...sum].sort((a,b)=>b.vendas-a.vendas),Eficiência:[...sum].sort((a,b)=>b.eficiencia-a.eficiencia)};return `<div class="grid two">${Object.entries(by).map(([n,r])=>`<div class="card"><h2 class="sectionTitle">Ranking ${n}</h2>${rankTable(r.slice(0,15))}</div>`).join('')}</div>`}
function weeklyHighlight(){let ds=DB.records.map(r=>r.data).filter(Boolean).sort();let max=ds[ds.length-1]; if(!max)return null;let end=new Date(max+'T00:00:00');let start=new Date(end);start.setDate(end.getDate()-6);let rows=DB.records.filter(r=>{let d=new Date(r.data+'T00:00:00');return d>=start&&d<=end});return aggregate(rows).sort((a,b)=>b.vgv-a.vgv)[0]}
function metas(){let goals=LS.get('goals',{}),sum=aggregate().sort((a,b)=>a.nome.localeCompare(b.nome));return `<div class="card"><h2 class="sectionTitle">📈 Metas individuais</h2><div class="small">Edite as metas e salve. Cada profissional verá o progresso no próprio acesso.</div><table><thead><tr><th>Profissional</th><th>Meta Casais</th><th>Meta Vendas</th><th>Meta VGV</th><th>Progresso</th></tr></thead><tbody>${sum.map(p=>{let g=goals[p.profissional]||{casais:20,vendas:3,vgv:300000};let prog=((p.casais/g.casais)+(p.vendas/g.vendas)+(p.vgv/g.vgv))/3*100;return `<tr><td><b>${p.nome}</b></td><td><input value="${g.casais}" onchange="saveGoal('${p.profissional}','casais',this.value)"></td><td><input value="${g.vendas}" onchange="saveGoal('${p.profissional}','vendas',this.value)"></td><td><input value="${g.vgv}" onchange="saveGoal('${p.profissional}','vgv',this.value)"></td><td><div class="progress"><span style="width:${Math.min(100,prog)}%"></span></div><span class="small">${pct(prog)}</span></td></tr>`}).join('')}</tbody></table></div>`}
function saveGoal(p,k,v){let goals=LS.get('goals',{});if(!goals[p])goals[p]={casais:20,vendas:3,vgv:300000};goals[p][k]=Number(v)||0;LS.set('goals',goals)}
function acessos(){let pending=LS.get('pending',[]),approved=LS.get('approved',[]);return `<div class="grid two"><div class="card"><h2 class="sectionTitle">⏳ Solicitações pendentes</h2>${pending.length?pending.map(x=>`<div class="kpiBox" style="margin-bottom:10px"><b>${x.nome}</b><div class="small">${x.email} • ${x.empresa} • ${x.date}</div><label>Vincular ao profissional</label><select id="prof_${x.id}">${DB.profissionais.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select><div style="display:flex;gap:8px;margin-top:10px"><button class="btn green" onclick="approve(${x.id})">Aprovar</button><button class="btn red" onclick="rejectReq(${x.id})">Rejeitar</button></div></div>`).join(''):'<div class="small">Nenhuma solicitação pendente.</div>'}</div><div class="card"><h2 class="sectionTitle">✅ E-mails aprovados</h2><table><thead><tr><th>Nome</th><th>Email</th><th>Empresa</th><th>Profissional</th><th></th></tr></thead><tbody>${approved.map(u=>`<tr><td>${u.nome}</td><td>${u.email}</td><td>${u.empresa}</td><td>${DB.profissionais.find(p=>p.id===u.profissional)?.nome||u.profissional}</td><td><button class="btn red" onclick="removeAccess('${u.email}')">Remover</button></td></tr>`).join('')}</tbody></table></div></div>`}
function approve(id){let pending=LS.get('pending',[]),approved=LS.get('approved',[]);let req=pending.find(x=>x.id===id);let prof=$('#prof_'+id).value;if(approved.some(x=>norm(x.email)===norm(req.email))){alert('Esse e-mail já está aprovado.');return}approved.push({...req,profissional:prof});pending=pending.filter(x=>x.id!==id);LS.set('pending',pending);LS.set('approved',approved);alert('Aprovado! A pessoa já pode entrar usando somente o e-mail.');render()}
function rejectReq(id){LS.set('pending',LS.get('pending',[]).filter(x=>x.id!==id));render()}function removeAccess(email){LS.set('approved',LS.get('approved',[]).filter(x=>x.email!==email));render()}
function detalhes(){let rows=DB.records; if(state.user?.role==='prof') rows=rows.filter(r=>r.profissional===state.user.profissional);return `<div class="card"><h2 class="sectionTitle">Detalhes dos casais</h2><table><thead><tr><th>Data</th><th>Profissional</th><th>Cliente</th><th>Valor</th><th>Status</th><th>Q/NQ</th><th>Local</th></tr></thead><tbody>${rows.slice().sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(r=>`<tr><td>${r.data}</td><td>${title(r.profissional)}</td><td>${r.cliente}</td><td>${money(r.valor)}</td><td>${r.venda?'VENDA':'-'}</td><td>${r.qualificacao}</td><td>${r.local}</td></tr>`).join('')}</tbody></table></div>`}
function profContent(){if(state.tab==='detalhes')return detalhes();let rows=DB.records.filter(r=>r.profissional===state.user.profissional),k=kpis(rows),p=aggregate(rows)[0]||{nome:state.user.nome,casais:0,vendas:0,vgv:0,eficiencia:0};let goals=LS.get('goals',{})[state.user.profissional]||{casais:20,vendas:3,vgv:300000};return `<div class="card"><div class="row"><div class="avatar">${initials(p.nome)}</div><div><h2 class="sectionTitle" style="margin:0">${p.nome}</h2><div class="small">${state.user.empresa}</div></div></div></div><div class="grid kpi" style="margin-top:14px"><div class="kpiBox"><span class="tag">Casais</span><b>${p.casais}</b><div class="progress"><span style="width:${Math.min(100,p.casais/goals.casais*100)}%"></span></div><div class="small">Meta ${goals.casais}</div></div><div class="kpiBox"><span class="tag">Vendas</span><b>${p.vendas}</b><div class="progress"><span style="width:${Math.min(100,p.vendas/goals.vendas*100)}%"></span></div><div class="small">Meta ${goals.vendas}</div></div><div class="kpiBox"><span class="tag">VGV</span><b>${money(p.vgv)}</b><div class="progress"><span style="width:${Math.min(100,p.vgv/goals.vgv*100)}%"></span></div><div class="small">Meta ${money(goals.vgv)}</div></div><div class="kpiBox"><span class="tag">Eficiência</span><b>${pct(p.eficiencia)}</b></div></div><div class="card" style="margin-top:14px"><h2 class="sectionTitle">Meus últimos atendimentos</h2>${detalhes()}</div>`}
render();
</script>
</body>
</html>
