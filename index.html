function norm(s){return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toUpperCase()}
function title(s){return String(s||"").toLowerCase().replace(/(^|\s)\S/g,t=>t.toUpperCase()).replace(" Da "," da ").replace(" De "," de ").replace(" Dos "," dos ")}
function money(n){return (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0})}
function pct(n){return ((Number(n)||0)*100).toFixed(1).replace(".",",")+"%"}
function dateMonth(r){return String(r.data||"").slice(5,7)}
function statusParts(r){let s=norm(r.statusContrato); if(!s && r.venda) return ["ATIVO"]; if(!s && r.cancelado) return ["CANCELADO"]; return s.split("#").map(x=>x.trim()).filter(Boolean)}
function saleCount(r){let p=statusParts(r); let c=p.filter(x=>x.includes("ATIVO")||x.includes("CANCEL")).length; return c || (r.venda?1:0)}
function cancelCount(r){return statusParts(r).filter(x=>x.includes("CANCEL")).length}
const teamBase={}; TEAM_ROWS.forEach(([n,st,eq])=>teamBase[norm(n)]={nome:title(n),status:st,equipe:eq.toUpperCase()});
function canonical(n){let k=norm(n); return ALIASES[k]||k}
function displayName(n){let k=canonical(n); if(teamBase[k]) return teamBase[k].nome; let raw=String(n||"").replace(/\s+/g," ").trim(); return title(raw||"Sem Nome")}
function teamOf(n){let k=canonical(n); return teamBase[k]?.equipe||"SEM EQUIPE"}

function aggregate(arr,field="promotor"){let m={}; arr.forEach(r=>{let nome=r[field]||""; if(!nome) return; let key=field==="promotor"?canonical(nome):norm(nome); let label=field==="promotor"?displayName(nome):title(nome); if(!m[key]) m[key]={key,nome:label,casais:0,vendas:0,cancel:0,vgv:0,q:0,nq:0,team:field==="promotor"?teamOf(nome):"",rows:[]}; m[key].casais++; m[key].vendas+=saleCount(r); m[key].cancel+=cancelCount(r); m[key].vgv+=Number(r.valor)||0; if(norm(r.qualificacao)==="Q")m[key].q++; if(norm(r.qualificacao)==="NQ")m[key].nq++; m[key].rows.push(r);}); return Object.values(m).map(x=>({...x,ef:x.casais?x.vendas/x.casais:0,meta:x.casais>=35?2500:x.casais>=22?2000:0}))}

function teamBadge(t){return t?.includes("PARK")&&t?.includes("EXTERNA")?`<span class="teamPE">PARK/EXTERNA</span>`:t?.includes("PARK")?`<span class="teamP">PARK</span>`:t?.includes("EXTERNA")?`<span class="teamE">EXTERNA</span>`:`<span class="mini">—</span>`}
function metaBadge(x){return x.casais>=35?`🏆 R$ 2.500`:x.casais>=22?`🥈 R$ 2.000`:`Faltam ${Math.max(22-x.casais,0)}`}
function pulsador(){let arr=selectedRecords(); let all=[...aggregate(arr,"promotor"),...aggregate(arr,"liner"),...aggregate(arr,"closer")].filter(x=>x.nome&&x.nome!=="Sem Nome"); let names=[...new Map(all.map(x=>[x.key,x])).values()].sort((a,b)=>a.nome.localeCompare(b.nome)); let current=state.person?names.find(x=>norm(x.nome).includes(norm(state.person)))||names[0]:names[0]; setTimeout(()=>current&&drawPerson(current.key),20); return nav()+`<div class="card panel"><div class="sectionTitle"><h2>👤 Pulsador Individual Completo</h2><span class="pill">Promotor • Liner • Closer</span></div><div class="searchrow"><select onchange="state.person=this.value;render()">${names.map(n=>`<option value="${n.nome}" ${current&&n.key===current.key?"selected":""}>${n.nome}</option>`).join("")}</select><button onclick="state.sort='vgv';state.view='rankings';render()">Ver Ranking VGV</button><button onclick="state.az=true;state.view='rankings';render()">Ver A-Z</button><button class="primary" onclick="openPerson('${current?.key||""}')">Abrir ficha grande</button></div>${current?personBlock(current.key):"<div class='empty'>Sem nomes.</div>"}</div>`}
function personData(key){let arr=selectedRecords(); let pro=aggregate(arr.filter(r=>canonical(r.promotor)===key),"promotor")[0]||{nome:teamBase[key]?.nome||key,casais:0,vendas:0,cancel:0,vgv:0,ef:0,rows:[],team:teamBase[key]?.equipe||""}; let lin=aggregate(arr.filter(r=>norm(r.liner)===key),"liner")[0]||{casais:0,vendas:0,cancel:0,vgv:0,ef:0,rows:[]}; let clo=aggregate(arr.filter(r=>norm(r.closer)===key),"closer")[0]||{casais:0,vendas:0,cancel:0,vgv:0,ef:0,rows:[]}; return {pro,lin,clo,nome:pro.nome||lin.nome||clo.nome||key}}
function personBlock(key){let d=personData(key), x=d.pro; return `<div class="grid"><div class="card panel span4"><div class="profileTop"><div class="avatar">${(d.nome||"?").split(" ").map(x=>x[0]).slice(0,2).join("")}</div><div><h2>${d.nome}</h2><p>${teamBadge(x.team)} • ${statusOf(d.nome)}</p></div></div><hr style="border-color:#22344f"><p>Meta promotor: 22 casais = R$ 2.000 • 35 casais = R$ 2.500</p>${goalCard("Meta 22 casais",x.casais,22,n=>n+" casais")}${goalCard("Meta 35 casais",x.casais,35,n=>n+" casais")}</div><div class="card panel span8"><h2>📊 Resultado como Promotor</h2>${kpiGrid({casais:x.casais,vendas:x.vendas,vgv:x.vgv,ef:x.ef})}<canvas id="chartPerson"></canvas></div><div class="card panel span6"><h2>📞 Resultado como Liner</h2>${kpiGrid({casais:d.lin.casais,vendas:d.lin.vendas,vgv:d.lin.vgv,ef:d.lin.ef})}</div><div class="card panel span6"><h2>🤝 Resultado como Closer</h2>${kpiGrid({casais:d.clo.casais,vendas:d.clo.vendas,vgv:d.clo.vgv,ef:d.clo.ef})}</div><div class="card panel span12"><h2>Histórico</h2>${historyTable([...x.rows,...d.lin.rows,...d.clo.rows].slice(0,80))}</div></div>`}
function historyTable(rows){if(!rows.length)return `<div class="empty">Sem histórico.</div>`; return `<div style="overflow:auto"><table><thead><tr><th>Data</th><th>Cliente</th><th>Promotor</th><th>Liner</th><th>Closer</th><th>Status</th><th>Vendas</th><th>VGV</th></tr></thead><tbody>${rows.sort((a,b)=>String(a.data).localeCompare(String(b.data))).map(r=>`<tr><td>${r.dataHora||r.data}</td><td>${r.cliente||"-"}</td><td>${displayName(r.promotor)}</td><td>${title(r.liner)}</td><td>${title(r.closer)}</td><td>${r.statusContrato||"-"}</td><td>${saleCount(r)}</td><td>${money(r.valor)}</td></tr>`).join("")}</tbody></table></div>`}
function cancel(){let rows=selectedRecords().filter(r=>cancelCount(r)>0); let ag=aggregate(rows); return nav()+`<div class="grid"><div class="card panel span4"><h2>❌ Cancelamentos</h2>${kpiGrid(kpis(rows))}</div><div class="card panel span8"><h2>Ranking de Cancelamentos</h2>${table(sorted(ag,"cancel"),"promotor")}</div><div class="card panel span12"><h2>Lista completa</h2>${historyTable(rows)}</div></div>`}
function inativos(){let arr=selectedRecords(), ag=aggregate(arr), activeKeys=new Set(ag.map(x=>x.key)); let list=Object.entries(teamBase).filter(([k,v])=>v.status==="INATIVO"||!activeKeys.has(k)).map(([k,v])=>({key:k,nome:v.nome,status:v.status,equipe:v.equipe,casais:(ag.find(x=>x.key===k)||{}).casais||0})).sort((a,b)=>a.nome.localeCompare(b.nome)); return nav()+`<div class="card panel"><h2>📁 Inativos / Sem Produção no Período</h2><p>Aqui entram os marcados como inativos e também ativos sem resultado no filtro escolhido.</p><div style="overflow:auto"><table><thead><tr><th>Nome</th><th>Status</th><th>Equipe</th><th>Casais no período</th></tr></thead><tbody>${list.map(x=>`<tr><td>${x.nome}</td><td>${x.status}</td><td>${teamBadge(x.equipe)}</td><td>${x.casais}</td></tr>`).join("")}</tbody></table></div></div>`}
function junho(){return nav()+`<div class="grid"><div class="card panel span6"><h2>📅 Alimentar Junho</h2><p>Cole linhas no formato: Data | Promotor | Cliente | Valor | StatusContrato | Local | Liner | Closer | Qualificação</p><textarea id="pasteJune" placeholder="01/06/2026 | Ana Caroline | Cliente X | 87000 | ATIVO | Parque Dreams | Liner | Closer | Q"></textarea><div class="tabs"><button class="primary" onclick="importTextJune()">Importar texto</button><button onclick="clearJune()">Limpar Junho</button><input type="file" id="fileJune" accept=".xlsx,.xls,.csv" onchange="importExcelJune(event)"></div><div class="notice">Dica: para Excel, use colunas com nomes parecidos: data, promotor, cliente, valor, statusContrato, local, liner, closer, qualificacao.</div></div><div class="card panel span6"><h2>Resumo Junho</h2>${kpiGrid(kpis(june()))}<h2>Top Junho</h2>${table(sorted(aggregate(june()),"vgv").slice(0,10),"promotor")}</div></div>`}
function acessos(){let pending=LS.get("pendingAccess",[]), approved=LS.get("approvedAccess",[ADMIN_EMAIL]); return nav()+`<div class="grid"><div class="card panel span6"><h2>Solicitações Pendentes</h2>${pending.length?pending.map((p,i)=>`<div class="topcard" style="margin:10px 0"><b>${p.nome}</b><p>${p.email} • ${p.empresa}</p><button class="primary" onclick="approve(${i})">Aprovar</button> <button class="danger" onclick="reject(${i})">Recusar</button></div>`).join(""):"<div class='empty'>Sem pendentes.</div>"}</div><div class="card panel span6"><h2>Aprovados</h2>${approved.map(e=>`<p>✅ ${e}</p>`).join("")}</div></div>`}
function approve(i){let p=LS.get("pendingAccess",[]), a=LS.get("approvedAccess",[ADMIN_EMAIL]); a.push(p[i].email); p.splice(i,1); LS.set("pendingAccess",p); LS.set("approvedAccess",[...new Set(a)]); render()}
function reject(i){let p=LS.get("pendingAccess",[]); p.splice(i,1); LS.set("pendingAccess",p); render()}
function openPerson(key,role){if(!key)return; let html=personBlock(key); $("#modalBody").innerHTML=html; $("#modal").classList.add("show"); setTimeout(()=>drawPerson(key),50)}
function hideModal(){$("#modal").classList.remove("show")}
function drawMainCharts(arr,ag){chart("chartDaily","line",dailyData(arr,"casais"),"Casais por dia"); chart("chartTeams","doughnut",{labels:["PARK","EXTERNA","Sem equipe"],data:[arr.filter(r=>teamOf(r.promotor).includes("PARK")).length,arr.filter(r=>teamOf(r.promotor).includes("EXTERNA")).length,arr.filter(r=>teamOf(r.promotor)==="SEM EQUIPE").length]},"Casais")}
function drawTeamCompare(park,ext){chart("chartCompare","bar",{labels:["Casais","Vendas","VGV/100k","Cancelamentos"],data:[kpis(park).casais,kpis(park).vendas,kpis(park).vgv/100000,kpis(park).cancel],data2:[kpis(ext).casais,kpis(ext).vendas,kpis(ext).vgv/100000,kpis(ext).cancel]},"PARK","EXTERNA")}
function drawPerson(key){let rows=personData(key).pro.rows; chart("chartPerson","bar",dailyData(rows,"vendas"),"Vendas por dia")}
let charts={}; function chart(id,type,d,label,label2){let el=document.getElementById(id); if(!el)return; if(charts[id])charts[id].destroy(); let cfg={type,data:{labels:d.labels,datasets:[{label:label||"Resultado",data:d.data,borderWidth:2,tension:.35}]},options:{responsive:true,plugins:{legend:{labels:{color:"#e5e7eb"}}},scales:type==="doughnut"?{}:{x:{ticks:{color:"#cbd5e1"},grid:{color:"#1f2b44"}},y:{ticks:{color:"#cbd5e1"},grid:{color:"#1f2b44"}}}}}; if(d.data2)cfg.data.datasets.push({label:label2||"Comparativo",data:d.data2,borderWidth:2}); charts[id]=new Chart(el,cfg)}
function dailyData(arr,metric){let m={}; arr.forEach(r=>{let d=String(r.data||"").slice(8,10)||"?"; if(!m[d])m[d]=0; m[d]+=metric==="vendas"?saleCount(r):metric==="vgv"?(+r.valor||0):1}); let labels=Object.keys(m).sort((a,b)=>+a-+b); return {labels,data:labels.map(k=>m[k])}}
function importTextJune(){let txt=$("#pasteJune").value.trim(); if(!txt)return alert("Cole os dados de Junho."); let rows=txt.split(/\n+/).map(line=>{let c=line.split(/\t|\|/).map(x=>x.trim()); return {data:toIso(c[0]),dataHora:c[0]||"",promotor:c[1]||"",cliente:c[2]||"",valor:Number(String(c[3]||"0").replace(/\D/g,""))||0,statusContrato:c[4]||"",local:c[5]||"",liner:c[6]||"",closer:c[7]||"",qualificacao:c[8]||"",venda:norm(c[4]).includes("ATIVO"),cancelado:norm(c[4]).includes("CANCEL")}}); LS.set("juneRecords",june().concat(rows)); alert("Junho importado!"); render()}
function toIso(s){let m=String(s||"").match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/); if(!m)return "2026-06-01"; let y=m[3].length===2?"20"+m[3]:m[3]; return `${y}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`}
function clearJune(){if(confirm("Limpar todos os dados de Junho deste navegador?")){LS.set("juneRecords",[]);render()}}
function importExcelJune(ev){let f=ev.target.files[0]; if(!f)return; let reader=new FileReader(); reader.onload=e=>{let wb=XLSX.read(e.target.result,{type:"array"}); let ws=wb.Sheets[wb.SheetNames[0]]; let data=XLSX.utils.sheet_to_json(ws,{defval:""}); let rows=data.map(o=>{let get=(...ks)=>{for(let k of Object.keys(o)){let nk=norm(k); if(ks.some(x=>nk.includes(norm(x))))return o[k]} return ""}; let st=String(get("status contrato","statusContrato","contrato","status")||""); return {data:toIso(get("data")),dataHora:String(get("data hora","data")),promotor:String(get("promotor","captador","marketing")),cliente:String(get("cliente")),valor:Number(String(get("valor","vgv")).replace(/\D/g,""))||0,statusContrato:st,local:String(get("local","origem")),liner:String(get("liner")),closer:String(get("closer","fechador")),qualificacao:String(get("qualificacao","q")),venda:norm(st).includes("ATIVO"),cancelado:norm(st).includes("CANCEL")}}); LS.set("juneRecords",june().concat(rows)); alert(rows.length+" linhas importadas para Junho."); render()}; reader.readAsArrayBuffer(f)}
function logout(){localStorage.removeItem("logged"); location.reload()}
function render(){let content=state.view==="home"?home():state.view==="geral"?geral():state.view==="equipes"?equipes():state.view==="rankings"?rankings():state.view==="pulsador"?pulsador():state.view==="junho"?junho():state.view==="cancel"?cancel():state.view==="inativos"?inativos():state.view==="acessos"?acessos():home(); app.innerHTML=content}
render();
</script>
</body>
</html>
