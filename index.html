let state={view:'menu',period:'maio',rank:'vgv',role:'promotor',sort:'resultado',team:'TODAS'};let charts=[];const $=s=>document.querySelector(s);const app=$('#app');
const money=n=>(+n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});const pct=n=>((+n||0)*100).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%';
const norm=s=>(s||'').toString().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
const title=s=>(s||'').toLowerCase().replace(/\w/g,c=>c.toUpperCase()).replace(' Da ',' da ').replace(' De ',' de ').replace(' Do ',' do ').replace(' Dos ',' dos ');
function countStatus(st,venda,cancelado){let parts=(st||'').split('#').map(x=>norm(x)).filter(Boolean);let c=parts.filter(p=>p.includes('ATIVO')||p.includes('VENDA')||p.includes('CANCEL')).length;if(c===0&&(venda||cancelado))c=1;return c}
function cancelCount(st,cancelado){let parts=(st||'').split('#').map(x=>norm(x)).filter(Boolean);let c=parts.filter(p=>p.includes('CANCEL')).length;if(c===0&&cancelado)c=1;return c}
function teamOf(name){let n=norm(name);if(TEAM_MAP[n])return TEAM_MAP[n];if(n.includes('FELIPE DA SILVA RIBEIRO'))return 'PARK E EXTERNA';if(INATIVOS.includes(n))return 'INATIVO';return 'SEM EQUIPE'}
function prepRecord(r,mes='maio'){let p=title(r.promotor||'Sem nome');return {...r,mes,promotor:p,closer:title(r.closer||''),liner:title(r.liner||''),equipe:teamOf(p),vendasCalc:countStatus(r.statusContrato,r.venda,r.cancelado),cancels:cancelCount(r.statusContrato,r.cancelado),valor:+r.valor||0}}
function juneRecords(){try{return JSON.parse(localStorage.getItem('junhoRecords')||'[]')}catch(e){return []}}
function allRecords(){let maio=BASE_RECORDS.map(r=>prepRecord(r,'maio'));let junho=juneRecords().map(r=>prepRecord(r,'junho'));let out=state.period==='maio'?maio:state.period==='junho'?junho:maio.concat(junho);return out.filter(r=>state.team==='TODAS'||r.equipe===state.team||(state.team==='PARK'&&r.equipe==='PARK E EXTERNA')||(state.team==='EXTERNA'&&r.equipe==='PARK E EXTERNA'))}
function aggregate(records=allRecords(),key='promotor'){let m={};records.forEach(r=>{let name=(r[key]||'').trim()||'Sem nome';if(!m[name])m[name]={nome:name,casais:0,vendas:0,vgv:0,cancelamentos:0,q:0,nq:0,equipe:key==='promotor'?r.equipe:'',rows:[]};m[name].casais++;m[name].vendas+=r.vendasCalc;m[name].vgv+=r.valor;m[name].cancelamentos+=r.cancels;if(norm(r.qualificacao)==='Q')m[name].q++;if(norm(r.qualificacao)==='NQ')m[name].nq++;m[name].rows.push(r);if(key==='promotor')m[name].equipe=r.equipe});return Object.values(m).map(x=>{x.ef=x.casais?x.vendas/x.casais:0;x.meta=x.casais>=35?'🥇 R$ 2.500':x.casais>=22?'🥈 R$ 2.000':'Faltam '+Math.max(0,22-x.casais);return x})}
function sortArr(arr,metric='vgv'){return arr.sort((a,b)=>state.sort==='az'?a.nome.localeCompare(b.nome,'pt-BR'):(b[metric]||0)-(a[metric]||0)||a.nome.localeCompare(b.nome,'pt-BR'))}
function totals(records=allRecords()){return records.reduce((a,r)=>{a.casais++;a.vendas+=r.vendasCalc;a.vgv+=r.valor;a.cancelamentos+=r.cancels;if(r.equipe==='PARK'||r.equipe==='PARK E EXTERNA')a.park++;if(r.equipe==='EXTERNA'||r.equipe==='PARK E EXTERNA')a.externa++;return a},{casais:0,vendas:0,vgv:0,cancelamentos:0,park:0,externa:0})}
function layout(content){app.innerHTML=`<div class="top"><div class="wrap head"><div class="brand"><div class="logo">🏆</div><div><h1>Controle de Resultado Local</h1><p>PARK x EXTERNA • Maio + Junho • Rankings, metas, cancelamentos e pulsador</p></div></div><button class="btn" onclick="state.view='menu';render()">Menu inicial</button></div></div><div class="wrap">${content}</div>`}
function periodTabs(){return `<div class="tabs"><button class="tab ${state.period==='all'?'active':''}" onclick="state.period='all';render()">Tudo</button><button class="tab ${state.period==='maio'?'active':''}" onclick="state.period='maio';render()">Maio 01-31</button><button class="tab ${state.period==='junho'?'active':''}" onclick="state.period='junho';render()">Junho</button></div>`}
function nav(){let items=[['geral','📊 Geral'],['park','🌳 Equipe PARK'],['externa','🚀 Equipe EXTERNA'],['rankings','🏆 Rankings'],['metas','🎯 Metas'],['pulsador','👤 Pulsador'],['junho','📥 Junho'],['cancelamentos','❌ Cancelamentos'],['inativos','🚫 Inativos'],['funcoes','👥 Funções']];return `<div class="tabs"><button class="tab" onclick="state.view='menu';render()">← Menu inicial</button>${items.map(i=>`<button class="tab ${state.view===i[0]?'active':''}" onclick="state.view='${i[0]}';render()">${i[1]}</button>`).join('')}</div>`}
function render(){if(state.view==='menu')return renderMenu();let content=nav()+periodTabs();if(state.view==='geral')content+=viewGeral();else if(state.view==='park'){state.team='PARK';content+=viewTeam('PARK');state.team='TODAS'}else if(state.view==='externa'){state.team='EXTERNA';content+=viewTeam('EXTERNA');state.team='TODAS'}else{state.team='TODAS';if(state.view==='rankings')content+=viewRankings();if(state.view==='metas')content+=viewMetas();if(state.view==='pulsador')content+=viewPulsador();if(state.view==='junho')content+=viewJunho();if(state.view==='cancelamentos')content+=viewCancelamentos();if(state.view==='inativos')content+=viewInativos();if(state.view==='funcoes')content+=viewFuncoes()}layout(content);afterRender()}
function renderMenu(){let cards=[['geral','📊','Painel Executivo','Meta 15MM, 720 casais, VGV, vendas e eficiência.'],['park','🌳','Equipe PARK','Resultado separado, ranking, metas e evolução.'],['externa','🚀','Equipe EXTERNA','Resultado separado, ranking, metas e evolução.'],['rankings','🏆','Rankings','Ordene por VGV, vendas, casais, eficiência ou A-Z.'],['pulsador','👤','Pulsador Individual','Promotor, liner e closer com gráfico e histórico.'],['metas','🎯','Metas e Prêmios','Apenas promotores: 22 casais e 35 casais.'],['junho','📥','Alimentar Junho','Adicionar manual ou colar dados em lote.'],['cancelamentos','❌','Cancelamentos','Controle separado de cancelamentos e impacto.'],['inativos','🚫','Inativos','Amanda, Tassiane, Igor, Robson e outros.'],['funcoes','👥','Funções','Promotores, liners e closers em rankings próprios.']];let t=totals(BASE_RECORDS.map(r=>prepRecord(r,'maio')));layout(`<div class="hero"><div class="exec"><div class="grid"><div class="span8"><div class="big">Painel Executivo</div><p>Meta Junho: <b class="gold">R$ 15.000.000</b> e <b class="gold">720 casais</b> • Meta diária: 24 casais e R$ 500 mil</p></div><div class="span4"><div class="pill gold">Base Maio: ${t.casais} casais • ${money(t.vgv)}</div></div></div></div></div><div class="menu">${cards.map(c=>`<div class="menucard" onclick="state.view='${c[0]}';render()"><div class="ico">${c[1]}</div><b>${c[2]}</b><p>${c[3]}</p></div>`).join('')}</div>`)}
function kpis(records=allRecords()){let t=totals(records),ef=t.casais?t.vendas/t.casais:0;return `<div class="grid"><div class="card kpi"><span class="pill">Casais</span><b>${t.casais}</b></div><div class="card kpi"><span class="pill">Vendas</span><b>${t.vendas}</b></div><div class="card kpi"><span class="pill">VGV</span><b>${money(t.vgv)}</b></div><div class="card kpi"><span class="pill">Eficiência</span><b>${pct(ef)}</b></div></div>`}
function viewGeral(){let rec=allRecords(),t=totals(rec),prom=sortArr(aggregate(rec,'promotor'),'vgv'),top=prom[0]||{},pctVgv=Math.min(100,t.vgv/15000000*100),pctCasais=Math.min(100,t.casais/720*100);return `${kpis(rec)}<div class="grid" style="margin-top:16px"><div class="card panel span6"><h2>🎯 Meta Junho 15MM</h2><p>VGV atual no período selecionado: <b>${money(t.vgv)}</b></p><div class="progress"><i style="width:${pctVgv}%"></i></div><p class="mut">Falta ${money(Math.max(0,15000000-t.vgv))} para R$ 15.000.000</p></div><div class="card panel span6"><h2>👫 Meta Junho 720 Casais</h2><p>Casais atuais: <b>${t.casais}</b></p><div class="progress"><i style="width:${pctCasais}%"></i></div><p class="mut">Faltam ${Math.max(0,720-t.casais)} casais • Meta diária: 24</p></div><div class="card panel span6"><h2>🌳 PARK x 🚀 EXTERNA</h2><canvas id="chartTeam"></canvas></div><div class="card panel span6"><h2>🔥 Destaque do período</h2><div class="profileHead"><div class="avatar">${(top.nome||'--').split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><h2>${top.nome||'Sem dados'}</h2><p>${money(top.vgv||0)} • ${top.vendas||0} vendas • ${top.casais||0} casais</p></div></div></div><div class="card panel span12"><h2>🏆 Ranking Geral</h2>${table(prom,'vgv',true)}</div></div>`}
function viewTeam(team){let old=state.team;state.team=team;let rec=allRecords(),ag=sortArr(aggregate(rec,'promotor'),'vgv');state.team=old;return `${kpis(rec)}<div class="grid" style="margin-top:16px"><div class="card panel span8"><h2>${team==='PARK'?'🌳':'🚀'} Equipe ${team}</h2>${table(ag,'vgv',true)}</div><div class="card panel span4"><h2>📊 Evolução diária</h2><canvas id="chartDaily"></canvas></div></div>`}
function controls(metric='vgv'){return `<div class="searchbar"><input id="search" placeholder="Buscar profissional, liner, closer, local..." oninput="filterTables(this.value)"><select onchange="state.sort=this.value;render()"><option value="resultado" ${state.sort==='resultado'?'selected':''}>Ordenar por resultado</option><option value="az" ${state.sort==='az'?'selected':''}>Ordem alfabética A-Z</option></select><button class="btn ${metric==='casais'?'primary':''}" onclick="state.rank='casais';render()">Casais</button><button class="btn ${metric==='vendas'?'primary':''}" onclick="state.rank='vendas';render()">Vendas</button><button class="btn ${metric==='vgv'?'primary':''}" onclick="state.rank='vgv';render()">VGV</button></div>`}
function viewRankings(){let metric=state.rank||'vgv';return `${controls(metric)}<div class="grid"><div class="card panel span12"><h2>🏆 Ranking de Promotores</h2>${table(sortArr(aggregate(allRecords(),'promotor'),metric),metric,true)}</div><div class="card panel span6"><h2>📞 Ranking de Liners</h2>${table(sortArr(aggregate(allRecords(),'liner'),metric),metric,false)}</div><div class="card panel span6"><h2>🤝 Ranking de Closers</h2>${table(sortArr(aggregate(allRecords(),'closer'),metric),metric,false)}</div><div class="card panel span12"><h2>📍 Ranking por Local</h2>${table(sortArr(aggregate(allRecords(),'local'),metric),metric,false)}</div></div>`}
function viewMetas(){let prom=aggregate(allRecords(),'promotor').filter(x=>x.equipe!=='INATIVO'),meta35=prom.filter(x=>x.casais>=35).sort((a,b)=>b.casais-a.casais),meta22=prom.filter(x=>x.casais>=22&&x.casais<35).sort((a,b)=>b.casais-a.casais),faltam=prom.filter(x=>x.casais<22).sort((a,b)=>(22-a.casais)-(22-b.casais));return `${kpis(allRecords())}<div class="grid" style="margin-top:16px"><div class="card panel span6"><h2>🥇 Promotores que ganharam R$ 2.500</h2><p>Meta exclusiva de promotores: 35 casais.</p>${table(meta35,'casais',true)}</div><div class="card panel span6"><h2>🥈 Promotores que ganharam R$ 2.000</h2><p>Meta exclusiva de promotores: 22 casais.</p>${table(meta22,'casais',true)}</div><div class="card panel span12"><h2>⏳ Promotores que ainda faltam para meta</h2>${table(faltam,'casais',true)}</div></div>`}
function viewPulsador(){let role=state.role||'promotor',names=aggregate(allRecords(),role).filter(x=>x.nome&&x.nome!=='Sem Nome').sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR')),selected=localStorage.getItem('selectedPulsador')||names[0]?.nome||'',person=names.find(x=>x.nome===selected)||names[0];if(!person)return '<div class="empty">Sem dados para este período.</div>';localStorage.setItem('selectedPulsador',person.nome);return `<div class="grid"><div class="card panel span4"><h2>👤 Pulsador Individual</h2><div class="field"><label>Função</label><select onchange="state.role=this.value;localStorage.removeItem('selectedPulsador');render()"><option value="promotor" ${role==='promotor'?'selected':''}>Promotor de Marketing</option><option value="liner" ${role==='liner'?'selected':''}>Liner</option><option value="closer" ${role==='closer'?'selected':''}>Closer / Fechador</option></select></div><div class="field"><label>Profissional</label><select onchange="localStorage.setItem('selectedPulsador',this.value);render()">${names.map(n=>`<option ${n.nome===person.nome?'selected':''}>${n.nome}</option>`).join('')}</select></div><div class="profileHead"><div class="avatar">${person.nome.split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><h2>${person.nome}</h2><p>${role==='promotor'?'Promotor de Marketing':role==='liner'?'Liner':'Closer / Fechador'}</p></div></div>${role==='promotor'?`<p class="gold">${person.casais>=35?'🥇 Bateu R$ 2.500':person.casais>=22?'🥈 Bateu R$ 2.000':'Faltam '+Math.max(0,22-person.casais)+' casais para R$ 2.000'}</p>`:'<p class="mut">Liners e closers não participam da meta de 22/35 casais.</p>'}</div><div class="card panel span8"><h2>📊 Gráfico do profissional</h2><canvas id="chartPerson"></canvas></div><div class="card kpi"><span class="pill">Casais</span><b>${person.casais}</b></div><div class="card kpi"><span class="pill">Vendas</span><b>${person.vendas}</b></div><div class="card kpi"><span class="pill">VGV</span><b>${money(person.vgv)}</b></div><div class="card kpi"><span class="pill">Eficiência</span><b>${pct(person.ef)}</b></div><div class="card panel span12"><h2>Histórico</h2>${recordsTable(person.rows)}</div></div>`}
function viewJunho(){let rec=juneRecords();return `<div class="grid"><div class="card panel span5"><h2>📥 Alimentar Junho</h2><p>Você pode lançar 1 registro ou colar vários em lote. O sistema soma automaticamente em Tudo.</p><div class="field"><label>Promotor</label><input id="j_promotor"></div><div class="field"><label>Cliente</label><input id="j_cliente"></div><div class="field"><label>Status contrato</label><input id="j_status" placeholder="ATIVO / ATIVO # ATIVO / CANCELADO"></div><div class="field"><label>Valor VGV</label><input id="j_valor" type="number"></div><div class="field"><label>Data</label><input id="j_data" type="date" value="2026-06-01"></div><div class="field"><label>Qualificação</label><select id="j_qual"><option>Q</option><option>NQ</option></select></div><div class="field"><label>Local</label><input id="j_local"></div><div class="field"><label>Liner</label><input id="j_liner"></div><div class="field"><label>Closer</label><input id="j_closer"></div><button class="btn primary" onclick="addJune()">Adicionar Junho</button></div><div class="card panel span7"><h2>📋 Colar dados em lote</h2><p>Formato: Promotor TAB Cliente TAB Status TAB Valor TAB Data TAB Q/NQ TAB Local TAB Liner TAB Closer</p><textarea id="bulk" placeholder="Cole aqui linhas copiadas do Excel"></textarea><div class="tabs"><button class="btn primary" onclick="bulkJune()">Importar lote</button><button class="btn" onclick="exportJune()">Exportar Junho</button><button class="btn" onclick="clearJune()">Limpar Junho</button></div><h3>Registros de Junho: ${rec.length}</h3>${recordsTable(rec.map(r=>prepRecord(r,'junho')))}</div></div>`}
function viewCancelamentos(){let rec=allRecords().filter(r=>r.cancels>0);return `<div class="grid"><div class="card kpi"><span class="pill red">Cancelamentos</span><b>${rec.reduce((a,r)=>a+r.cancels,0)}</b></div><div class="card kpi"><span class="pill red">VGV cancelado</span><b>${money(rec.reduce((a,r)=>a+r.valor,0))}</b></div><div class="card panel span12"><h2>❌ Cancelamentos detalhados</h2>${recordsTable(rec)}</div></div>`}
function viewInativos(){let rec=BASE_RECORDS.map(r=>prepRecord(r,'maio')),ag=aggregate(rec,'promotor'),inat=INATIVOS.map(n=>ag.find(x=>norm(x.nome)===n)||{nome:title(n),casais:0,vendas:0,vgv:0,cancelamentos:0,ef:0,equipe:'INATIVO',rows:[]});return `<div class="card panel"><h2>🚫 Inativos</h2><p>Lista fixa informada: Amanda, Tassiane, Igor e Robson.</p>${table(inat,'casais',true)}</div>`}
function viewFuncoes(){let metric=state.rank||'vgv';return `${controls(metric)}<div class="grid"><div class="card panel span4"><h2>📣 Promotores</h2>${table(sortArr(aggregate(allRecords(),'promotor'),metric),metric,true)}</div><div class="card panel span4"><h2>📞 Liners</h2>${table(sortArr(aggregate(allRecords(),'liner'),metric),metric,false)}</div><div class="card panel span4"><h2>🤝 Closers</h2>${table(sortArr(aggregate(allRecords(),'closer'),metric),metric,false)}</div></div>`}
function table(arr,metric='vgv',clickable=false){if(!arr.length)return '<div class="empty">Sem dados.</div>';return `<div style="overflow:auto"><table class="dataTable"><thead><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th><th>Cancel.</th><th>Equipe/Meta</th></tr></thead><tbody>${arr.map((x,i)=>`<tr><td>${i<3?['🥇','🥈','🥉'][i]:i+1}</td><td>${clickable?`<button class="click" onclick="openProfile('${encodeURIComponent(x.nome)}','promotor')">${x.nome}</button>`:x.nome}</td><td>${x.casais}</td><td>${x.vendas}</td><td>${money(x.vgv)}</td><td>${pct(x.ef)}</td><td>${x.cancelamentos}</td><td>${x.equipe?`<span class="${x.equipe==='PARK'?'teamPARK':x.equipe==='EXTERNA'?'teamEXTERNA':'teamMIX'}">${x.equipe}</span><br>`:''}${x.meta||''}</td></tr>`).join('')}</tbody></table></div>`}
function recordsTable(rows){if(!rows.length)return '<div class="empty">Sem registros.</div>';return `<div style="overflow:auto;max-height:460px"><table class="dataTable"><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Status</th><th>Vendas</th><th>VGV</th><th>Local</th><th>Liner</th><th>Closer</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.data||''}</td><td>${r.promotor||''}</td><td>${r.cliente||''}</td><td>${r.statusContrato||''}</td><td>${r.vendasCalc||0}</td><td>${money(r.valor||0)}</td><td>${r.local||''}</td><td>${r.liner||''}</td><td>${r.closer||''}</td></tr>`).join('')}</tbody></table></div>`}
function openProfile(name,role='promotor'){state.view='pulsador';state.role=role;localStorage.setItem('selectedPulsador',decodeURIComponent(name));render()}
function filterTables(q){q=norm(q);document.querySelectorAll('.dataTable tbody tr').forEach(tr=>{tr.style.display=norm(tr.innerText).includes(q)?'':'none'})}
function dailySeries(rows){let m={};rows.forEach(r=>{let d=(r.data||'').slice(5);if(!m[d])m[d]={casais:0,vendas:0,vgv:0};m[d].casais++;m[d].vendas+=r.vendasCalc;m[d].vgv+=r.valor});let labels=Object.keys(m).sort();return {labels,casais:labels.map(d=>m[d].casais),vendas:labels.map(d=>m[d].vendas),vgv:labels.map(d=>m[d].vgv)}}
function destroyCharts(){charts.forEach(c=>c.destroy());charts=[]}
function afterRender(){destroyCharts();if($('#chartTeam')){let rec=allRecords(),park=rec.filter(r=>r.equipe==='PARK'||r.equipe==='PARK E EXTERNA'),ext=rec.filter(r=>r.equipe==='EXTERNA'||r.equipe==='PARK E EXTERNA');charts.push(new Chart($('#chartTeam'),{type:'bar',data:{labels:['PARK','EXTERNA'],datasets:[{label:'Casais',data:[park.length,ext.length]},{label:'Vendas',data:[totals(park).vendas,totals(ext).vendas]},{label:'VGV / 100k',data:[totals(park).vgv/100000,totals(ext).vgv/100000]}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}}))}if($('#chartDaily')){let d=dailySeries(allRecords());charts.push(new Chart($('#chartDaily'),{type:'line',data:{labels:d.labels,datasets:[{label:'Casais',data:d.casais},{label:'Vendas',data:d.vendas}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}}))}if($('#chartPerson')){let role=state.role||'promotor',person=localStorage.getItem('selectedPulsador'),rows=allRecords().filter(r=>(r[role]||'')===person),d=dailySeries(rows);charts.push(new Chart($('#chartPerson'),{type:'bar',data:{labels:d.labels,datasets:[{label:'Casais',data:d.casais},{label:'Vendas',data:d.vendas},{label:'VGV / 100k',data:d.vgv.map(x=>x/100000)}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}}))}}
function addJune(){let st=$('#j_status').value;let r={promotor:$('#j_promotor').value,cliente:$('#j_cliente').value,statusContrato:st,valor:+$('#j_valor').value||0,data:$('#j_data').value,dataHora:$('#j_data').value,qualificacao:$('#j_qual').value,local:$('#j_local').value,liner:$('#j_liner').value,closer:$('#j_closer').value,venda:norm(st).includes('ATIVO'),cancelado:norm(st).includes('CANCEL'),statusAtendimento:'Encerrado'};let arr=juneRecords();arr.push(r);localStorage.setItem('junhoRecords',JSON.stringify(arr));render()}
function bulkJune(){let lines=$('#bulk').value.split(/
+/).map(x=>x.trim()).filter(Boolean),arr=juneRecords();lines.forEach(line=>{let c=line.split(/	|;/);if(c.length>=3){let st=c[2]||'';arr.push({promotor:c[0]||'',cliente:c[1]||'',statusContrato:st,valor:+(c[3]||0),data:c[4]||'2026-06-01',dataHora:c[4]||'',qualificacao:c[5]||'Q',local:c[6]||'',liner:c[7]||'',closer:c[8]||'',venda:norm(st).includes('ATIVO'),cancelado:norm(st).includes('CANCEL'),statusAtendimento:'Encerrado'})}});localStorage.setItem('junhoRecords',JSON.stringify(arr));render()}
function clearJune(){if(confirm('Limpar todos os dados de Junho deste navegador?')){localStorage.removeItem('junhoRecords');render()}}
function exportJune(){let blob=new Blob([JSON.stringify(juneRecords(),null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='junho-dados.json';a.click()}
render();
</script></body></html>
