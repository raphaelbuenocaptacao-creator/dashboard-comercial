function loginView(){root.innerHTML=`<div class="login"><div class="loginCard"><div style="display:flex;gap:14px;align-items:center;margin-bottom:18px"><div class="logoBig">📊</div><div><h1>Controle de Resultado Local SX</h1><p class="mut">Painel SX • individual por CPF • metas • borderô • game • aprovação</p></div></div><div class="field"><label>E-mail aprovado</label><input id="loginEmail" placeholder="seuemail@empresa.com"></div><button class="btn gold full" onclick="login()">Entrar</button><div style="height:1px;background:#203753;margin:22px 0"></div><h3>Solicitar acesso</h3><div class="field"><label>Nome</label><input id="reqNome"></div><div class="field"><label>E-mail</label><input id="reqEmail"></div><div class="field"><label>Empresa/Equipe</label><input id="reqEmpresa" placeholder="PARK, EXTERNA..."></div><div class="field"><label>Função</label><select id="reqFuncao"><option>Promotor</option><option>Liner</option><option>Closer</option><option>Gestor</option></select></div><button class="btn full" onclick="requestAccess()">Enviar solicitação</button></div></div>`}
function layout(content,title='Painel Executivo'){let nav=[['exec','📊 Executivo'],['metas_sx','🎯 Meta SX'],['meu_painel','🙋 Meu Painel'],['bordero','💰 Borderô SX'],['game','🎮 Liga SX'],['park','🌳 Equipe PARK'],['externa','🚀 Equipe EXTERNA'],['promotores','📣 Promotores'],['liners','🎧 Liners'],['closers','🤝 Closers'],['individual','👤 Individual'],['calendario','📅 Calendário'],['rankings','🏆 Rankings'],['metas','🏆 Premiações'],['junho','📅 Junho'],['cancel','❌ Cancelamentos'],['inativos','📁 Inativos'],['acessos','🔐 Acessos']].map(x=>`<button class="${state.tab===x[0]?'active':''}" onclick="state.tab='${x[0]}';render()">${x[1]}</button>`).join('');root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">⚡</div><b>Controle de<br>Resultado Local SX</b></div><div class="nav">${nav}</div><div class="profile"><span class="pill">🟢 Online</span><p><b>${state.user?.nome||state.user?.email}</b><br><span class="mut">${state.user?.admin?'Administrador':'Usuário aprovado'}</span></p><button class="btn" onclick="state.user=null;render()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${title}</h2><span class="mut">Sistema SX • Junho separado de Maio • Meta R$ 15MM • 720 casais • Borderô • Gamificação</span></div><div class="actions"><select onchange="state.scope=this.value;render()"><option ${state.scope==='JUNHO'?'selected':''}>JUNHO</option><option ${state.scope==='MAIO'?'selected':''}>MAIO</option><option ${state.scope==='TUDO'?'selected':''}>TUDO</option></select></div></div>${content}</main></div>`;setTimeout(drawAll,50)}
function kpis(t){return`<div class="grid"><div class="card pad kpi"><div class="lab">Casais</div><div class="num">${t.casais}</div><div class="mut">Meta Junho 720</div></div><div class="card pad kpi"><div class="lab">Vendas</div><div class="num green">${t.vendas}</div><div class="mut">Eficiência ${pct(t.ef)}</div></div><div class="card pad kpi"><div class="lab">VGV</div><div class="num goldtxt">${money(t.vgv)}</div><div class="mut">Meta R$ 15MM</div></div><div class="card pad kpi"><div class="lab">Cancelamentos</div><div class="num red">${t.cancel}</div><div class="mut">Monitoramento</div></div><div class="card pad kpi"><div class="lab">% Meta VGV</div><div class="num blue">${pct(t.vgv/MONTH_TARGETS.vgv*100)}</div><div class="bar"><i style="width:${Math.min(100,t.vgv/MONTH_TARGETS.vgv*100)}%"></i></div></div><div class="card pad kpi"><div class="lab">% Meta Casais</div><div class="num purple">${pct(t.casais/MONTH_TARGETS.casais*100)}</div><div class="bar gold"><i style="width:${Math.min(100,t.casais/MONTH_TARGETS.casais*100)}%"></i></div></div></div>`}
function execView(){state.scopeTeam='';let rec=filteredRecords(),t=totals(rec),prom=rank(summarize(rec,'promotor'),'vgv'),park=totals(rec.filter(r=>teamOf(r.promotor).includes('PARK'))),ext=totals(rec.filter(r=>teamOf(r.promotor).includes('EXTERNA')));return layout(`${kpis(t)}<div class="hero"><div class="card pad"><h3>🎯 Painel Junho</h3><div class="big">${money(t.vgv)} <span class="mut">/ R$ 15MM</span></div><div class="bar gold" style="margin:14px 0"><i style="width:${Math.min(100,t.vgv/MONTH_TARGETS.vgv*100)}%"></i></div><p class="mut">${t.casais} de 720 casais • faltam ${Math.max(0,720-t.casais)} casais</p></div><div class="card pad"><h3>🔥 Destaque</h3><div class="big">${prom[0]?.nome||'-'}</div><p class="mut">${prom[0]?.casais||0} casais • ${prom[0]?.vendas||0} vendas • ${money(prom[0]?.vgv||0)}</p></div><div class="card pad"><h3>🏢 PARK x EXTERNA</h3><div class="duel"><div class="metricBox"><b>${park.casais}</b><span>PARK</span></div><div class="vs">VS</div><div class="metricBox"><b>${ext.casais}</b><span>EXTERNA</span></div></div></div></div><div class="grid"><div class="card pad span7"><h3 class="section">📈 Evolução diária</h3><canvas id="daily"></canvas></div><div class="card pad span5"><h3 class="section">🏆 Top 10 Promotores</h3>${rankTable(prom.slice(0,10),'promotor')}</div><div class="card pad span6"><h3 class="section">💰 VGV por equipe</h3><canvas id="teamVgv"></canvas></div><div class="card pad span6"><h3 class="section">🥇 Ranking de vendas</h3>${rankTable(rank(prom,'vendas').slice(0,10),'promotor')}</div></div>`,'Painel Executivo')}
function rankTable(rows,type='promotor'){return`<div class="tableWrap"><table><thead><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Ef.</th><th>Meta</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td><button class="link" onclick="openPerson('${r.nome.replace(/'/g,"\\'")}','${type}')">${r.nome}</button></td><td>${r.casais}</td><td>${r.vendas}</td><td>${money(r.vgv)}</td><td>${pct(r.ef)}</td><td>${type==='promotor'?award(r.casais):'-'}</td></tr>`).join('')}</tbody></table></div>`}function award(c){return c>=35?'🏆 R$2.500':c>=22?'🥈 R$2.000':`Faltam ${Math.max(0,22-c)}`}
function genericRank(key,title){let rec=filteredRecords(),rows=rank(summarize(rec,key),state.sort);let d=byDay(rec); setTimeout(()=>{chart('personPageChart','line',d.map(x=>x.d),d.map(x=>x.casais),'Casais')},80);return layout(`<div class="toolbar"><select onchange="state.sort=this.value;render()"><option value="vgv">Ranking VGV</option><option value="casais">Ranking Casais</option><option value="vendas">Ranking Vendas</option><option value="ef">Ranking Eficiência</option><option value="nome">A-Z</option></select><button class="btn" onclick="state.order=state.order==='desc'?'asc':'desc';render()">Ordem ${state.order==='desc'?'↓':'↑'}</button></div><div class="grid"><div class="card pad span8"><h3 class="section">${title}</h3>${rankTable(rows,key)}</div><div class="card pad span4"><h3 class="section">Distribuição</h3><canvas id="roleChart"></canvas></div></div>`,title)}function teamView(team,title){state.scopeTeam=team;let rec=filteredRecords(),t=totals(rec),rows=rank(summarize(rec,'promotor'),'vgv');return layout(`${kpis(t)}<div class="grid"><div class="card pad span7"><h3 class="section">${title} - Evolução</h3><canvas id="daily"></canvas></div><div class="card pad span5"><h3 class="section">Ranking ${title}</h3>${rankTable(rows,'promotor')}</div></div>`,title)}
function rankings(){state.scopeTeam='';let rec=filteredRecords();return layout(`<div class="grid"><div class="card pad span6"><h3 class="section">📣 Promotores</h3>${rankTable(rank(summarize(rec,'promotor'),'vgv'),'promotor')}</div><div class="card pad span6"><h3 class="section">🎧 Liners</h3>${rankTable(rank(summarize(rec,'liner'),'vendas'),'liner')}</div><div class="card pad span6"><h3 class="section">🤝 Closers</h3>${rankTable(rank(summarize(rec,'closer'),'vendas'),'closer')}</div><div class="card pad span6"><h3 class="section">❌ Cancelamentos</h3>${rankTable(rank(summarize(rec,'promotor'),'cancel'),'promotor')}</div></div>`,'Rankings completos')}function metas(){let rows=rank(summarize(filteredRecords(),'promotor'),'casais');return layout(`<div class="notice card pad"><b>Regra:</b> Meta de 22 e 35 casais vale somente para Promotores. Liners e Closers têm ranking próprio, sem premiação por casais.</div><br><div class="card pad"><h3 class="section">🎯 Metas dos Promotores</h3>${rankTable(rows,'promotor')}</div>`,'Metas e Premiações')}
function cancelView(){let rec=filteredRecords().filter(r=>r.cancelado||norm(r.statusContrato).includes('CANCEL'));return layout(`<div class="card pad"><h3 class="section">Cancelamentos</h3><div class="tableWrap"><table><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Status</th><th>VGV</th><th>Liner</th><th>Closer</th></tr></thead><tbody>${rec.map(r=>`<tr><td>${r.dataHora||r.data}</td><td>${displayName(alias(r.promotor))}</td><td>${r.cliente}</td><td class="red">${r.statusContrato}</td><td>${money(r.valor)}</td><td>${r.liner}</td><td>${r.closer}</td></tr>`).join('')}</tbody></table></div></div>`,'Cancelamentos')}function inativos(){let names=TEAM_ROWS.filter(r=>r[1]==='INATIVO').map(r=>alias(r[0]));let rows=names.map(n=>summarize(allRecords(),'promotor').find(x=>alias(x.nome)===n)||{nome:displayName(n),casais:0,vendas:0,vgv:0,ef:0,cancel:0});return layout(`<div class="card pad"><h3 class="section">Inativos</h3>${rankTable(rows,'promotor')}</div>`,'Inativos')}

function allPeople(){let rec=filteredRecords();let a=[...summarize(rec,'promotor').map(x=>({...x,tipo:'promotor'})),...summarize(rec,'liner').map(x=>({...x,tipo:'liner'})),...summarize(rec,'closer').map(x=>({...x,tipo:'closer'}))].filter(x=>x.nome&&x.nome!='Sem Nome');return a.sort((x,y)=>x.nome.localeCompare(y.nome))}
function individualView(){let people=allPeople(); if(!state.indRole)state.indRole='promotor';let list=people.filter(p=>p.tipo===state.indRole); if(!state.indPerson&&list[0])state.indPerson=list[0].nome;let chosen=list.find(p=>p.nome===state.indPerson)||list[0];let rec=chosen?allRecords().filter(r=>alias(r[chosen.tipo])===alias(chosen.nome)):[];let s=chosen||{nome:'',casais:0,vendas:0,vgv:0,ef:0,cancel:0,tipo:state.indRole};let meta=s.tipo==='promotor'?`<div class="notice"><b>Meta de Promotor:</b> ${s.casais>=35?'🏆 bateu 35 casais / R$ 2.500':s.casais>=22?'🥈 bateu 22 casais / R$ 2.000 • faltam '+(35-s.casais)+' para 35':'faltam '+(22-s.casais)+' casais para R$ 2.000'}</div>`:`<div class="notice"><b>Atenção:</b> meta 22/35 casais é somente para promotores. ${displayName(s.tipo)} tem ranking separado.</div>`;let d=byDay(rec); setTimeout(()=>{chart('personPageChart','line',d.map(x=>x.d),d.map(x=>x.casais),'Casais')},80);return layout(`<div class="toolbar"><select onchange="state.indRole=this.value;state.indPerson='';render()"><option value="promotor" ${state.indRole==='promotor'?'selected':''}>Promotor</option><option value="liner" ${state.indRole==='liner'?'selected':''}>Liner</option><option value="closer" ${state.indRole==='closer'?'selected':''}>Closer</option></select><select onchange="state.indPerson=this.value;render()">${list.map(p=>`<option ${p.nome===state.indPerson?'selected':''}>${p.nome}</option>`).join('')}</select><button class="btn gold" onclick="openPerson(state.indPerson,state.indRole)">Abrir pulsador</button></div><div class="grid"><div class="card pad span5"><div class="person"><div class="avatar">${(s.nome||'?').slice(0,1)}</div><div><h2>${s.nome||'Selecione'}</h2><p class="mut">${displayName(s.tipo)} • ${s.tipo==='promotor'?teamOf(s.nome):'Função comercial'}</p><span class="pill">Casais ${s.casais||0}</span> <span class="pill">Vendas ${s.vendas||0}</span> <span class="pill">VGV ${money(s.vgv||0)}</span> <span class="pill">Ef. ${pct(s.ef||0)}</span></div></div><br>${meta}</div><div class="card pad span7"><h3 class="section">📈 Evolução diária</h3><canvas id="personPageChart"></canvas></div><div class="card pad span12"><h3 class="section">Detalhes do profissional</h3>${detailRows(rec)}</div></div>`,'Individual / Pulsador')}
function detailRows(rec){return `<div class="tableWrap"><table><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Equipe</th><th>Liner</th><th>Closer</th><th>Status</th><th>Vendas</th><th>VGV</th></tr></thead><tbody>${rec.map(r=>`<tr><td>${r.data||''}</td><td>${displayName(alias(r.promotor))}</td><td>${r.cliente||''}</td><td>${teamOf(r.promotor)}</td><td>${displayName(alias(r.liner||''))}</td><td>${displayName(alias(r.closer||''))}</td><td>${r.statusContrato||''}</td><td>${vendaCount(r)}</td><td>${money(Number(r.valor||0))}</td></tr>`).join('')}</tbody></table></div>`}
function calendarView(){let rec=filteredRecords();let days=[...Array(31)].map((_,i)=>String(i+1).padStart(2,'0')); if(!state.calDay)state.calDay=days[0];let selected=rec.filter(r=>(r.data||'').slice(8,10)===state.calDay);let t=totals(selected);return layout(`<div class="card pad"><h3 class="section">📅 Calendário de Resultados</h3><p class="mut">Clique em um dia para ver todos os casais, vendas, VGV, liner, closer e equipe daquele resultado.</p><div class="calendarGrid">${days.map(d=>{let dr=rec.filter(r=>(r.data||'').slice(8,10)===d),tt=totals(dr);return `<button class="calDay ${state.calDay===d?'active':''}" onclick="state.calDay='${d}';render()"><b>${d}</b><span>${tt.casais} casais</span><small>${money(tt.vgv)}</small></button>`}).join('')}</div></div><br>${kpis(t)}<div class="card pad"><h3 class="section">Resultado do dia ${state.calDay}</h3>${detailRows(selected)}</div>`,'Calendário por dia')}

function junho(){layout(`<div class="card pad"><h3 class="section">📅 Lançar dados de Junho</h3><div class="junhoForm"><input id="jData" type="date" value="2026-06-01"><input id="jProm" class="wide" placeholder="Promotor"><input id="jCliente" class="wide" placeholder="Cliente"><input id="jValor" placeholder="VGV"><select id="jStatus"><option></option><option>ATIVO</option><option>ATIVO # ATIVO</option><option>CANCELADO</option><option>ATIVO # CANCELADO</option></select><input id="jLiner" placeholder="Liner"><input id="jCloser" placeholder="Closer"><input id="jLocal" placeholder="Local"><select id="jQ"><option>Q</option><option>NQ</option></select><button class="btn gold" onclick="addJunho()">Adicionar</button></div></div><br><div class="card pad"><h3 class="section">Registros Junho</h3><div id="junhoList"></div></div>`,'Junho - Alimentação de dados');setTimeout(renderJunhoList,60)}async function addJunho(){let status=gid('jStatus').value,record={promotor:gid('jProm').value.trim(),cliente:gid('jCliente').value.trim(),valor:Number(gid('jValor').value||0),venda:norm(status).includes('ATIVO'),cancelado:norm(status).includes('CANCEL'),statusContrato:status,data:gid('jData').value,dataHora:gid('jData').value,statusAtendimento:'Encerrado',qualificacao:gid('jQ').value,local:gid('jLocal').value.trim(),closer:gid('jCloser').value.trim(),liner:gid('jLiner').value.trim()};if(!record.promotor)return alert('Informe o profissional.');if(supa){let vendas=vendaCount(record);let {error}=await supa.from('resultados').insert({data:record.data,mes:'JUNHO',profissional:record.promotor,funcao:'Promotor',equipe:teamOf(record.promotor).includes('EXTERNA')?'EXTERNA':'PARK',local:record.local,cliente:record.cliente,liner:record.liner,closer:record.closer,casais:1,vendas:vendas,vgv:record.valor,cancelamentos:record.cancelado?(vendas||1):0,qualificacao:record.qualificacao});if(error)return alert('Erro ao salvar no Supabase: '+error.message);await loadResults();}else{let arr=JSON.parse(localStorage.getItem('junhoRecords')||'[]');arr.push(record);localStorage.setItem('junhoRecords',JSON.stringify(arr));}alert('Resultado de Junho salvo.');renderJunhoList();}function renderJunhoList(){let local=JSON.parse(localStorage.getItem('junhoRecords')||'[]'),arr=[...(state.junho||[]),...local],el=gid('junhoList');if(el)el.innerHTML=arr.length?`<table><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Status</th><th>VGV</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${r.data}</td><td>${r.promotor}</td><td>${r.cliente}</td><td>${r.statusContrato}</td><td>${money(r.valor)}</td></tr>`).join('')}</tbody></table>`:'<p class="mut">Nenhum dado lançado ainda. Agora o Painel principal abre em JUNHO zerado/separado de Maio. Lance aqui e tudo atualiza.</p>'}

function getMetaSX(){let def={casais:720,vendas:180,vgv:15000000};try{return {...def,...JSON.parse(localStorage.getItem('metaSX')||'{}')}}catch(e){return def}}
function saveMetaSX(){let meta={casais:Number(gid('metaCasais').value||720),vendas:Number(gid('metaVendas').value||180),vgv:Number(gid('metaVgv').value||15000000)};localStorage.setItem('metaSX',JSON.stringify(meta));alert('Meta SX atualizada.');render()}
function metasSX(){let rec=filteredRecords(),t=totals(rec),m=getMetaSX();let faltCas=Math.max(0,m.casais-t.casais),faltVen=Math.max(0,m.vendas-t.vendas),faltVgv=Math.max(0,m.vgv-t.vgv);let dia=Number(new Date().getDate()||1),projCas=Math.round(t.casais/dia*30),projVen=Math.round(t.vendas/dia*30),projVgv=Math.round(t.vgv/dia*30);let html=`<div class="heroLine"><div class="heroCard"><h3>🎯 META SX JUNHO</h3><div class="progressGrid"><div class="goalCard"><span class="mut">Casais</span><div class="num">${t.casais} / ${m.casais}</div><div class="bar gold"><i style="width:${Math.min(100,t.casais/m.casais*100)}%"></i></div><p class="mut">Faltam ${faltCas} • Projeção ${projCas}</p></div><div class="goalCard"><span class="mut">Vendas</span><div class="num">${t.vendas} / ${m.vendas}</div><div class="bar gold"><i style="width:${Math.min(100,t.vendas/m.vendas*100)}%"></i></div><p class="mut">Faltam ${faltVen} • Projeção ${projVen}</p></div><div class="goalCard"><span class="mut">VGV</span><div class="num">${money(t.vgv)} / ${money(m.vgv)}</div><div class="bar gold"><i style="width:${Math.min(100,t.vgv/m.vgv*100)}%"></i></div><p class="mut">Faltam ${money(faltVgv)} • Projeção ${money(projVgv)}</p></div></div></div><div class="heroCard"><h3>⚙️ Configurar Meta</h3><input id="metaCasais" value="${m.casais}" placeholder="Meta Casais"><br><br><input id="metaVendas" value="${m.vendas}" placeholder="Meta Vendas"><br><br><input id="metaVgv" value="${m.vgv}" placeholder="Meta VGV"><br><br><button class="btn gold" onclick="saveMetaSX()">Salvar Meta SX</button></div></div><div class="grid"><div class="card pad span6"><h3 class="section">🏞️ PARK x 🚀 EXTERNA</h3><canvas id="teamVgv"></canvas></div><div class="card pad span6"><h3 class="section">🔥 Top Promotores</h3>${rankTable(rank(summarize(rec,'promotor'),'casais').slice(0,8),'promotor')}</div></div>`;return layout(html,'Meta SX')}
function currentBorderos(){let arr=[];try{arr=JSON.parse(localStorage.getItem('borderoSX')||'[]')}catch(e){}return arr}
async function saveBordero(){let b={id:Date.now(),data:gid('bData').value,nome_casal:gid('bCasal').value.trim(),consultor:gid('bConsultor').value.trim(),profissional:gid('bProf').value.trim(),valor_venda:Number(gid('bVenda').value||0),entrada_pix:Number(gid('bPix').value||0),entrada_credito:Number(gid('bCredito').value||0),parcelas:Number(gid('bParcelas').value||0),comissao_percentual:Number(gid('bPerc').value||2),status:gid('bStatus').value};if(!b.nome_casal||!b.profissional)return alert('Informe nome do casal e profissional.');b.comissao_total=b.valor_venda*(b.comissao_percentual/100);b.recebido=b.entrada_pix+b.entrada_credito;b.falta=Math.max(0,b.comissao_total-b.recebido);if(supa){let {error}=await supa.from('borderos').insert(b);if(error){let arr=currentBorderos();arr.push(b);localStorage.setItem('borderoSX',JSON.stringify(arr));alert('Salvo localmente. Para salvar online, rode o SQL do Borderô no Supabase.')}}else{let arr=currentBorderos();arr.push(b);localStorage.setItem('borderoSX',JSON.stringify(arr));}render()}
function borderoView(){let people=rank(summarize(allRecords(),'promotor'),'nome').map(x=>x.nome);let arr=currentBorderos();let total=arr.reduce((a,b)=>a+(b.comissao_total||0),0),receb=arr.reduce((a,b)=>a+(b.recebido||0),0);let html=`<div class="card pad"><h3 class="section">💰 Borderô SX</h3><p class="mut">Lance o casal, entrada e comissão. Exemplo: venda de R$ 80.000 com 2% = R$ 1.600 de comissão.</p><div class="borderoRow"><input id="bData" type="date" value="2026-06-01"><input id="bCasal" class="wide" placeholder="Nome do casal"><select id="bProf" class="wide"><option></option>${people.map(n=>`<option>${n}</option>`).join('')}</select><input id="bConsultor" placeholder="Consultor"><input id="bVenda" placeholder="Valor venda"><input id="bPix" placeholder="Entrada PIX"><input id="bCredito" placeholder="Entrada crédito"><input id="bParcelas" placeholder="Quantas vezes entrada"><input id="bPerc" value="2" placeholder="% comissão"><select id="bStatus"><option>PENDENTE</option><option>PARCIAL</option><option>PAGO</option><option>CANCELADO</option></select><button class="btn gold" onclick="saveBordero()">Salvar Borderô</button></div></div><br><div class="grid"><div class="card pad span4 salaryBox"><h3>Comissão Total</h3><div class="big">${money(total)}</div></div><div class="card pad span4 salaryBox"><h3>Recebido</h3><div class="big">${money(receb)}</div><div class="bar"><i style="width:${total?Math.min(100,receb/total*100):0}%"></i></div></div><div class="card pad span4 alertBox"><h3>Falta Receber</h3><div class="big">${money(Math.max(0,total-receb))}</div></div><div class="card pad span12"><h3 class="section">Registros</h3><div class="tableWrap"><table><thead><tr><th>Data</th><th>Casal</th><th>Profissional</th><th>Consultor</th><th>Venda</th><th>Comissão</th><th>Recebido</th><th>Falta</th><th>Status</th></tr></thead><tbody>${arr.map(b=>`<tr><td>${b.data||''}</td><td>${b.nome_casal||''}</td><td>${b.profissional||''}</td><td>${b.consultor||''}</td><td>${money(b.valor_venda||0)}</td><td>${money(b.comissao_total||0)}</td><td>${money(b.recebido||0)}</td><td>${money(b.falta||0)}</td><td>${b.status||''}</td></tr>`).join('')||'<tr><td colspan="9" class="mut">Nenhum borderô lançado ainda.</td></tr>'}</tbody></table></div></div></div>`;return layout(html,'Borderô SX')}
function unlockMeuPainel(){let n=gid('meuNome').value.trim(),cpf=gid('meuCpf').value.trim();if(!n||cpf.length<4)return alert('Informe nome completo e CPF.');localStorage.setItem('meuPainelSX',JSON.stringify({nome:n,cpf}));render()}
function meuPainel(){let info;try{info=JSON.parse(localStorage.getItem('meuPainelSX')||'null')}catch(e){}if(!info)return layout(`<div class="card pad cpfGate"><h3 class="section">🙋 Área Individual SX</h3><p class="mut">Entre com nome completo e CPF para abrir seu pulsador pessoal. O nome precisa bater com o cadastro/resultado.</p><input id="meuNome" placeholder="Nome completo"><br><br><input id="meuCpf" placeholder="CPF"><br><br><button class="btn gold" onclick="unlockMeuPainel()">Abrir meu painel</button></div>`,'Meu Painel SX');let name=alias(info.nome),rec=allRecords().filter(r=>alias(r.promotor)===name||alias(r.liner)===name||alias(r.closer)===name);let s=totals(rec),d=byDay(rec);setTimeout(()=>chart('meuChart','line',d.map(x=>x.d),d.map(x=>x.casais),'Casais'),80);let html=`<div class="person"><div class="avatar">${info.nome.slice(0,1).toUpperCase()}</div><div><h2>${info.nome}</h2><p class="mut">CPF protegido • Área Individual SX</p><span class="pill">Casais ${s.casais}</span> <span class="pill">Vendas ${s.vendas}</span> <span class="pill">VGV ${money(s.vgv)}</span> <span class="pill">Ef. ${pct(s.ef)}</span></div></div><br>${kpis(s)}<div class="grid"><div class="card pad span7"><h3 class="section">📈 Meu Pulsador</h3><canvas id="meuChart"></canvas></div><div class="card pad span5"><h3 class="section">🎯 Minha Meta</h3><p>22 casais = R$ 2.000 • 35 casais = R$ 2.500</p><div class="big">${award(s.casais)}</div><div class="bar gold"><i style="width:${Math.min(100,s.casais/35*100)}%"></i></div><br><button class="btn" onclick="localStorage.removeItem('meuPainelSX');render()">Trocar pessoa</button></div></div>`;return layout(html,'Meu Painel SX')}
function gameSX(){let rows=rank(summarize(filteredRecords(),'promotor').map(x=>({...x,pts:Math.round(x.casais*10+x.vendas*50+x.vgv/10000)})),'pts');let html=`<div class="card pad"><h3 class="section">🎮 Liga SX - Corrida da Meta</h3><p class="mut">Pontuação: Casal = 10 XP • Venda = 50 XP • Cada R$ 10 mil VGV = 1 XP.</p><div>${rows.slice(0,5).map((r,i)=>`<span class="gameBadge">${['🥇','🥈','🥉','🔥','⚡'][i]||'⭐'} ${r.nome} • ${r.pts} XP</span>`).join('')}</div></div><br><div class="card pad"><h3 class="section">Ranking XP</h3><div class="tableWrap"><table><thead><tr><th>#</th><th>Profissional</th><th>XP</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Nível</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td><button class="link" onclick="openPerson('${r.nome.replace(/'/g,"\\'")}')">${r.nome}</button></td><td>${r.pts}</td><td>${r.casais}</td><td>${r.vendas}</td><td>${money(r.vgv)}</td><td>${r.pts>1000?'👑 Lenda SX':r.pts>700?'💎 Diamante':r.pts>400?'🥇 Ouro':r.pts>200?'🥈 Prata':'🥉 Bronze'}</td></tr>`).join('')}</tbody></table></div></div>`;return layout(html,'Liga SX')}

async function acessos(){await loadAccess();return layout(`<div class="card pad"><h3 class="section">Aprovações de acesso</h3><div class="tableWrap"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Empresa</th><th>Função</th><th>Status</th><th>Último acesso</th><th>Ação</th></tr></thead><tbody>${state.access.map(a=>`<tr><td>${a.nome||''}</td><td>${a.email}</td><td>${a.empresa||''}</td><td>${a.funcao||''}</td><td>${a.aprovado?'✅ Aprovado':'⏳ Pendente'}</td><td>${a.ultimo_acesso||'-'}</td><td><button class="btn green" onclick="approve(${a.id},true)">Aprovar</button> <button class="btn red" onclick="approve(${a.id},false)">Bloquear</button></td></tr>`).join('')}</tbody></table></div></div>`,'Acessos e Permissões')}
function openPerson(name,type='promotor'){let rec=allRecords().filter(r=>alias(r[type])===alias(name)),s=summarize(rec,type)[0]||{nome:name,casais:0,vendas:0,vgv:0,ef:0,cancel:0};modalBody.innerHTML=`<div class="person"><div class="avatar">${(s.nome||'?').slice(0,1)}</div><div><h2>${s.nome}</h2><p class="mut">${type.toUpperCase()} • ${type==='promotor'?teamOf(s.nome):''}</p><span class="pill">Casais ${s.casais}</span> <span class="pill">Vendas ${s.vendas}</span> <span class="pill">VGV ${money(s.vgv)}</span> <span class="pill">Ef. ${pct(s.ef)}</span> <span class="pill">Cancel. ${s.cancel}</span></div></div><br><div class="grid"><div class="card pad span6"><h3 class="section">Evolução</h3><canvas id="personChart"></canvas></div><div class="card pad span6"><h3 class="section">Meta Promotor</h3><div class="big">${type==='promotor'?award(s.casais):'Sem meta de casais'}</div><p class="mut">22 casais = R$ 2.000 • 35 casais = R$ 2.500</p><div class="bar gold"><i style="width:${Math.min(100,s.casais/35*100)}%"></i></div></div></div>`;modal.classList.add('show');setTimeout(()=>{let d=byDay(rec);chart('personChart','line',d.map(x=>x.d),d.map(x=>x.casais),'Casais')},60)}
function drawAll(){destroyCharts();let rec=filteredRecords(),d=byDay(rec);chart('daily','line',d.map(x=>x.d),d.map(x=>x.casais),'Casais');let park=totals(rec.filter(r=>teamOf(r.promotor).includes('PARK'))),ext=totals(rec.filter(r=>teamOf(r.promotor).includes('EXTERNA')));chart('teamVgv','bar',['PARK','EXTERNA'],[park.vgv,ext.vgv],'VGV');let rows=rank(summarize(rec,state.tab==='liners'?'liner':state.tab==='closers'?'closer':'promotor'),'vgv').slice(0,8);chart('roleChart','bar',rows.map(x=>x.nome),rows.map(x=>x.vendas),'Vendas')}
async function render(){if(!state.user)return loginView();if(state.tab==='exec')return execView();if(state.tab==='metas_sx')return metasSX();if(state.tab==='meu_painel')return meuPainel();if(state.tab==='bordero')return borderoView();if(state.tab==='game')return gameSX();if(state.tab==='park')return teamView('PARK','Equipe PARK');if(state.tab==='externa')return teamView('EXTERNA','Equipe EXTERNA');if(state.tab==='promotores'){state.scopeTeam='';return genericRank('promotor','Promotores de Marketing')}if(state.tab==='liners'){state.scopeTeam='';return genericRank('liner','Liners')}if(state.tab==='closers'){state.scopeTeam='';return genericRank('closer','Closers / Fechadores')}if(state.tab==='individual')return individualView();if(state.tab==='calendario')return calendarView();if(state.tab==='rankings')return rankings();if(state.tab==='metas')return metas();if(state.tab==='junho')return junho();if(state.tab==='cancel')return cancelView();if(state.tab==='inativos')return inativos();if(state.tab==='acessos')return await acessos()}render();
</script><!-- V22 SX individual bordero metas gamificacao -->
</body></html>
