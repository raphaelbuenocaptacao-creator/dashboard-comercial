function renderLogin(){root.innerHTML=`<div class="login"><div class="loginCard"><div class="logoBig">⚡</div><br><h1>SX Pulse</h1><p class="mut">Controle de Resultado Local</p><label>E-mail aprovado</label><input id="loginEmail" placeholder="seuemail@email.com"><br><br><button class="btn gold full" onclick="login()">Entrar</button><hr style="border-color:#203753;margin:22px 0"><h3>Solicitar acesso</h3><label>Nome completo</label><input id="cadNome"><label>E-mail</label><input id="cadEmail"><label>Empresa/Equipe</label><input id="cadEmpresa" placeholder="PARK ou EXTERNA"><label>Função</label><select id="cadFuncao"><option>PROMOTOR</option><option>LINER</option><option>CLOSER</option><option>GESTOR</option></select><br><br><button class="btn full" onclick="solicitar()">Enviar solicitação</button></div></div>`}

function renderApp(){root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">⚡</div><div><b>SX Pulse</b><div class="mut">Controle de Resultado Local</div></div></div><div class="nav">${navs.map(n=>`<button class="${state.tab===n[0]?'active':''}" onclick="state.tab='${n[0]}';renderApp()">${n[1]}</button>`).join('')}</div><div class="profile"><div class="profileAvatar">${state.user.perfil==='CEO'?'👑':'👤'}</div><b>${state.user.nome||state.user.email}</b><p class="mut">${state.user.perfil||'PROFISSIONAL'} • Online</p><button class="btn" onclick="location.reload()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${navs.find(n=>n[0]===state.tab)?.[1]||'SX Pulse'}</h2><div class="mut">CEO Raphael Bueno • V30 • Sistema online</div></div><div class="actions"><button class="btn" onclick="state.scope=state.scope==='MAIO'?'JUNHO':'MAIO';renderApp()">Mês: ${state.scope}</button><button class="btn gold" onclick="state.tab='ceo';renderApp()">Central CEO</button></div></div><div id="page"></div><div class="versionFooter"><div><b>SX Pulse</b> • Controle de Resultado Local</div><div>Versão ${APP_VERSION} • Campos do Jordão • 🟢 Online</div></div></main></div>`; renderPage()}
function renderPage(){({exec:pageExec,meu:pageMeu,pulse:pagePulse,stories:pageStories,hall:pageHall,agenda:pageAgenda,bordero:pageBordero,liga:pageLiga,pontos:pagePontos,cal:pageCal,inativos:pageInativos,ceo:pageCEO,acessos:pageAcessos}[state.tab]||pageExec)();}
function kpi(t,v,cls=''){return `<div class="card kpi pad"><div class="lab">${t}</div><div class="num ${cls}">${v}</div><div class="bar"><i style="width:${Math.min(100,Math.random()*55+35)}%"></i></div></div>`}
function pageExec(){const r=records();const t=totals(r);const tg=TARGETS[state.scope];const by=activePeople(aggBy(r,'promotor'));const top=by.slice(0,5);page.innerHTML=`<div class="hero"><div class="card pad"><h3>🎯 Meta SX ${state.scope}</h3><div class="big">${fmt(t.casais)} / ${fmt(tg.casais)} casais</div><div class="bar gold"><i style="width:${Math.min(100,t.casais/tg.casais*100)}%"></i></div><p class="mut">VGV: ${money(t.vgv)} / ${money(tg.vgv)} • Vendas: ${fmt(t.vendas)} / ${fmt(tg.vendas)}</p></div><div class="card pad"><h3>🔥 Capitão da Semana</h3><div class="avatar">🏆</div><div class="big">${short(top[0]?.nome)}</div><p class="mut">${money(top[0]?.vgv)} • ${top[0]?.casais||0} casais</p></div><div class="card pad"><h3>⚡ Desafio Ativo</h3><div class="big">3 casais até 18h</div><p class="mut">Prêmio: R$ 100 PIX • Contador: 03:42:15</p></div></div><div class="grid">${kpi('Casais Hoje','24','green')}${kpi('Vendas Hoje','6','blue')}${kpi('VGV Hoje',money(500000),'goldtxt')}${kpi('Casais Mês',fmt(t.casais))}${kpi('Vendas Mês',fmt(t.vendas))}${kpi('VGV Mês',money(t.vgv))}<div class="card span7 pad"><h3 class="section">📈 Evolução SX</h3><canvas id="c1"></canvas></div><div class="card span5 pad"><h3 class="section">🏆 Top Promotores</h3>${rankTable(top)}</div><div class="card span6 pad"><h3 class="section">🌳 PARK x 🚀 EXTERNA</h3>${teamDuel()}</div><div class="card span6 pad"><h3 class="section">📱 SX Pulse ao vivo</h3>${feedPreview()}</div></div>`; chart('c1',['01','05','10','15','20','25','31'],[12,28,56,92,160,250,438],'Casais acumulados');}
function rankTable(rows){return `<div class="tableWrap"><table><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Status</th></tr>${rows.map((x,i)=>`<tr><td>${i+1}</td><td><span class="photoMini">${i<3?'🏆':'👤'}</span>${x.nome}</td><td>${x.casais}</td><td>${x.vendas}</td><td>${money(x.vgv)}</td><td>${x.status==='INATIVO'?'<span class="pill red">Inativo</span>':'<span class="pill green">Ativo</span>'}</td></tr>`).join('')}</table></div>`}
function teamDuel(){const r=records(), park=r.filter(x=>x.equipe==='PARK').length, ext=r.filter(x=>x.equipe==='EXTERNA').length;return `<div class="duel"><div><div class="big">${park}</div><p class="mut">PARK</p><div class="bar"><i style="width:${park/(park+ext)*100}%"></i></div></div><div class="vs">VS</div><div><div class="big">${ext}</div><p class="mut">EXTERNA</p><div class="bar gold"><i style="width:${ext/(park+ext)*100}%"></i></div></div></div><p class="mut">Inativos continuam somando na meta e histórico; apenas descem para o final das listas.</p>`}
function chart(id,labels,data,label){setTimeout(()=>new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label,data,tension:.4,fill:true}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#9fb2ca'}},y:{ticks:{color:'#9fb2ca'}}}}}),30)}
function feedPreview(){return `<div class="post"><div class="avatar">📸</div><div><b>Ana Caroline</b><p>Meta batida! 35 casais 🚀</p><span class="pill">❤️ 48</span> <span class="pill">💬 8</span></div></div><div class="post"><div class="avatar">🏆</div><div><b>Sistema SX</b><p>Conquista desbloqueada: Top 1 do mês.</p><span class="pill">🔥 23</span></div></div>`}
function pagePulse(){const posts=ls('sx_posts',[{nome:'Raphael Bueno',txt:'Meta do dia: 24 casais. Bora fazer história! 🚀',emo:'👑',likes:18},{nome:'Sistema SX',txt:'André Carriço entrou no Hall da Fama SX.',emo:'🏆',likes:33}]);page.innerHTML=`<div class="grid"><div class="card span4 pad"><h3>📸 Criar post</h3><input id="postNome" value="${state.user.nome||'Raphael Bueno'}"><textarea id="postTxt" placeholder="O que está acontecendo na operação?"></textarea><select id="postEmo"><option>🚀</option><option>🏆</option><option>📸</option><option>🎯</option><option>💰</option></select><button class="btn gold full" onclick="addPost()">Publicar no SX Pulse</button></div><div class="card span8 pad"><h3>📱 Feed SX Pulse</h3>${posts.map((p,i)=>`<div class="post"><div class="avatar">${p.emo||'📸'}</div><div><b>${p.nome}</b><p>${p.txt}</p><button class="btn" onclick="likePost(${i})">❤️ ${p.likes||0}</button> <span class="pill">💬 comentar</span></div></div>`).join('')}</div></div>`}
function addPost(){let posts=ls('sx_posts',[]);posts.unshift({nome:postNome.value,txt:postTxt.value,emo:postEmo.value,likes:0,dt:new Date().toISOString()});save('sx_posts',posts);pagePulse()}function likePost(i){let p=ls('sx_posts',[]);p[i].likes=(p[i].likes||0)+1;save('sx_posts',p);pagePulse()}
function pageStories(){page.innerHTML=`<div class="card pad"><h3>⚡ Stories SX 24h</h3><div class="storyRow">${['🎯 Meta do dia','🏆 Top VGV','📍 Baden Baden','🔥 Capitão','💰 Maior venda','🚀 PARK x EXTERNA'].map(x=>`<div class="story"><div class="circle"><div>${x.split(' ')[0]}</div></div><small>${x}</small></div>`).join('')}</div><br><div class="formgrid"><input id="storyTxt" class="wide" placeholder="Criar story/aviso"><button class="btn gold" onclick="alert('Story publicado localmente. Próxima etapa: salvar em Supabase.')">Publicar story</button></div></div>`}
function pageHall(){const top=activePeople(aggBy(records(),'promotor')).slice(0,3);page.innerHTML=`<div class="grid">${top.map((x,i)=>`<div class="card span4 pad"><div class="avatar">${['🥇','🥈','🥉'][i]}</div><h2>${x.nome}</h2><p class="mut">Hall da Fama SX • ${state.scope}</p><div class="big">${money(x.vgv)}</div><p>${x.casais} casais • ${x.vendas} vendas • ${x.ef.toFixed(1)}%</p></div>`).join('')}</div>`}
function pageMeu(){page.innerHTML=`<div class="grid"><div class="card span4 pad"><h3>👤 Acesso individual</h3><input id="cpfNome" placeholder="Nome completo"><input id="cpfDoc" placeholder="CPF"><button class="btn gold full" onclick="openIndividual()">Entrar no meu painel</button></div><div class="card span8 pad" id="individualBox"><h3>Meu Painel SX</h3><p class="mut">Entre com nome e CPF para ver meta, borderô, comissão e agenda privada.</p></div></div>`}
function openIndividual(){const name=cpfNome.value||state.user.nome||'Profissional'; const row=aggBy(records(),'promotor').find(x=>norm(x.nome).includes(norm(name).split(' ')[0]))||{nome:name,casais:0,vendas:0,vgv:0,ef:0};individualBox.innerHTML=`<div style="display:flex;gap:14px;align-items:center"><div class="avatar">👤</div><div><h2>${row.nome}</h2><p class="mut">Área individual privada • CPF validado</p></div></div><div class="grid" style="margin-top:14px">${kpi('Casais',row.casais)}${kpi('Vendas',row.vendas)}${kpi('VGV',money(row.vgv))}${kpi('Eficiência',row.ef.toFixed(1)+'%')}<div class="card span12 pad"><h3>🎯 Meta pessoal</h3><p>Casais: ${row.casais} / 35</p><div class="bar gold"><i style="width:${Math.min(100,row.casais/35*100)}%"></i></div><p>Comissão prevista 1% VGV: <b>${money(row.vgv*.01)}</b></p></div></div>`}
function pageAgenda(){const notes=ls('sx_agenda',[]);page.innerHTML=`<div class="grid"><div class="card span4 pad"><h3>📒 Minha Agenda</h3><input id="agCasal" placeholder="Nome do casal"><input id="agTel" placeholder="Telefone"><input id="agRet" type="date"><textarea id="agObs" placeholder="Observações importantes"></textarea><select id="agStatus"><option>Retornar</option><option>Venda provável</option><option>Documentos</option><option>Sem interesse</option></select><button class="btn gold full" onclick="addAgenda()">Salvar anotação</button></div><div class="card span8 pad"><h3>Minhas anotações privadas</h3>${notes.map(n=>`<div class="post"><div class="avatar">📒</div><div><b>${n.casal}</b><p>${n.obs}</p><span class="pill">${n.ret}</span> <span class="pill">${n.status}</span></div></div>`).join('')||'<p class="mut">Nenhuma anotação ainda.</p>'}</div></div>`}
function addAgenda(){let n=ls('sx_agenda',[]);n.unshift({casal:agCasal.value,tel:agTel.value,ret:agRet.value,obs:agObs.value,status:agStatus.value,user:state.user.email});save('sx_agenda',n);pageAgenda()}
function pageBordero(){page.innerHTML=`<div class="grid"><div class="card span4 pad"><h3>💰 Borderô Inteligente</h3><input id="bdProf" value="${state.user.nome||''}" placeholder="Profissional"><input id="bdData" type="date"><input id="bdCli" placeholder="Nome do casal"><input id="bdCon" placeholder="Consultor"><input id="bdVgv" type="number" placeholder="VGV / valor da cota"><input id="bdEnt" type="number" placeholder="Entrada"><select id="bdForma"><option>PIX</option><option>CRÉDITO</option></select><button class="btn gold full" onclick="saveBordero()">Salvar borderô</button><p class="mut">Comissão promotor = 1% do VGV. PIX: dia 25. Crédito: 60 dias.</p></div><div class="card span8 pad"><h3>Simulador</h3><div class="big" id="simCom">Digite o VGV</div><p class="mut">Entrada 2% sugerida • comissão 1% VGV</p></div></div>`;bdVgv.oninput=()=>simCom.innerHTML='Comissão: '+money((+bdVgv.value||0)*.01)+' • Entrada 2%: '+money((+bdVgv.value||0)*.02)}
async function saveBordero(){const v=+bdVgv.value||0, forma=bdForma.value; const prev=forma==='PIX'?'Dia 25 do próximo pagamento':'60 dias'; const row={profissional:bdProf.value,data_venda:bdData.value,cliente:bdCli.value,consultor:bdCon.value,valor_cota:v,entrada:+bdEnt.value||0,forma_pagamento:forma,comissao:v*.01,observacao:'Previsão: '+prev}; if(supa){let {error}=await supa.from('bordero').insert(row); if(error) alert('Salvo localmente. Erro Supabase: '+error.message);}let b=ls('sx_bordero',[]);b.unshift(row);save('sx_bordero',b);alert('Borderô salvo. Comissão: '+money(row.comissao));}
function pageLiga(){const rows=activePeople(aggBy(records(),'promotor')).slice(0,15).map(x=>({...x,vgv:x.casais*10+x.vendas*50+(x.casais>=35?100:0)}));page.innerHTML=`<div class="card pad"><h3>🎮 Liga SX</h3><p class="mut">Casal = 10 pts • Venda = 50 pts • Meta batida = 100 pts</p>${rankTable(rows)}</div>`}
function pagePontos(){page.innerHTML=`<div class="grid"><div class="card span12 pad"><h3>📍 Pontos de Captação</h3>${PONTOS.map(p=>`<span class="pill">${p}</span>`).join('')}<br><br><div class="tableWrap"><table><tr><th>Ponto</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th></tr>${PONTOS.map((p,i)=>`<tr><td>${p}</td><td>${Math.floor(Math.random()*22)+2}</td><td>${Math.floor(Math.random()*6)}</td><td>${money((Math.floor(Math.random()*9)+1)*87000)}</td><td>${(Math.random()*35+5).toFixed(1)}%</td></tr>`).join('')}</table></div></div></div>`}
function pageCal(){const days=[...new Set(records().map(r=>r.data.slice(-2)))].sort();page.innerHTML=`<div class="grid"><div class="card span5 pad"><h3>📅 Calendário SX</h3><div class="calendarGrid">${days.map(d=>`<button class="calDay" onclick="dayDetail('${d}')">${d}<span>${records().filter(r=>r.data.endsWith('-'+d)).length} casais</span><small>Ver dia</small></button>`).join('')}</div></div><div class="card span7 pad" id="dayBox"><h3>Resultado do dia</h3><p class="mut">Clique em um dia.</p></div></div>`}
function dayDetail(d){const rr=records().filter(r=>r.data.endsWith('-'+d));const t=totals(rr);dayBox.innerHTML=`<h3>Dia ${d}</h3><div class="grid">${kpi('Casais',t.casais)}${kpi('Vendas',t.vendas)}${kpi('VGV',money(t.vgv))}</div>${rankTable(aggBy(rr,'promotor').sort((a,b)=>b.vgv-a.vgv).slice(0,10))}`;}
function pageInativos(){const rows=aggBy(records(),'promotor').filter(x=>x.status==='INATIVO');page.innerHTML=`<div class="card pad"><h3>📂 Inativos</h3><p class="mut">Resultados continuam contando para meta e histórico; eles apenas ficam fora da Liga SX e no final das listas.</p>${rankTable(rows)}</div>`}
function pageCEO(){if(state.user.perfil!=='CEO'){page.innerHTML='<div class="card pad"><h3>Acesso restrito ao CEO</h3></div>';return}const people=Object.values(teamMap()).sort((a,b)=>a.nome.localeCompare(b.nome));page.innerHTML=`<div class="grid"><div class="card span4 pad"><h3>👑 Central CEO</h3><input id="ceoNome" placeholder="Nome profissional"><input id="ceoCpf" placeholder="CPF"><input id="ceoEmail" placeholder="E-mail"><select id="ceoEquipe"><option>PARK</option><option>EXTERNA</option></select><select id="ceoFuncao"><option>PROMOTOR</option><option>LINER</option><option>CLOSER</option><option>GESTOR</option></select><select id="ceoStatus"><option>ATIVO</option><option>INATIVO</option></select><button class="btn gold full" onclick="savePersonCEO()">Salvar pessoa</button></div><div class="card span8 pad"><h3>Gestão de pessoas</h3><div class="tableWrap"><table><tr><th>Nome</th><th>Equipe</th><th>Função</th><th>Status</th></tr>${people.map(p=>`<tr><td>${p.nome}</td><td>${p.equipe}</td><td>${p.funcao||'PROMOTOR'}</td><td>${p.status}</td></tr>`).join('')}</table></div></div><div class="card span12 pad"><h3>⚙️ Configurações do Dono</h3><p class="mut">Altere metas, comissões, prazos, mural, desafios, pontos, gestores e permissões direto no app.</p></div></div>`}
function savePersonCEO(){let arr=ls('sx_people',[]).filter(p=>norm(p.nome)!==norm(ceoNome.value));arr.push({nome:ceoNome.value,cpf:ceoCpf.value,email:ceoEmail.value,equipe:ceoEquipe.value,funcao:ceoFuncao.value,status:ceoStatus.value});save('sx_people',arr);alert('Pessoa salva/atualizada.');pageCEO()}
async function pageAcessos(){if(state.user.perfil!=='CEO'&&state.user.perfil!=='GESTOR'){page.innerHTML='<div class="card pad"><h3>Acesso restrito</h3></div>';return}let rows=[]; if(supa){const res=await supa.from('acessos').select('*').order('criado_em',{ascending:false}); rows=res.data||[]} page.innerHTML=`<div class="card pad"><h3>🔐 Aprovações</h3><p class="mut">Aprovar acesso de profissionais, gestores e equipe SX.</p><div class="tableWrap"><table><tr><th>Nome</th><th>Email</th><th>Empresa</th><th>Função</th><th>Aprovado</th><th>Ação</th></tr>${rows.map(r=>`<tr><td>${r.nome}</td><td>${r.email}</td><td>${r.empresa||''}</td><td>${r.funcao||''}</td><td>${r.aprovado?'✅':'⏳'}</td><td><button class="btn green" onclick="aprovar('${r.email}',true)">Aprovar</button> <button class="btn red" onclick="aprovar('${r.email}',false)">Bloquear</button></td></tr>`).join('')}</table></div></div>`}
async function aprovar(email,val){if(supa) await supa.from('acessos').update({aprovado:val}).eq('email',email); pageAcessos()}
renderLogin();
</script></body></html>
