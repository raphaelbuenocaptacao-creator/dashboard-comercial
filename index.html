function viewExec(){let t=totals();shell(`<div class="grid">${kpi('Casais',fmt(t.casais))}${kpi('Vendas',fmt(t.vendas))}${kpi('VGV',money(t.vgv),'gold')}${kpi('PARK',t.park)}${kpi('EXTERNA',t.externa)}${kpi('Meta Maio','590')}<div class="card pad span6"><h3>🌳 PARK x 🚀 EXTERNA</h3><div class="big">${t.park} x ${t.externa}</div><div class="bar"><i style="width:${t.park/(t.park+t.externa)*100}%"></i></div><p class="mut">Inativos continuam contando na meta.</p></div><div class="card pad span6"><h3>🪙 Capital Fractions</h3><div class="big">1 XP = 100 pontos</div><p class="mut">Ranking, apostas, extrato e mercado de recompensas.</p></div></div>`,'Executivo SX','Visão geral da operação')}
function rankTable(rows,key='vgv'){rows=rankBy(rows,key);return `<div class="tableWrap"><table><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th><th>XP</th><th>Pontos</th><th>Comissão</th></tr>${rows.map((x,i)=>`<tr><td>${i+1}</td><td>${i<3?'🏆 ':'👤 '}${x.nome}</td><td>${x.casais}</td><td>${x.vendas}</td><td>${money(x.vgv)}</td><td>${(x.ef||0).toFixed(1)}%</td><td><span class="coin">${x.xp} XP</span></td><td>${fmt(x.pontos)}</td><td>${money(x.comissao)}</td></tr>`).join('')}</table></div>`}
function viewRankings(){let prom=summarizeBy('promotor'), liners=summarizeBy('liner'), closers=summarizeBy('closer');shell(`<div class="grid"><div class="card pad span12"><h3>🏆 Ranking Geral SX</h3><p class="mut">Ranking por função e por métrica.</p></div><div class="card pad span6"><h3>📣 Promotores — VGV</h3>${rankTable(prom,'vgv')}</div><div class="card pad span6"><h3>📣 Promotores — Casais</h3>${rankTable(prom,'casais')}</div><div class="card pad span6"><h3>🎧 Liners — Vendas Geradas</h3>${rankTable(liners,'vendas')}</div><div class="card pad span6"><h3>🎧 Liners — VGV Gerado</h3>${rankTable(liners,'vgv')}</div><div class="card pad span6"><h3>🤝 Closers — Vendas</h3>${rankTable(closers,'vendas')}</div><div class="card pad span6"><h3>🤝 Closers — Ticket/VGV</h3>${rankTable(closers,'vgv')}</div><div class="card pad span12"><h3>🪙 Ranking XP Fractions</h3>${rankTable([...prom,...liners,...closers],'xp')}</div></div>`,'Rankings SX','Promotores, Liners, Fechadores e XP Fractions')}
async function criarAposta(){let row={criador:state.user.nome,email_criador:state.user.email,desafiado:apDesafiado.value,tipo:apTipo.value,criterio:apCriterio.value,valor_xp:Number(apValor.value||0),pote_xp:Number(apValor.value||0)*2,status:'PENDENTE',vencedor:null};state.arena.unshift(row);try{if(supa)await supa.from('arena_fractions').insert(row)}catch(e){}viewArena()}
async function finalizarAposta(i){let win=prompt('Quem venceu? Digite o nome:'); if(!win)return; state.arena[i].vencedor=win;state.arena[i].status='FINALIZADA'; state.extrato.unshift({profissional:win,tipo:'GANHO_ARENA',quantidade:state.arena[i].pote_xp,descricao:'Ganhou aposta Arena Fractions'});try{if(supa){await supa.from('arena_fractions').update({vencedor:win,status:'FINALIZADA'}).eq('id',state.arena[i].id);await supa.from('xp_fractions_extrato').insert({profissional:win,tipo:'GANHO_ARENA',quantidade:state.arena[i].pote_xp,descricao:'Ganhou aposta Arena Fractions'})}}catch(e){}viewArena()}
function viewArena(){let list=state.arena.length?state.arena:[{criador:'Pedro Henrique',desafiado:'Adriano Moreira',tipo:'Pessoa x Pessoa',criterio:'Mais casais hoje',valor_xp:50,pote_xp:100,status:'EM CUSTÓDIA'}];shell(`<div class="grid"><div class="card pad span5"><h3>⚔️ Criar aposta</h3><label>Desafiar quem?</label><input id="apDesafiado" placeholder="Nome do profissional ou equipe"><label>Tipo</label><select id="apTipo"><option>Pessoa x Pessoa</option><option>PARK x EXTERNA</option><option>Desafio Aberto</option><option>Liner x Liner</option><option>Closer x Closer</option><option>Promotor x Promotor</option></select><label>Critério</label><select id="apCriterio"><option>Mais casais hoje</option><option>Mais vendas hoje</option><option>Maior VGV hoje</option><option>Maior eficiência</option><option>Ranking da semana</option><option>Ranking do mês</option></select><label>Valor da aposta em XP Fractions</label><input id="apValor" type="number" value="50"><p class="mut">O banco segura o pote. O gestor define o vencedor e libera os XP Fractions.</p><button class="btn gold" onclick="criarAposta()">Criar aposta</button></div><div class="card pad span7"><h3>🏦 Potes ativos do dia</h3><div class="tableWrap"><table><tr><th>#</th><th>Criador</th><th>Desafiado</th><th>Tipo</th><th>Critério</th><th>Pote</th><th>Status</th><th>Ação</th></tr>${list.map((a,i)=>`<tr><td>${i+1}</td><td>${a.criador}</td><td>${a.desafiado}</td><td>${a.tipo}</td><td>${a.criterio}</td><td><span class="coin">${a.pote_xp} XP</span></td><td>${a.status}</td><td>${isGestor()?`<button class="btn green" onclick="finalizarAposta(${i})">Definir vencedor</button>`:'Aguardando gestor'}</td></tr>`).join('')}</table></div></div><div class="card pad span12"><h3>📜 Regras da Arena</h3><p>Podem existir várias apostas no mesmo dia. O banco segura os pontos em custódia e o CEO/Gestor libera para o vencedor.</p></div></div>`,'Arena Fractions','Apostas internas com Capital Fractions')}
function viewCapital(){let rows=summarizeBy('promotor');shell(`<div class="grid">${kpi('Seu saldo XP','1.240','gold')}${kpi('Pontos','124.000')}${kpi('Apostas abertas',state.arena.length||1)}${kpi('Mercado','7 prêmios')}${kpi('Top XP',rankBy(rows,'xp')[0]?.nome||'-')}${kpi('Conversão','1 XP = 100 pts')}<div class="card pad span6"><h3>🏦 Extrato Capital Fractions</h3><table><tr><th>Tipo</th><th>Descrição</th><th>XP</th></tr><tr><td>Venda</td><td>Venda registrada</td><td>+10 XP</td></tr><tr><td>Casal</td><td>Casal Q</td><td>+1 XP</td></tr><tr><td>Arena</td><td>Aposta ganha</td><td>+100 XP</td></tr></table></div><div class="card pad span6"><h3>🎁 Mercado Fractions</h3><table><tr><th>Prêmio</th><th>Custo</th></tr><tr><td>Vale R$20</td><td>500 XP</td></tr><tr><td>Vale R$50</td><td>1.000 XP</td></tr><tr><td>Vale R$100</td><td>2.000 XP</td></tr><tr><td>Day Off</td><td>5.000 XP</td></tr></table></div></div>`,'Capital Fractions','Banco interno com XP Fractions')}
function viewMeu(){let nome=state.user.nome||'';let me=summarizeBy('promotor').find(x=>norm(x.nome).includes(norm(nome).split(' ')[0]))||summarizeBy('promotor')[0];shell(`<div class="grid"><div class="card pad span5"><div class="avatar">${initials(me.nome)}</div><h2>${me.nome}</h2><p class="mut">Área individual por nome + CPF</p><span class="pill">🥇 ${me.xp>100?'Ouro':'Bronze'}</span> <span class="pill">🪙 ${me.xp} XP</span></div>${kpi('Casais',me.casais)}${kpi('Vendas',me.vendas)}${kpi('VGV',money(me.vgv),'gold')}${kpi('Comissão 1%',money(me.comissao),'green')}<div class="card pad span6"><h3>🎯 Meta individual</h3><p>Casais: ${me.casais}/35</p><div class="bar gold"><i style="width:${Math.min(100,me.casais/35*100)}%"></i></div><p>Vendas: ${me.vendas}/10</p><div class="bar"><i style="width:${Math.min(100,me.vendas/10*100)}%"></i></div></div><div class="card pad span6"><h3>🏅 Conquistas</h3><p>🏅 Primeira venda</p><p>🏅 10 casais</p><p>🏆 Ranking ativo</p></div></div>`,'Meu Painel Individual','Somente dados do profissional')}
function viewPulse(){shell(`<div class="grid"><div class="card pad span12"><h3>⚡ Stories SX</h3><div class="actions"><span class="pill">Meta do dia</span><span class="pill">Top VGV</span><span class="pill">Desafio</span><span class="pill">Hall</span></div></div><div class="card pad span5"><h3>Novo Post</h3><textarea placeholder="Publique resultado, venda ou conquista"></textarea><br><button class="btn gold">Publicar</button></div><div class="card pad span7"><h3>Feed SX Pulse</h3><div class="post"><b>Raphael Bueno</b><p>🚀 Bem-vindos ao SX Pulse V42 com Arena Fractions.</p>❤️ 31 💬 6</div><div class="post"><b>IA SX</b><p>🏆 Ranking por função liberado: promotores, liners e fechadores.</p>❤️ 18 💬 2</div></div></div>`,'SX Pulse','Rede social interna')}
function viewHall(){shell(`<div class="grid"><div class="card pad span4"><h3>🥇 Top VGV</h3><div class="big">André</div><p>${money(1134000)}</p></div><div class="card pad span4"><h3>🥇 Top Casais</h3><div class="big">Ana</div><p>38 casais</p></div><div class="card pad span4"><h3>🥇 Top XP</h3><div class="big">Adriano</div><p>180 XP</p></div></div>`,'Hall da Fama','Reconhecimento permanente')}
function viewAgenda(){shell(`<div class="grid"><div class="card pad span5"><h3>Nova anotação</h3><label>Casal</label><input><label>Telefone</label><input><label>Retorno</label><input type="date"><label>Observação</label><textarea></textarea><button class="btn gold">Salvar</button></div><div class="card pad span7"><h3>Minha Agenda</h3><p class="mut">Somente o profissional vê. CEO pode consultar tudo.</p></div></div>`,'Agenda Inteligente','CRM pessoal')}
function viewBordero(){shell(`<div class="grid"><div class="card pad span5"><h3>Borderô</h3><label>Cliente</label><input><label>Consultor</label><input><label>VGV vendido</label><input type="number" oninput="boCom.innerHTML='Comissão 1%: '+(Number(this.value||0)*0.01).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})"><label>Forma</label><select><option>PIX</option><option>Cartão de Crédito</option></select><p id="boCom" class="gold">Comissão 1%: R$ 0</p><button class="btn gold">Salvar Borderô</button></div><div class="card pad span7"><h3>Regras</h3><p>PIX: próximo dia 25. Cartão: 60 dias. Comissão: 1% do VGV vendido.</p></div></div>`,'Borderô Inteligente','Comissão 1% VGV')}
function viewPontos(){shell(`<div class="grid">${PONTOS.map((p,i)=>`<div class="card pad span3"><h3>${p}</h3><p>Casais: ${i%6}</p><p>Vendas: ${i%3}</p><p>VGV: ${money((i%5)*87000)}</p></div>`).join('')}</div>`,'Pontos de Captação','Raphael x Francisco por local')}
function viewRelatorios(){let reps=['Executivo CEO','PARK x EXTERNA','Promotores','Liners','Fechadores','Pontos de captação','Capital Fractions','Arena Fractions','Borderô','Comissões','Agenda/CRM','SX Pulse social','Hall da Fama','Inativos','Previsão de meta','Ranking por horário','Ranking por dia da semana','Funil casal → venda → VGV'];shell(`<div class="grid">${reps.map(r=>`<div class="card pad span4"><h3>${r}</h3><p class="mut">Relatório disponível na V42.</p></div>`).join('')}</div>`,'Relatórios Premium','Todos os relatórios possíveis para gestão')}
function viewCEO(){shell(`<div class="grid"><div class="card pad span12"><h3>👑 Central CEO</h3><p>Controle pessoas, metas, gestores, pontos, Capital Fractions, Arena, Mercado, Mural, Hall da Fama e permissões.</p></div>${['Aprovar acessos','Ativar/Inativar','Editar equipe','Criar gestores','Metas','Regras XP','Mercado Fractions','Apostas','Definir vencedor','Mural','Pontos','Relatórios'].map(x=>`<div class="card pad span3"><h3>${x}</h3><button class="btn gold">Abrir</button></div>`).join('')}</div>`,'Central CEO','Você é o dono do projeto')}
(function init(){try{state.user=JSON.parse(localStorage.getItem('sx_user')||'null')}catch(e){} if(state.user)renderApp(); else renderLogin()})()
</script></body></html>
