let state={user:null,view:'comando',posts:[],arena:[],extrato:[]};
const $=id=>document.getElementById(id);
const fmt=n=>(n||0).toLocaleString('pt-BR');
const money=n=>(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const norm=s=>(s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
const initials=n=>String(n||'SX').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'SX';
function isCEO(){return (state.user?.email||'').toLowerCase()===CEO_EMAIL || (state.user?.perfil||'').toUpperCase()==='CEO'}
function isGestor(){return isCEO() || ['GESTOR','CEO'].includes((state.user?.perfil||'').toUpperCase())}
function xpOf(x){return (x.casais||0)*1 + (x.vendas||0)*10 + ((x.vgv||0)>=500000?20:0)}
function pontosOf(x){return xpOf(x)*100}
function rankBy(rows,key){return [...rows].sort((a,b)=>(b[key]||0)-(a[key]||0))}
function summarizeBy(role){let m={}; SAMPLE.forEach(r=>{let n=r[role]||'Sem nome'; if(!m[n])m[n]={nome:n,casais:0,vendas:0,vgv:0,cancel:0,xp:0,pontos:0,ef:0,status:'ATIVO'};m[n].casais+=r.casais||0;m[n].vendas+=r.vendas||0;m[n].vgv+=r.vgv||0;m[n].cancel+=r.cancel||0;m[n].status=r.status||m[n].status});Object.values(m).forEach(x=>{x.ef=x.casais?x.vendas/x.casais*100:0;x.xp=xpOf(x);x.pontos=pontosOf(x);x.comissao=x.vgv*.01});return Object.values(m)}
function totals(){let t={casais:438,vendas:118,vgv:10030000,park:303,externa:135};return t}
async function login(){let email=($('loginEmail').value||'').trim().toLowerCase(); if(!email)return alert('Digite seu e-mail.'); let user={nome:email.includes('raphael')?'Raphael Bueno':'Profissional SX',email,perfil:email===CEO_EMAIL?'CEO':'PROFISSIONAL',empresa:'SX'}; try{if(supa){let {data}=await supa.from('acessos').select('*').eq('email',email).eq('aprovado',true).maybeSingle(); if(data)user={...user,...data}; else if(email!==CEO_EMAIL) return alert('Acesso ainda não aprovado. Solicite acesso.')}}catch(e){} localStorage.setItem('sx_user',JSON.stringify(user));state.user=user;renderApp()}
async function solicitar(){let row={nome:reqNome.value,email:reqEmail.value,empresa:reqEmpresa.value,funcao:reqFuncao.value,aprovado:false,cpf:reqCpf.value,perfil:'PROFISSIONAL'}; try{if(supa)await supa.from('acessos').insert(row);alert('Solicitação enviada. Aguarde aprovação.')}catch(e){alert('Não consegui enviar online. Verifique permissões do Supabase.')}}
function renderLogin(){root.innerHTML=`<div class="login"><div class="loginCard"><div class="logoBig">🧠</div><br><h1>SX Pulse</h1><p class="mut">Controle de Resultado Local • Centro de Comando IA • Capital Fractions</p><label>E-mail aprovado</label><input id="loginEmail" placeholder="seuemail@gmail.com"><br><br><button class="btn gold full" onclick="login()">Entrar</button><br><br><div class="card pad"><h3>Solicitar acesso</h3><label>Nome</label><input id="reqNome"><label>CPF</label><input id="reqCpf"><label>E-mail</label><input id="reqEmail"><label>Equipe/Empresa</label><input id="reqEmpresa" placeholder="PARK ou EXTERNA"><label>Função</label><select id="reqFuncao"><option>Promotor</option><option>Liner</option><option>Closer</option><option>Gestor</option></select><br><button class="btn full" onclick="solicitar()">Enviar solicitação</button></div></div></div>`}
function shell(content,title='SX Pulse',sub='Controle de Resultado Local'){root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">🧠</div><div><b>SX Pulse</b><div class="mut">Controle Local</div></div></div><nav class="nav">${nav('comando','🧠 Mapa IA')}${nav('exec','📊 Executivo')}${nav('rankings','🏆 Rankings')}${nav('arena','⚔️ Arena Fractions')}${nav('capital','🏦 Capital Fractions')}${nav('meu','👤 Meu Painel')}${nav('pulse','📱 SX Pulse')}${nav('hall','🏆 Hall da Fama')}${nav('agenda','📒 Agenda')}${nav('pontos','📍 Pontos')}${nav('relatorios','📈 Relatórios')}${nav('ceo','👑 Central CEO')}</nav><div class="profile"><div class="profileAvatar">${initials(state.user?.nome)}</div><b>${state.user?.nome||''}</b><p class="mut">${state.user?.perfil||'Profissional'} • Online</p><button class="btn full" onclick="localStorage.removeItem('sx_user');state.user=null;renderLogin()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${title}</h2><div class="mut">${sub}</div></div><div class="actions"><span class="pill">🟢 Online</span><span class="pill">${isCEO()?'👑 CEO':'✅ Aprovado'}</span><span class="pill">Versão ${APP_VERSION}</span></div></div>${content}<footer class="versionFooter"><b>SX Pulse — Capital Fractions</b><span>Versão ${APP_VERSION} • 1 XP Fraction = 100 pontos</span></footer></main></div>`}
function nav(v,t){return `<button class="${state.view===v?'active':''}" onclick="go('${v}')">${t}</button>`}
function go(v){state.view=v;renderApp()}
function renderApp(){({comando:viewComando,exec:viewExec,rankings:viewRankings,arena:viewArena,capital:viewCapital,meu:viewMeu,pulse:viewPulse,hall:viewHall,agenda:viewAgenda,pontos:viewPontos,relatorios:viewRelatorios,ceo:viewCEO}[state.view]||viewComando)()}
function iaBox(){let t=totals();return `${pulsadorHTML()}<div class="grid compactKpis">${kpi('Casais Geral',fmt(t.casais))}${kpi('PARK',fmt(t.park),'green')}${kpi('EXTERNA',fmt(t.externa),'blue')}${kpi('VGV Maio',money(t.vgv),'gold')}${kpi('Meta Junho','720')}${kpi('XP Fractions Hoje','1.240','gold')}</div><br><div class="noticeAI"><h3>🧠 IA SX Online</h3><p>Central viva com projeções de meta, ranking por pontos, Arena Fractions, Capital Fractions, equipe PARK x EXTERNA e alertas de performance. O mapa abaixo não usa mais "portais de entrada"; agora ele mostra <b>portais de entrada</b> para cada área do sistema.</p><div><span class="entryTag">Entrada Executivo</span><span class="entryTag">Entrada Rankings</span><span class="entryTag">Entrada Arena</span><span class="entryTag">Entrada Capital</span><span class="entryTag">Entrada CEO</span></div></div><br>${projectionHTML()}`}
function kpi(l,n,c=''){return `<div class="card pad kpi"><div class="lab">${l}</div><div class="num ${c}">${n}</div></div>`}

function projectionHTML(){let t=totals(), dias=31, hoje=15, ritmoCasais=Math.round(t.casais/hoje), ritmoVendas=Math.round(t.vendas/hoje), ritmoVgv=Math.round(t.vgv/hoje);let projCasais=ritmoCasais*dias, projVendas=ritmoVendas*dias, projVgv=ritmoVgv*dias;return `<div class="grid"><div class="card pad span4"><h3>📈 Projeção de Casais</h3><div class="big">${fmt(projCasais)}</div><p class="mut">Ritmo atual: ${ritmoCasais}/dia • Meta Junho: 720</p><div class="bar gold"><i style="width:${Math.min(100,projCasais/720*100)}%"></i></div></div><div class="card pad span4"><h3>🏆 Projeção de Vendas</h3><div class="big">${fmt(projVendas)}</div><p class="mut">Ritmo atual: ${ritmoVendas}/dia • Meta Junho: 180</p><div class="bar"><i style="width:${Math.min(100,projVendas/180*100)}%"></i></div></div><div class="card pad span4"><h3>💰 Projeção de VGV</h3><div class="big">${money(projVgv)}</div><p class="mut">Ritmo atual: ${money(ritmoVgv)}/dia • Meta Junho: R$ 15MM</p><div class="bar"><i style="width:${Math.min(100,projVgv/15000000*100)}%"></i></div></div></div>`}
function pulsadorHTML(){let t=totals();return `<div class="pulseBoard"><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso Operacional</div><div class="num">${fmt(t.casais)} casais</div><p class="mut">Geral monitorado em tempo real visual.</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso VGV</div><div class="num">${money(t.vgv)}</div><p class="mut">Projeção ativa por ritmo.</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso Arena</div><div class="num">${state.arena.length||1} pote ativo</div><p class="mut">Capital em custódia.</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso IA</div><div class="num">Online</div><p class="mut">Alertas, portais de entrada e mapas.</p></div></div>`}
function map3DHTML(){return `<div class="map3d"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="ring r4"></div><div class="core3d">🧠<small>IA SX<br>Centro de Comando</small></div><div class="node3d" style="left:7%;top:8%" onclick="go('exec')">📊<b>Entrada Executivo</b><small>Meta, projeções e operação</small></div><div class="node3d" style="right:7%;top:8%" onclick="go('rankings')">🏆<b>Entrada Rankings</b><small>Promotores, Liners e Fechadores</small></div><div class="node3d" style="left:3%;top:40%" onclick="go('arena')">⚔️<b>Entrada Arena</b><small>Apostas e desafios do dia</small></div><div class="node3d" style="right:3%;top:40%" onclick="go('capital')">🏦<b>Entrada Capital</b><small>XP Fractions, extrato e mercado</small></div><div class="node3d" style="left:8%;bottom:8%" onclick="go('pontos')">📍<b>Entrada Pontos</b><small>Ranking por local e eficiência</small></div><div class="node3d" style="right:8%;bottom:8%" onclick="go('pulse')">📱<b>Entrada Social</b><small>Feed interno e mural SX</small></div><div class="node3d" style="left:44%;top:3%" onclick="go('meu')">👤<b>Entrada Individual</b><small>Perfil, meta e agenda pessoal</small></div><div class="node3d" style="left:44%;bottom:3%" onclick="go('ceo')">👑<b>Entrada CEO</b><small>Controle total e permissões</small></div></div>`}

function viewComando(){shell(`${pulsadorHTML()}${map3DHTML()}<br>${iaBox()}`,'Mapa SX 3D Inteligente','Entre por portais de entrada: Executivo, Rankings, Arena, Capital, Pontos, Pulse e CEO')}
function viewExec(){let t=totals();shell(`<div class="grid">${kpi('Casais',fmt(t.casais))}${kpi('Vendas',fmt(t.vendas))}${kpi('VGV',money(t.vgv),'gold')}${kpi('PARK',t.park)}${kpi('EXTERNA',t.externa)}${kpi('Meta Junho','720')}<div class="card pad span6"><h3>🌳 PARK x 🚀 EXTERNA</h3><div class="big">${t.park} x ${t.externa}</div><div class="bar"><i style="width:${t.park/(t.park+t.externa)*100}%"></i></div><p class="mut">Inativos continuam contando na meta.</p></div><div class="card pad span6"><h3>🧠 Projeção IA</h3><div class="big">Ritmo Forte</div><p class="mut">A IA compara atual, meta e tendência de fechamento.</p></div></div><br>${projectionHTML()}<br>${pulsadorHTML()}`,'Executivo SX','Visão geral com projeções e pulsador')}
function rankTable(rows,key='vgv'){rows=rankBy(rows,key);return `<div class="tableWrap"><table><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Eficiência</th><th>XP</th><th>Pontos</th></tr>${rows.map((x,i)=>`<tr><td>${i+1}</td><td>${i<3?'🏆 ':'👤 '}${x.nome}</td><td>${x.casais}</td><td>${x.vendas}</td><td>${money(x.vgv)}</td><td>${(x.ef||0).toFixed(1)}%</td><td><span class="coin">${x.xp} XP</span></td><td>${fmt(x.pontos)}</td></tr>`).join('')}</table></div>`}
function viewRankings(){let prom=summarizeBy('promotor'), liners=summarizeBy('liner'), closers=summarizeBy('closer');shell(`<div class="grid"><div class="card pad span12"><h3>🏆 Ranking Geral SX</h3><p class="mut">Ranking por função e por métrica.</p></div><div class="card pad span6"><h3>📣 Promotores — VGV</h3>${rankTable(prom,'vgv')}</div><div class="card pad span6"><h3>📣 Promotores — Casais</h3>${rankTable(prom,'casais')}</div><div class="card pad span6"><h3>🎧 Liners — Vendas Geradas</h3>${rankTable(liners,'vendas')}</div><div class="card pad span6"><h3>🎧 Liners — VGV Gerado</h3>${rankTable(liners,'vgv')}</div><div class="card pad span6"><h3>🤝 Closers — Vendas</h3>${rankTable(closers,'vendas')}</div><div class="card pad span6"><h3>🤝 Closers — Ticket/VGV</h3>${rankTable(closers,'vgv')}</div><div class="card pad span12"><h3>🪙 Ranking XP Fractions</h3>${rankTable([...prom,...liners,...closers],'xp')}</div></div>`,'Rankings SX','Promotores, Liners, Fechadores e XP Fractions')}
async function criarAposta(){let row={criador:state.user.nome,email_criador:state.user.email,desafiado:apDesafiado.value,tipo:apTipo.value,criterio:apCriterio.value,valor_xp:Number(apValor.value||0),pote_xp:Number(apValor.value||0)*2,status:'PENDENTE',vencedor:null};state.arena.unshift(row);try{if(supa)await supa.from('arena_fractions').insert(row)}catch(e){}viewArena()}
async function finalizarAposta(i){let win=prompt('Quem venceu? Digite o nome:'); if(!win)return; state.arena[i].vencedor=win;state.arena[i].status='FINALIZADA'; state.extrato.unshift({profissional:win,tipo:'GANHO_ARENA',quantidade:state.arena[i].pote_xp,descricao:'Ganhou aposta Arena Fractions'});try{if(supa){await supa.from('arena_fractions').update({vencedor:win,status:'FINALIZADA'}).eq('id',state.arena[i].id);await supa.from('xp_fractions_extrato').insert({profissional:win,tipo:'GANHO_ARENA',quantidade:state.arena[i].pote_xp,descricao:'Ganhou aposta Arena Fractions'})}}catch(e){}viewArena()}

function viewCapital(){let rows=summarizeBy('promotor');shell(`<div class="grid">${kpi('Seu saldo XP','1.240','gold')}${kpi('Pontos','124.000')}${kpi('Apostas abertas',state.arena.length||1)}${kpi('Mercado','7 prêmios')}${kpi('Top XP',rankBy(rows,'xp')[0]?.nome||'-')}${kpi('Conversão','1 XP = 100 pts')}<div class="card pad span6"><h3>🏦 Extrato Capital Fractions</h3><table><tr><th>Tipo</th><th>Descrição</th><th>XP</th></tr><tr><td>Venda</td><td>Venda registrada</td><td>+10 XP</td></tr><tr><td>Casal</td><td>Casal Q</td><td>+1 XP</td></tr><tr><td>Arena</td><td>Aposta ganha</td><td>+100 XP</td></tr></table></div><div class="card pad span6"><h3>🎁 Mercado Fractions</h3><table><tr><th>Prêmio</th><th>Custo</th></tr><tr><td>Vale R$20</td><td>500 XP</td></tr><tr><td>Vale R$50</td><td>1.000 XP</td></tr><tr><td>Vale R$100</td><td>2.000 XP</td></tr><tr><td>Day Off</td><td>5.000 XP</td></tr></table></div></div><br><div class="grid"><div class="card pad span6"><h3>📈 Projeção Capital Fractions</h3><div class="big">2.480 XP</div><p class="mut">Projeção se manter o ritmo atual de vendas, casais e apostas ganhas.</p></div><div class="card pad span6"><h3>⚔️ Projeção Arena</h3><div class="big">${(state.arena.length||1)*200} XP</div><p class="mut">Potes possíveis em custódia no dia.</p></div></div>`,'Capital Fractions','Banco interno com XP Fractions, projeções e mercado')}

function viewPontos(){let cards=PONTOS.map((p,i)=>{let cas=i%6,v=i%3,vgv=(i%5)*87000,ef=cas?((v/cas)*100).toFixed(1):'0.0';return `<div class="card pad span3"><h3>${p}</h3><p>Casais: ${cas}</p><p>Vendas: ${v}</p><p>VGV: ${money(vgv)}</p><p>Eficiência: ${ef}%</p><div class="projection"><b>Projeção:</b> ${fmt(cas*30)} casais/mês • ${money(vgv*30)}</div></div>`}).join('');shell(`<div class="filterBar"><select><option>Período: Hoje</option><option>Semana</option><option>Mês</option><option>Personalizado</option></select><select><option>Ordenar por Casais</option><option>Ordenar por VGV</option><option>Ordenar por Eficiência</option><option>Ordenar por Vendas</option></select><input type="date"><input type="date"></div><div class="grid">${cards}</div>`,'Pontos de Captação','Ranking por ponto com filtros de período, eficiência, VGV e quantidade de casais')}
function viewRelatorios(){let t=totals(), prom=summarizeBy('promotor'), liners=summarizeBy('liner'), closers=summarizeBy('closer');let cards=[['Executivo CEO',`Casais ${fmt(t.casais)} • Vendas ${fmt(t.vendas)} • VGV ${money(t.vgv)}`,'Projeção mensal, meta, eficiência e visão geral.'],['PARK x EXTERNA',`PARK ${fmt(t.park)} x EXTERNA ${fmt(t.externa)}`,'Comparativo de equipes com participação no resultado.'],['Promotores',`${rankBy(prom,'vgv')[0]?.nome||'-'} lidera em VGV`,'Casais, vendas, VGV, eficiência e XP Fractions.'],['Liners',`${rankBy(liners,'vendas')[0]?.nome||'-'} lidera em vendas geradas`,'Atendimentos, vendas geradas, VGV e eficiência.'],['Fechadores',`${rankBy(closers,'vendas')[0]?.nome||'-'} lidera em fechamento`,'Vendas, VGV, ticket médio e eficiência.'],['Pontos de captação','Filtro por período, casais, VGV e eficiência','Ranking do melhor ponto por Raphael/Francisco.'],['Capital Fractions','Saldo, extrato, mercado e resgates','Banco interno com XP Fractions e conversão 1 XP = 100 pontos.'],['Arena Fractions',`${state.arena.length||1} aposta(s) aberta(s)`,'Potes em custódia, desafios e vencedor definido por CEO/CO-CEO.'],['Projeção de Meta','Previsão de casais, vendas e VGV','Cálculo do ritmo atual até o fim do mês.'],['Pulsador Geral','Operação viva em tempo real','Resumo rápido de alertas, metas e evolução.'],['Agenda/CRM','Anotações privadas por profissional','Follow-up de casais e detalhes importantes.'],['SX Pulse social','Feed, mural e comunicação interna','Posts, avisos e engajamento da equipe.'],['Hall da Fama','Top casais, vendas, VGV e XP','Reconhecimento mensal e histórico.'],['Inativos','Histórico preservado','Inativos saem das disputas, mas continuam no resultado histórico.'],['Funil casal → venda → VGV',`${fmt(t.casais)} casais → ${fmt(t.vendas)} vendas`,'Conversão comercial e eficiência geral.']];shell(`<div class="grid">${cards.map(c=>`<div class="card pad span4 reportCard"><h3>${c[0]}</h3><div class="metric"><span>${c[1]}</span><b>✅</b></div><small>${c[2]}</small></div>`).join('')}</div>`,'Relatórios Premium','Relatórios completos com números, projeções e visão CEO')}
function viewCEO(){let pessoas=['Ana Caroline','Adriano Moreira','André Carriço','Pedro Henrique','Francisco Antonio Rodrigues','Igor Sena dos Santos','Robson Allan do Nascimento','Larissa Vitória','Marcio Alfaia','Jessica Barbosa','Daniela Moura','Rebeca Braga Pinto'];let actions=[['Aprovar acessos','Liberar ou bloquear entrada dos profissionais.'],['Ativar/Inativar','Mudar status sem perder histórico.'],['Editar equipe','Mover PARK, EXTERNA, Liner ou Fechador.'],['Marcel CO-CEO','Visualização geral autorizada por Raphael.'],['Metas','Alterar meta do mês, dia e individual.'],['Regras XP','Definir quantos XP cada ação vale.'],['Mercado Fractions','Criar prêmios e custos em XP.'],['Arena Fractions','Ver apostas e potes em custódia.'],['Definir vencedor','Liberar pote para quem ganhou.'],['Mural','Publicar avisos para a equipe.'],['Pontos','Cadastrar e ordenar pontos de captação.'],['Relatórios','Abrir visão executiva completa.']];shell(`<div class="grid"><div class="card pad span12"><h3>👑 Central CEO</h3><p>Controle total do SX Pulse. Somente CEO Raphael e CO-CEO Marcel veem cancelamentos, configurações críticas e visualização geral autorizada.</p></div>${actions.map(x=>`<div class="card pad span3 ceoAction"><h3>${x[0]}</h3><p>${x[1]}</p><button class="btn gold" onclick="alert('Função registrada para controle CEO. Use o Supabase/Central CEO para salvar online quando habilitado.')">Abrir</button></div>`).join('')}<div class="card pad span12"><h3>👤 Todos profissionais — Ativo/Inativo</h3><p class="mut">Altere o status. Inativos descem para o final, não entram em Arena/Rankings ativos, mas mantêm histórico de casais, vendas e VGV na meta.</p><div class="tableWrap"><table><tr><th>Nome</th><th>Função</th><th>Equipe</th><th>Status</th><th>Alterar</th></tr>${pessoas.map((p,i)=>{let ina=['Igor','Robson','Larissa'].some(n=>p.includes(n));let fn=i%3===0?'Promotor':i%3===1?'Liner':'Fechador';let eq=['Igor','Robson','Larissa','Francisco'].some(n=>p.includes(n))?'EXTERNA':'PARK';return `<tr><td>${p}</td><td>${fn}</td><td>${eq}</td><td><span class="statusBadge ${ina?'statusOff':'statusOn'}">${ina?'🔴 Inativo':'🟢 Ativo'}</span></td><td><select onchange="alert('Status alterado visualmente. Para salvar online, habilitar update na tabela profissionais.')"><option>${ina?'Inativo':'Ativo'}</option><option>${ina?'Ativo':'Inativo'}</option></select></td></tr>`}).join('')}</table></div></div></div>`,'Central CEO','Você é o dono do projeto')}

/* ===== V46 OVERRIDES ===== */
const MONTHS_V46={
  MAIO:{label:'Maio',dias:31,diaAtual:31,casais:590,vendas:118,vgv:10030000,metaCasais:590,metaVendas:118,metaVgv:10030000,park:410,externa:180},
  JUNHO:{label:'Junho',dias:30,diaAtual:15,casais:438,vendas:117,vgv:10239064,metaCasais:720,metaVendas:180,metaVgv:15000000,park:303,externa:135}
};
state.mes=state.mes||'JUNHO';
function currentMonth(){return MONTHS_V46[state.mes]||MONTHS_V46.JUNHO}
function setMes(m){state.mes=m;renderApp()}
function monthTabs(){return `<div class="monthTabs"><button class="${state.mes==='MAIO'?'active':''}" onclick="setMes('MAIO')">📅 Maio</button><button class="${state.mes==='JUNHO'?'active':''}" onclick="setMes('JUNHO')">📅 Junho</button><span class="pill">Abas separadas: Maio não mistura com Junho</span></div>`}
function totals(){let m=currentMonth();return {casais:m.casais,vendas:m.vendas,vgv:m.vgv,park:m.park,externa:m.externa,metaCasais:m.metaCasais,metaVendas:m.metaVendas,metaVgv:m.metaVgv,dias:m.dias,diaAtual:m.diaAtual,label:m.label}}
function profileType(){return (state.user?.perfil||'PROFISSIONAL').toUpperCase()}
function canSeeAll(){return isCEO() || profileType()==='CO-CEO' || profileType()==='GESTOR'}
function shell(content,title='SX Pulse',sub='Controle de Resultado Local'){
 const proNav=`${nav('comando','🧠 Mapa IA')}${nav('meu','👤 Meu Painel')}${nav('rankings','🏆 Rankings')}${nav('arena','⚔️ Arena Fractions')}${nav('capital','🏦 Capital Fractions')}${nav('pulse','📱 SX Pulse')}${nav('agenda','📒 Agenda')}${nav('hall','🏆 Hall da Fama')}`;
 const ceoNav=`${nav('comando','🧠 Mapa IA')}${nav('exec','📊 Executivo')}${nav('rankings','🏆 Rankings')}${nav('arena','⚔️ Arena Fractions')}${nav('capital','🏦 Capital Fractions')}${nav('meu','👤 Meu Painel')}${nav('pulse','📱 SX Pulse')}${nav('hall','🏆 Hall da Fama')}${nav('agenda','📒 Agenda')}${nav('pontos','📍 Pontos')}${nav('relatorios','📈 Relatórios')}${nav('ceo','👑 Central CEO')}`;
 root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">🧠</div><div><b>SX Pulse</b><div class="mut">Controle Local</div></div></div><nav class="nav">${canSeeAll()?ceoNav:proNav}</nav><div class="profile"><div class="profileAvatar">${initials(state.user?.nome)}</div><b>${state.user?.nome||''}</b><p class="mut">${state.user?.perfil||'Profissional'} • Online</p><button class="btn full" onclick="localStorage.removeItem('sx_user');state.user=null;renderLogin()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${title}</h2><div class="mut">${sub}</div></div><div class="actions"><span class="pill">🟢 Online</span><span class="pill">${isCEO()?'👑 CEO':profileType()==='CO-CEO'?'👑 CO-CEO':'✅ Profissional'}</span><span class="pill">Versão ${APP_VERSION}</span></div></div>${content}<footer class="versionFooter"><b>SX Pulse — Capital Fractions</b><span>Versão ${APP_VERSION} • Maio e Junho separados • 1 XP Fraction = 100 pontos</span></footer></main></div>`
}
function photoCard(x,i){const medals=['🥇','🥈','🥉']; return `<div class="podiumCard"><div class="rankMedal">${medals[i]||'🏅'}</div><div class="rankPhoto">${initials(x.nome)}</div><div class="rankName">${x.nome}</div><div class="rankStats"><span>Casais ${fmt(x.casais)}</span><span>Vendas ${fmt(x.vendas)}</span><span>${money(x.vgv)}</span><span>Ef. ${x.ef?x.ef.toFixed(1):0}%</span></div></div>`}
function top3HTML(rows,key='vgv'){let top=rankBy(rows,key).slice(0,3);return `<div class="podium">${top.map(photoCard).join('')}</div>`}
function projectionHTML(){let t=totals();let ritmoCasais=t.diaAtual?Math.round(t.casais/t.diaAtual):0,ritmoVendas=t.diaAtual?Math.round(t.vendas/t.diaAtual):0,ritmoVgv=t.diaAtual?Math.round(t.vgv/t.diaAtual):0;let projCasais=ritmoCasais*t.dias,projVendas=ritmoVendas*t.dias,projVgv=ritmoVgv*t.dias;let metaOk=t.label==='Maio'?'Mês fechado':'Projeção até o fim do mês';return `<div class="grid"><div class="card pad span4"><h3>📈 ${t.label}: Projeção de Casais</h3><div class="big">${fmt(projCasais)}</div><p class="mut">${metaOk} • Atual ${fmt(t.casais)} • Meta ${fmt(t.metaCasais)}</p><div class="bar gold"><i style="width:${Math.min(100,t.casais/t.metaCasais*100)}%"></i></div></div><div class="card pad span4"><h3>🏆 ${t.label}: Projeção de Vendas</h3><div class="big">${fmt(projVendas)}</div><p class="mut">Atual ${fmt(t.vendas)} • Meta ${fmt(t.metaVendas)}</p><div class="bar"><i style="width:${Math.min(100,t.vendas/t.metaVendas*100)}%"></i></div></div><div class="card pad span4"><h3>💰 ${t.label}: Projeção de VGV</h3><div class="big">${money(projVgv)}</div><p class="mut">Atual ${money(t.vgv)} • Meta ${money(t.metaVgv)}</p><div class="bar"><i style="width:${Math.min(100,t.vgv/t.metaVgv*100)}%"></i></div></div></div>`}
function pulsadorHTML(){let t=totals();return `<div class="pulseBoard"><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso ${t.label}</div><div class="num">${fmt(t.casais)} casais</div><p class="mut">Meta: ${fmt(t.metaCasais)} • Falta ${fmt(Math.max(0,t.metaCasais-t.casais))}</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso VGV</div><div class="num">${money(t.vgv)}</div><p class="mut">Meta ${money(t.metaVgv)}</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso Equipes</div><div class="num">PARK ${t.park} x ${t.externa}</div><p class="mut">Inativos permanecem no histórico.</p></div><div class="pulseCard"><span class="pulseDot"></span><div class="lab">Pulso IA</div><div class="num">Ação sugerida</div><p class="mut">Focar nos pontos com maior eficiência hoje.</p></div></div>`}
function iaBox(){let t=totals();let falta=Math.max(0,t.metaCasais-t.casais),pct=Math.round(t.casais/t.metaCasais*100);return `<div class="iaPanel"><div class="iaHero"><h3>🧠 IA SX — leitura rápida</h3><div class="talk">${t.label}: ${fmt(t.casais)} casais, ${fmt(t.vendas)} vendas e ${money(t.vgv)} em VGV.<br><b>Meta de casais:</b> ${pct}% concluída. ${falta?`Faltam ${fmt(falta)} casais.`:'Meta concluída.'}<br><b>Próxima ação:</b> acompanhar Top 3, pontos mais fortes e manter a equipe ativa no SX Pulse.</div><div class="aiAsk"><button onclick="go('rankings')">Ver Top 3</button><button onclick="go('pontos')">Ver Pontos</button><button onclick="go('arena')">Ver Arena</button></div></div><div class="iaSteps"><div class="iaStep"><b>🎯 Foco agora</b><span class="mut">Casais, vendas e VGV do mês selecionado.</span></div><div class="iaStep"><b>🏆 Destaque visível</b><span class="mut">1º, 2º e 3º com foto/ícone em todas as áreas principais.</span></div><div class="iaStep"><b>🔒 Acesso básico</b><span class="mut">Profissionais veem apenas painel próprio, rankings, arena, capital, agenda e SX Pulse.</span></div></div></div><br>${pulsadorHTML()}${projectionHTML()}`}
function map3DHTML(){return `<div class="map3d"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="ring r4"></div><div class="core3d">🧠<small>IA SX<br>Mapa de Acesso</small></div><div class="node3d" style="left:7%;top:8%" onclick="go('${canSeeAll()?'exec':'meu'}')">📊<b>${canSeeAll()?'Executivo':'Meu Painel'}</b><small>Resultado do mês</small></div><div class="node3d" style="right:7%;top:8%" onclick="go('rankings')">🏆<b>Rankings</b><small>Top 3 em destaque</small></div><div class="node3d" style="left:3%;top:40%" onclick="go('arena')">⚔️<b>Arena Fractions</b><small>Desafios e apostas</small></div><div class="node3d" style="right:3%;top:40%" onclick="go('capital')">🏦<b>Capital Fractions</b><small>XP, mercado e extrato</small></div><div class="node3d" style="left:8%;bottom:8%" onclick="go('agenda')">📒<b>Agenda</b><small>Controle particular</small></div><div class="node3d" style="right:8%;bottom:8%" onclick="go('pulse')">📱<b>SX Pulse</b><small>Feed interno</small></div><div class="node3d" style="left:44%;top:3%" onclick="go('hall')">🏅<b>Hall da Fama</b><small>Reconhecimento</small></div><div class="node3d" style="left:44%;bottom:3%" onclick="go('${canSeeAll()?'ceo':'meu'}')">${canSeeAll()?'👑':'👤'}<b>${canSeeAll()?'Central CEO':'Meu acesso'}</b><small>${canSeeAll()?'Controle total':'Básico liberado'}</small></div></div>`}
function viewComando(){shell(`${monthTabs()}${canSeeAll()?'':'<div class="basicNote">✅ Modo básico: você vê seu painel, rankings, Arena Fractions, Capital Fractions, Agenda e SX Pulse.</div>'}${iaBox()}<br>${map3DHTML()}`,'Mapa IA SX','Mapa intuitivo com acesso por área e leitura inteligente do mês')}
function viewExec(){let t=totals(), prom=summarizeBy('promotor');shell(`${monthTabs()}${top3HTML(prom,'vgv')}<br><div class="grid">${kpi('Casais '+t.label,fmt(t.casais))}${kpi('Vendas '+t.label,fmt(t.vendas))}${kpi('VGV '+t.label,money(t.vgv),'gold')}${kpi('Meta Casais',fmt(t.metaCasais))}${kpi('PARK',fmt(t.park))}${kpi('EXTERNA',fmt(t.externa))}</div><br>${projectionHTML()}<br>${pulsadorHTML()}`,'Executivo SX','Maio separado de Junho, Top 3 em destaque e projeções corretas')}
function rankTable(rows,key='vgv'){let sorted=rankBy(rows,key);return `<div class="tableWrap"><table><tr><th>#</th><th>Foto</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Ef.</th><th>XP</th></tr>${sorted.map((x,i)=>`<tr><td>${i+1}</td><td><div class="photoMini">${i<3?['🥇','🥈','🥉'][i]:initials(x.nome)}</div></td><td>${x.nome}</td><td>${fmt(x.casais)}</td><td>${fmt(x.vendas)}</td><td>${money(x.vgv)}</td><td>${(x.ef||0).toFixed(1)}%</td><td>${fmt(x.xp)}</td></tr>`).join('')}</table></div>`}
function viewRankings(){let prom=summarizeBy('promotor'),liners=summarizeBy('liner'),closers=summarizeBy('closer');shell(`${monthTabs()}<div class="card pad span12"><h3>🏆 Top 3 Geral — visível para todos</h3>${top3HTML(prom,'vgv')}</div><br><div class="grid"><div class="card pad span6"><h3>📣 Promotores por VGV</h3>${rankTable(prom,'vgv')}</div><div class="card pad span6"><h3>📣 Promotores por Casais</h3>${rankTable(prom,'casais')}</div><div class="card pad span6"><h3>🎧 Liners por Vendas</h3>${rankTable(liners,'vendas')}</div><div class="card pad span6"><h3>🤝 Fechadores por Vendas</h3>${rankTable(closers,'vendas')}</div></div>`,'Rankings SX','Top 1, 2 e 3 com foto/ícone em destaque')}
function viewMeu(){let nome=state.user.nome||'';let me=summarizeBy('promotor').find(x=>norm(x.nome).includes(norm(nome).split(' ')[0]))||summarizeBy('promotor')[0];shell(`${monthTabs()}<div class="grid"><div class="card pad span5"><div class="rankPhoto">${initials(me.nome)}</div><h2>${me.nome}</h2><p class="mut">Seu painel básico individual</p><span class="pill">🪙 ${fmt(me.xp)} XP Fractions</span></div>${kpi('Meus Casais',me.casais)}${kpi('Minhas Vendas',me.vendas)}${kpi('Meu VGV',money(me.vgv),'gold')}<div class="card pad span6"><h3>🎯 Minha Meta</h3><p>Casais: ${me.casais}/35</p><div class="bar gold"><i style="width:${Math.min(100,me.casais/35*100)}%"></i></div><p>Vendas: ${me.vendas}/10</p><div class="bar"><i style="width:${Math.min(100,me.vendas/10*100)}%"></i></div></div><div class="card pad span6"><h3>🏅 Minhas Conquistas</h3><p>🏅 Primeira venda</p><p>🏅 Participação no ranking</p><p>⚔️ Arena Fractions liberada</p></div></div>`,'Meu Painel','Visão básica do profissional, sem comissão e sem borderô')}
function viewHall(){let prom=summarizeBy('promotor');shell(`${monthTabs()}<div class="card pad"><h3>🏅 Hall da Fama SX</h3><p class="mut">Top 1, 2 e 3 aparecem com foto/ícone para todos verem.</p>${top3HTML(prom,'vgv')}</div>`,'Hall da Fama','Reconhecimento permanente por mês')}
function viewRelatorios(){let t=totals(), prom=summarizeBy('promotor'),liners=summarizeBy('liner'),closers=summarizeBy('closer');let cards=[['Executivo '+t.label,`Casais ${fmt(t.casais)} • Vendas ${fmt(t.vendas)} • VGV ${money(t.vgv)}`,'Mês separado, sem misturar Maio com Junho.'],['PARK x EXTERNA',`PARK ${fmt(t.park)} x EXTERNA ${fmt(t.externa)}`,'Comparativo das equipes.'],['Top 3 Promotores',rankBy(prom,'vgv').slice(0,3).map(x=>x.nome).join(' • '),'Destaque visual no ranking.'],['Top Liner',`${rankBy(liners,'vendas')[0]?.nome||'-'}`,'Ranking de liners por vendas geradas.'],['Top Fechador',`${rankBy(closers,'vendas')[0]?.nome||'-'}`,'Ranking de fechadores.'],['Projeção de Meta',`${t.label} com meta ${fmt(t.metaCasais)} casais`,'Projeção corrigida por mês.'],['Pontos de captação','Filtros por período, VGV, eficiência e casais','Melhor ponto por Raphael/Francisco.'],['Capital Fractions','XP, pontos e mercado','1 XP Fraction = 100 pontos.'],['Arena Fractions',`${state.arena.length||1} aposta(s) aberta(s)`,'Várias apostas no dia com pote em custódia.']];shell(`${monthTabs()}<div class="grid">${cards.map(c=>`<div class="card pad span4 reportCard"><h3>${c[0]}</h3><div class="metric"><span>${c[1]}</span><b>✅</b></div><small>${c[2]}</small></div>`).join('')}</div>`,'Relatórios Premium','Relatórios visíveis e separados por mês')}
function viewCEO(){let pessoas=['Ana Caroline','Adriano Moreira','André Carriço','Pedro Henrique','Francisco Antonio Rodrigues','Igor Sena dos Santos','Robson Allan do Nascimento','Larissa Vitória','Marcio Alfaia','Jessica Barbosa','Daniela Moura','Rebeca Braga Pinto','Josyene Freitas','Larissa Ribeiro','Suene Cintia'];let actions=[['Aprovar acessos','Liberar ou bloquear entrada.'],['Ativar/Inativar','Mudar status sem perder histórico.'],['Editar equipe/função','PARK, EXTERNA, Promotor, Liner ou Fechador.'],['Marcel CO-CEO','Visualização geral autorizada por Raphael.'],['Metas por mês','Maio separado de Junho.'],['Regras XP','Configurar XP Fractions.'],['Mercado Fractions','Prêmios e custos.'],['Arena Fractions','Potes e desafios.'],['Definir vencedor','Liberar pote ao ganhador.'],['Mural SX','Avisos para a equipe.'],['Pontos','Ranking por ponto.'],['Relatórios','Visão executiva.']];shell(`${monthTabs()}<div class="grid"><div class="card pad span12"><h3>👑 Central CEO</h3><p>Raphael CEO Master. Marcel CO-CEO. Visualização geral somente para autorizados. Profissionais ficam no modo básico.</p></div>${actions.map(x=>`<div class="card pad span3 ceoAction"><h3>${x[0]}</h3><p>${x[1]}</p><button class="btn gold">Abrir</button></div>`).join('')}<div class="card pad span12"><h3>👤 Todos profissionais — Ativo/Inativo</h3><div class="tableWrap"><table><tr><th>Foto</th><th>Nome</th><th>Função</th><th>Equipe</th><th>Status</th><th>Alterar</th></tr>${pessoas.map((p,i)=>{let ina=['Igor','Robson','Larissa Vitória'].some(n=>p.includes(n));let fn=i%3===0?'Promotor':i%3===1?'Liner':'Fechador';let eq=['Igor','Robson','Larissa','Francisco','André'].some(n=>p.includes(n))?'EXTERNA':'PARK';return `<tr><td><div class="photoMini">${initials(p)}</div></td><td>${p}</td><td>${fn}</td><td>${eq}</td><td><span class="statusBadge ${ina?'statusOff':'statusOn'}">${ina?'🔴 Inativo':'🟢 Ativo'}</span></td><td><select><option>${ina?'Inativo':'Ativo'}</option><option>${ina?'Ativo':'Inativo'}</option></select></td></tr>`}).join('')}</table></div></div></div>`,'Central CEO','Controle do dono do projeto')}

/* ===== V47 OVERRIDES — base limpa, individual e equipes separadas ===== */
state.mes='MAIO';
const MONTHS_V47={
  MAIO:{label:'Maio',dias:31,diaAtual:31,casais:590,vendas:118,vgv:10030000,metaCasais:590,metaVendas:118,metaVgv:10030000,park:410,externa:180,fechado:true},
  JUNHO:{label:'Junho',dias:30,diaAtual:3,casais:0,vendas:0,vgv:0,metaCasais:720,metaVendas:180,metaVgv:15000000,park:0,externa:0,fechado:false,semDados:true}
};
function currentMonth(){return MONTHS_V47[state.mes]||MONTHS_V47.MAIO}
function setMes(m){state.mes=m;renderApp()}
function monthTabs(){return `<div class="monthTabs"><button class="${state.mes==='MAIO'?'active':''}" onclick="setMes('MAIO')">📅 Maio</button><button class="${state.mes==='JUNHO'?'active':''}" onclick="setMes('JUNHO')">📅 Junho</button><span class="pill">Cada mês separado, sem misturar dados</span></div>`}
function totals(){let m=currentMonth();return {casais:m.casais,vendas:m.vendas,vgv:m.vgv,park:m.park,externa:m.externa,metaCasais:m.metaCasais,metaVendas:m.metaVendas,metaVgv:m.metaVgv,dias:m.dias,diaAtual:m.diaAtual,label:m.label,semDados:!!m.semDados,fechado:!!m.fechado}}
function summarizeBy(role){let t=totals(); if(t.semDados)return []; let m={}; SAMPLE.forEach(r=>{let n=r[role]||'Sem nome'; if(!m[n])m[n]={nome:n,casais:0,vendas:0,vgv:0,cancel:0,xp:0,pontos:0,ef:0,status:'ATIVO',equipe:teamOfName(n)};m[n].casais+=r.casais||0;m[n].vendas+=r.vendas||0;m[n].vgv+=r.vgv||0;m[n].cancel+=r.cancel||0;m[n].status=r.status||m[n].status;m[n].equipe=teamOfName(n)});Object.values(m).forEach(x=>{x.ef=x.casais?x.vendas/x.casais*100:0;x.xp=xpOf(x);x.pontos=pontosOf(x)});return Object.values(m)}
function teamOfName(n){let s=norm(n); if(['FRANCISCO','ANDRE','FELIPE','IGOR','ROBSON','LARISSA VITORIA','MATHEUS DOMINGOS','JONATAS','ALEXANDRE'].some(x=>s.includes(x)))return 'EXTERNA'; return 'PARK'}
function peopleAll(){let names=['Ana Caroline','Adriano Moreira','Andre Carrico','Pedro Henrique Gomes Santos','Francisco Antonio Rodrigues','Felipe Da Silva Ribeiro','Igor Sena Dos Santos','Robson Allan Do Nascimento','Larissa Vitoria','Marcio Alfaia','Jessica Barbosa','Daniela Moura','Rebeca Braga Pinto','Josyene Freitas','Larissa Ribeiro','Suene Cintia Da Silva','Matheus Esley Silva','Matheus Domingos Santos','Raphael Bueno'];return names.map((nome,i)=>({nome,equipe:teamOfName(nome),funcao:i%3===1?'Liner':i%3===2?'Fechador':'Promotor',status:['IGOR','ROBSON','LARISSA VITORIA'].some(x=>norm(nome).includes(x))?'INATIVO':'ATIVO'}))}
function renderApp(){({comando:viewComando,exec:viewExec,park:viewPark,externa:viewExterna,individual:viewIndividual,rankings:viewRankings,arena:viewArena,capital:viewCapital,meu:viewMeu,pulse:viewPulse,hall:viewHall,agenda:viewAgenda,pontos:viewPontos,relatorios:viewRelatorios,ceo:viewCEO}[state.view]||viewComando)()}
function shell(content,title='SX Pulse',sub='Controle de Resultado Local'){
 const proNav=`${nav('comando','🧠 Mapa IA')}${nav('meu','👤 Meu Painel')}${nav('rankings','🏆 Rankings')}${nav('arena','⚔️ Arena Fractions')}${nav('capital','🏦 Capital Fractions')}${nav('pulse','📱 SX Pulse')}${nav('agenda','📒 Agenda')}${nav('hall','🏆 Hall da Fama')}`;
 const ceoNav=`${nav('comando','🧠 Mapa IA')}${nav('exec','📊 Executivo')}${nav('park','🌳 Equipe PARK')}${nav('externa','🚀 Equipe EXTERNA')}${nav('individual','👤 Individual')}${nav('rankings','🏆 Rankings')}${nav('arena','⚔️ Arena Fractions')}${nav('capital','🏦 Capital Fractions')}${nav('meu','🙋 Meu Painel')}${nav('pulse','📱 SX Pulse')}${nav('hall','🏆 Hall da Fama')}${nav('agenda','📒 Agenda')}${nav('pontos','📍 Pontos')}${nav('relatorios','📈 Relatórios')}${nav('ceo','👑 Central CEO')}`;
 root.innerHTML=`<div class="app"><aside class="side"><div class="brand"><div class="logo">🧠</div><div><b>SX Pulse</b><div class="mut">Controle Local</div></div></div><nav class="nav">${canSeeAll()?ceoNav:proNav}</nav><div class="profile"><div class="profileAvatar">${initials(state.user?.nome)}</div><b>${state.user?.nome||''}</b><p class="mut">${state.user?.perfil||'Profissional'} • Online</p><button class="btn full" onclick="localStorage.removeItem('sx_user');state.user=null;renderLogin()">Sair</button></div></aside><main class="main"><div class="top"><div><h2>${title}</h2><div class="mut">${sub}</div></div><div class="actions"><span class="pill">🟢 Online</span><span class="pill">${isCEO()?'👑 CEO':profileType()==='CO-CEO'?'👑 CO-CEO':'✅ Profissional'}</span><span class="pill">Versão ${APP_VERSION}</span></div></div>${content}<footer class="versionFooter"><b>SX Pulse — Controle Local</b><span>Versão ${APP_VERSION} • Maio e Junho separados • Profissionais no modo básico</span></footer></main></div>`
}
function emptyMonth(){let t=totals();return t.semDados?`<div class="emptyState"><b>Junho ainda sem resultados lançados.</b><br>Quando você carregar os dados de Junho, os gráficos, rankings, projeções, PARK x EXTERNA e relatórios aparecem automaticamente. Meta de Junho: ${fmt(t.metaCasais)} casais • ${fmt(t.metaVendas)} vendas • ${money(t.metaVgv)}.</div>`:''}
function projectionHTML(){let t=totals(); if(t.semDados)return `<div class="projection off"><b>📊 Projeção ${t.label}</b><br>Sem projeção ainda, porque Junho não tem resultados lançados. A projeção começa quando entrar o primeiro dia de produção.</div>`; if(t.fechado)return `<div class="projection"><b>📊 Resultado fechado de ${t.label}</b><br>${fmt(t.casais)} casais • ${fmt(t.vendas)} vendas • ${money(t.vgv)}. Meta ${t.casais>=t.metaCasais?'batida':'não batida'} em casais.</div>`;let projCasais=Math.round((t.casais/Math.max(1,t.diaAtual))*t.dias),projVendas=Math.round((t.vendas/Math.max(1,t.diaAtual))*t.dias),projVgv=Math.round((t.vgv/Math.max(1,t.diaAtual))*t.dias);return `<div class="projection"><b>📊 Projeção ${t.label}</b><br>Casais: ${fmt(projCasais)} / ${fmt(t.metaCasais)} • Vendas: ${fmt(projVendas)} / ${fmt(t.metaVendas)} • VGV: ${money(projVgv)} / ${money(t.metaVgv)}</div>`}
function iaBox(){let t=totals();return `<div class="iaPanel"><div class="iaHero"><h3>🧠 IA SX — Assistente da operação</h3><div class="talk">${t.semDados?`Junho está zerado. Nenhum resultado foi lançado ainda. A IA não vai misturar Maio com Junho.`:`${t.label}: ${fmt(t.casais)} casais, ${fmt(t.vendas)} vendas e ${money(t.vgv)} em VGV. Meta de casais em ${Math.round(t.casais/t.metaCasais*100)}%.`}<br><b>Ação rápida:</b> escolha abaixo onde quer entrar.</div><div class="aiAsk"><button onclick="go('${canSeeAll()?'exec':'meu'}')">Abrir resultado</button><button onclick="go('rankings')">Ver Top 3</button><button onclick="go('arena')">Arena</button></div></div><div class="aiCards"><div class="aiMini"><b>📅 Mês ativo</b><br>${t.label}</div><div class="aiMini"><b>🎯 Meta</b><br>${fmt(t.metaCasais)} casais</div><div class="aiMini"><b>📌 Status</b><br>${t.semDados?'Aguardando dados':'Dados carregados'}</div></div></div>`}
function top3HTML(rows,key='vgv'){if(!rows.length)return emptyMonth();let top=rankBy(rows,key).slice(0,3);return `<div class="podium">${top.map(photoCard).join('')}</div>`}
function viewExec(){let t=totals(), prom=summarizeBy('promotor');shell(`${monthTabs()}${emptyMonth()}${top3HTML(prom,'vgv')}<br><div class="grid">${kpi('Casais '+t.label,fmt(t.casais))}${kpi('Vendas '+t.label,fmt(t.vendas))}${kpi('VGV '+t.label,money(t.vgv),'gold')}${kpi('Meta Casais',fmt(t.metaCasais))}${kpi('PARK',fmt(t.park))}${kpi('EXTERNA',fmt(t.externa))}</div><br>${projectionHTML()}<br>${pulsadorHTML()}`,'Executivo SX','Maio separado de Junho. Junho só aparece com dados quando você lançar resultados.')}
function teamSummaryHTML(team){let t=totals(); if(t.semDados)return emptyMonth(); let rows=summarizeBy('promotor').filter(x=>x.equipe===team); let sum=rows.reduce((a,x)=>(a.casais+=x.casais,a.vendas+=x.vendas,a.vgv+=x.vgv,a),{casais:0,vendas:0,vgv:0});return `<div class="teamHero"><div class="card pad"><h3>${team}</h3><div class="big">${fmt(sum.casais)}</div><p class="mut">Casais</p></div><div class="card pad"><h3>Vendas</h3><div class="big">${fmt(sum.vendas)}</div></div><div class="card pad"><h3>VGV</h3><div class="big">${money(sum.vgv)}</div></div></div><div class="card pad"><h3>Ranking ${team}</h3>${rankTable(rows,'vgv')}</div>`}
function viewPark(){shell(`${monthTabs()}${teamSummaryHTML('PARK')}`,'Equipe PARK','Resultados e ranking separado da equipe PARK')}
function viewExterna(){shell(`${monthTabs()}${teamSummaryHTML('EXTERNA')}`,'Equipe EXTERNA','Resultados e ranking separado da equipe EXTERNA')}
function personCard(p){let data=summarizeBy('promotor').find(x=>norm(x.nome)===norm(p.nome))||{casais:0,vendas:0,vgv:0,xp:0,ef:0};return `<div class="card pad personCard"><div class="rankPhoto">${initials(p.nome)}</div><h3>${p.nome}</h3><div class="tagRow"><span class="teamBadge">${p.equipe}</span><span class="teamBadge">${p.funcao}</span><span class="teamBadge">${p.status==='INATIVO'?'🔴 Inativo':'🟢 Ativo'}</span></div><p class="mut">Casais ${fmt(data.casais)} • Vendas ${fmt(data.vendas)} • VGV ${money(data.vgv)}</p><button class="btn gold" onclick="alert('Perfil individual de ${p.nome}: liberado para versão com dados completos da nova base.')">Abrir perfil</button></div>`}
function viewIndividual(){let list=peopleAll();shell(`${monthTabs()}<div class="searchBox"><input placeholder="Buscar profissional, equipe, função ou status"><select><option>Todos</option><option>Ativos</option><option>Inativos</option><option>PARK</option><option>EXTERNA</option><option>Promotores</option><option>Liners</option><option>Fechadores</option></select></div><div class="personGrid">${list.map(personCard).join('')}</div>`,'Individual','Perfis individuais com foto, equipe, função, status e resultado')}
function viewRankings(){let prom=summarizeBy('promotor'),liners=summarizeBy('liner'),closers=summarizeBy('closer');shell(`${monthTabs()}<div class="card pad span12"><h3>🏆 Top 3 Geral — visível para todos</h3>${top3HTML(prom,'vgv')}</div><br><div class="grid"><div class="card pad span6"><h3>📣 Promotores por VGV</h3>${prom.length?rankTable(prom,'vgv'):emptyMonth()}</div><div class="card pad span6"><h3>📣 Promotores por Casais</h3>${prom.length?rankTable(prom,'casais'):emptyMonth()}</div><div class="card pad span6"><h3>🎧 Liners por Vendas</h3>${liners.length?rankTable(liners,'vendas'):emptyMonth()}</div><div class="card pad span6"><h3>🤝 Fechadores por Vendas</h3>${closers.length?rankTable(closers,'vendas'):emptyMonth()}</div></div>`,'Rankings SX','Promotores, Liners e Fechadores separados')}
function viewRelatorios(){let t=totals(), prom=summarizeBy('promotor'),liners=summarizeBy('liner'),closers=summarizeBy('closer');let cards=t.semDados?[['Junho sem resultado','Aguardando lançamento','Nenhuma projeção calculada ainda.'],['Meta Junho',`${fmt(t.metaCasais)} casais • ${fmt(t.metaVendas)} vendas • ${money(t.metaVgv)}`,'Pronta para acompanhar quando os dados entrarem.']]:[['Executivo '+t.label,`Casais ${fmt(t.casais)} • Vendas ${fmt(t.vendas)} • VGV ${money(t.vgv)}`,'Mês separado.'],['PARK x EXTERNA',`PARK ${fmt(t.park)} x EXTERNA ${fmt(t.externa)}`,'Equipes separadas.'],['Top 3 Promotores',rankBy(prom,'vgv').slice(0,3).map(x=>x.nome).join(' • '),'Destaque visual.'],['Top Liner',`${rankBy(liners,'vendas')[0]?.nome||'-'}`,'Liners separados.'],['Top Fechador',`${rankBy(closers,'vendas')[0]?.nome||'-'}`,'Fechadores separados.'],['Individual','Perfis completos por profissional','Foto, status, equipe, função e resultado.']];shell(`${monthTabs()}<div class="grid">${cards.map(c=>`<div class="card pad span4 reportCard"><h3>${c[0]}</h3><div class="metric"><span>${c[1]}</span><b>✅</b></div><small>${c[2]}</small></div>`).join('')}</div>`,'Relatórios Premium','Relatórios limpos por mês, equipe, função e profissional')}
function viewCEO(){let pessoas=peopleAll();let actions=[['Aprovar acessos','Liberar ou bloquear entrada.'],['Ativar/Inativar','Mudar status sem perder histórico.'],['Editar equipe/função','PARK, EXTERNA, Promotor, Liner ou Fechador.'],['Marcel CO-CEO','Visualização geral autorizada por Raphael.'],['Metas por mês','Maio separado de Junho.'],['Regras XP','Configurar XP Fractions.'],['Mercado Fractions','Prêmios e custos.'],['Arena Fractions','Potes e desafios.']];shell(`${monthTabs()}<div class="grid"><div class="card pad span12"><h3>👑 Central CEO</h3><p>Raphael CEO Master. Marcel CO-CEO. Visualização geral somente para autorizados. Profissionais ficam no básico.</p></div>${actions.map(x=>`<div class="card pad span3 ceoAction"><h3>${x[0]}</h3><p>${x[1]}</p><button class="btn gold">Abrir</button></div>`).join('')}<div class="card pad span12"><h3>👤 Todos profissionais — Ativo/Inativo</h3><div class="tableWrap"><table><tr><th>Foto</th><th>Nome</th><th>Função</th><th>Equipe</th><th>Status</th><th>Alterar</th></tr>${pessoas.map(p=>`<tr><td><div class="photoMini">${initials(p.nome)}</div></td><td>${p.nome}</td><td>${p.funcao}</td><td>${p.equipe}</td><td><span class="statusBadge ${p.status==='INATIVO'?'statusOff':'statusOn'}">${p.status==='INATIVO'?'🔴 Inativo':'🟢 Ativo'}</span></td><td><select><option>${p.status==='INATIVO'?'Inativo':'Ativo'}</option><option>${p.status==='INATIVO'?'Ativo':'Inativo'}</option></select></td></tr>`).join('')}</table></div></div></div>`,'Central CEO','Gestão básica completa')}
