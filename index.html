function salesCount(r){const st=norm(r.statusContrato);let parts=st.split("#").map(x=>x.trim()).filter(Boolean);let c=parts.filter(x=>x.includes("ATIVO")||x.includes("CANCEL")).length;if(c>0)return c;if(r.venda||r.cancelado)return 1;return 0}
function cancelCount(r){const st=norm(r.statusContrato);let parts=st.split("#").map(x=>x.trim()).filter(Boolean);let c=parts.filter(x=>x.includes("CANCEL")).length;if(c>0)return c;if(r.cancelado)return 1;return 0}
function monthOf(r){return (r.data||"").slice(5,7)==="06"?"junho":"maio"}
function junho(){return JSON.parse(localStorage.getItem("junho_records")||"[]")}
function setJunho(arr){localStorage.setItem("junho_records",JSON.stringify(arr))}
function allRecords(){return BASE_RECORDS.concat(junho())}
function records(){let arr=allRecords(); if(state.period==="maio")arr=arr.filter(r=>monthOf(r)==="maio"); if(state.period==="junho")arr=arr.filter(r=>monthOf(r)==="junho"); return arr.map(enrich)}
function enrich(r){let p=norm(r.promotor);let t=TEAM_MAP[p]; if(!t){let loc=norm(r.local); t=[ "ATIVO", loc.includes("BADEN")||loc.includes("EXTERNA")?"EXTERNA":"PARK"]} return {...r,promotorNorm:p,promotorName:title(r.promotor),equipe:t[1],situacao:t[0],vendas:salesCount(r),cancelamentos:cancelCount(r),mes:monthOf(r)}}
function aggBy(arr,key){const m={};arr.forEach(r=>{let k=key(r)||"SEM NOME"; if(!m[k])m[k]={nome:k,casais:0,vendas:0,vgv:0,cancel:0,q:0,nq:0,park:0,externa:0,rows:[]}; let a=m[k];a.casais++;a.vendas+=r.vendas;a.vgv+=+r.valor||0;a.cancel+=r.cancelamentos;if(norm(r.qualificacao)==="Q")a.q++;if(norm(r.qualificacao)==="NQ")a.nq++;if(r.equipe.includes("PARK"))a.park++;if(r.equipe.includes("EXTERNA"))a.externa++;a.rows.push(r)});return Object.values(m).map(a=>({...a,ef:a.casais?a.vendas/a.casais:0,equipe:a.park>=a.externa?"PARK":"EXTERNA"}))}
function promoters(arr=records()){return aggBy(arr,r=>r.promotorName).filter(x=>x.nome)}
function liners(arr=records()){return aggBy(arr,r=>title(r.liner)).filter(x=>x.nome&&norm(x.nome)!=="")}
function closers(arr=records()){return aggBy(arr,r=>title(r.closer)).filter(x=>x.nome&&norm(x.nome)!=="")}
function sortList(a,sort=state.sort){return [...a].sort((x,y)=>sort==="az"?x.nome.localeCompare(y.nome):sort==="casais"?y.casais-x.casais:sort==="vendas"?y.vendas-x.vendas:sort==="ef"?y.ef-x.ef:sort==="cancel"?y.cancel-x.cancel:y.vgv-x.vgv)}
function kpis(arr=records()){let casais=arr.length,vendas=arr.reduce((s,r)=>s+r.vendas,0),vgv=arr.reduce((s,r)=>s+(+r.valor||0),0),cancel=arr.reduce((s,r)=>s+r.cancelamentos,0);return {casais,vendas,vgv,cancel,ef:casais?vendas/casais:0,ticket:casais?vgv/casais:0}}

</aside><main class="main"><div class="top"><div class="title"><h2>${viewTitle()}</h2><span>Junho/2026 • PARK x EXTERNA • Ranking vivo</span></div><div class="actions"><button class="btn" onclick="render()">↻ Atualizar</button><button class="btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(location.href)">Compartilhar</button><button class="btn gold" onclick="go('junho')">+ Lançar Junho</button></div></div>${content}</main></div>`; setTimeout(drawCharts,50)}
function viewTitle(){return {executivo:"PAINEL EXECUTIVO",geral:"GERAL",park:"EQUIPE PARK",externa:"EQUIPE EXTERNA",promotores:"PROMOTORES MARKETING",liners:"LINERS",closers:"CLOSERS",rankings:"RANKING GERAL",metas:"METAS E PREMIAÇÕES",junho:"JUNHO • LANÇAMENTO DE DADOS",cancelamentos:"CANCELAMENTOS",inativos:"INATIVOS",acessos:"ACESSOS E PERMISSÕES"}[state.view]||"PAINEL"}
function go(v){state.view=v;render()}
function setPeriod(p){state.period=p;render()}
function periodBar(){return `<div class="toolbar"><button class="btn ${state.period==='all'?'gold':''}" onclick="setPeriod('all')">Tudo</button><button class="btn ${state.period==='maio'?'gold':''}" onclick="setPeriod('maio')">Maio 01-31</button><button class="btn ${state.period==='junho'?'gold':''}" onclick="setPeriod('junho')">Junho</button></div>`}
function kpiCards(arr=records()){let k=kpis(arr), goalV=15000000, goalC=720;return `<div class="grid">${[
["VGV Total",money(k.vgv),k.vgv/goalV,"green","💰"],["Casais Totais",k.casais,k.casais/goalC,"blue","👥"],["Vendas Totais",k.vendas,0.7,"purple","📋"],["Ticket Médio",money(k.ticket),0.6,"orange","💸"],["Eficiência Geral",pct(k.ef),k.ef,"green","⚡"],["Dias Restantes","17","0","gold","📆"]].map(x=>`<div class="card pad kpi ${x[3]}"><div class="lab">${x[0]}</div><div class="num">${x[1]}</div><span class="mut">${Math.min(100,(x[2]*100||45)).toFixed(1).replace('.',',')}% da meta</span><div class="mini"><div class="bar"><i style="width:${Math.min(100,(x[2]*100||45))}%"></i></div></div></div>`).join("")}</div>`}
function executive(){let arr=records(),k=kpis(arr),park=arr.filter(r=>r.equipe.includes("PARK")),ext=arr.filter(r=>r.equipe.includes("EXTERNA")),kp=kpis(park),ke=kpis(ext);let top=sortList(promoters(arr),"vgv")[0]||{};let goalV=15000000,goalC=720;let percV=Math.min(100,k.vgv/goalV*100),percC=Math.min(100,k.casais/goalC*100);return `${periodBar()}
<div class="heroLine">
 <div class="heroCard"><h3>🚀 Painel Executivo</h3><div class="big green">${money(k.vgv)}</div><div class="subtle">${k.casais} casais • ${k.vendas} vendas • eficiência ${pct(k.ef)}</div><div class="spark"></div></div>
 <div class="heroCard moneyBox"><h3>🎯 Meta Junho</h3><div class="scoreRow"><div><span class="subtle">VGV</span><b class="big goldtxt">15MM</b></div><div class="vs">${Math.round(percV)}%</div><div class="right"><span class="subtle">Casais</span><b class="big blue">720</b></div></div><div class="bar"><i style="width:${percV}%"></i></div></div>
 <div class="heroCard alertBox"><h3>👑 Destaque</h3><div class="person"><div class="avatar">${(top.nome||'A')[0]}</div><div><b>${top.nome||'-'}</b><br><span class="subtle">${top.casais||0} casais • ${money(top.vgv||0)}</span></div></div></div>
</div>
${kpiCards(arr)}
<div class="grid" style="margin-top:12px">
<div class="card pad span5"><h3 class="sectionTitle">🏆 Metas de Junho</h3><div class="grid"><div class="card pad span6"><span class="pill">🎯 Meta VGV</span><div class="big goldtxt">${money(goalV)}</div><div class="bar"><i style="width:${percV}%"></i></div><p>Falta: ${money(Math.max(0,goalV-k.vgv))}</p></div><div class="card pad span6"><span class="pill">👥 Meta Casais</span><div class="big blue">720</div><div class="bar"><i style="width:${percC}%"></i></div><p>Faltam: ${Math.max(0,goalC-k.casais)} casais</p></div><div class="card pad span3"><b>Meta diária casais</b><div class="big blue">24</div><small>Atual: ${(k.casais/30).toFixed(1)}</small></div><div class="card pad span3"><b>Meta diária VGV</b><div class="big green">${money(500000)}</div><small>Atual: ${money(k.vgv/30)}</small></div><div class="card pad span3"><b>Projeção VGV</b><div class="big green">${money(k.vgv/31*30)}</div></div><div class="card pad span3"><b>Projeção casais</b><div class="big blue">${Math.round(k.casais/31*30)}</div></div></div></div>
<div class="card pad span5"><h3 class="sectionTitle">🏆 PARK x EXTERNA</h3><div class="duel"><div><h3>🌳 PARK</h3><div class="big green">${money(kp.vgv)}</div></div><div class="vs">VS</div><div class="right"><h3>🚀 EXTERNA</h3><div class="big blue">${money(ke.vgv)}</div></div></div><table class="rank"><tr><td class="green">${kp.casais}</td><td>CASAIS</td><td class="blue right">${ke.casais}</td></tr><tr><td class="green">${kp.vendas}</td><td>VENDAS</td><td class="blue right">${ke.vendas}</td></tr><tr><td class="green">${pct(kp.ef)}</td><td>EFICIÊNCIA</td><td class="blue right">${pct(ke.ef)}</td></tr></table><h3 class="goldtxt">🏆 Equipe vencedora: ${kp.vgv>=ke.vgv?'PARK':'EXTERNA'}</h3></div>
<div class="card pad span2"><h3 class="sectionTitle">Farol da Meta</h3><canvas id="gauge"></canvas><div class="notice"><b>${percV>=100?'Meta batida':'Atenção'}</b><br>${percV>=100?'Meta de VGV concluída.':'Ritmo precisa acelerar para 15MM.'}</div></div>
<div class="card pad span6"><h3 class="sectionTitle">📈 Evolução diária</h3><canvas id="daily"></canvas></div><div class="card pad span3"><h3 class="sectionTitle">Distribuição por função</h3><canvas id="donut"></canvas></div><div class="card pad span3"><h3 class="sectionTitle">Top 5 Geral</h3>${rankTable(sortList(promoters(arr),'vgv').slice(0,5),true)}</div>
<div class="card pad span4"><h3 class="sectionTitle green">🏆 Top Promotores</h3>${rankTable(sortList(promoters(arr),'vgv').slice(0,5),true,true)}</div><div class="card pad span4"><h3 class="sectionTitle blue">📞 Top Liners</h3>${rankTable(sortList(liners(arr),'vgv').slice(0,5),true)}</div><div class="card pad span4"><h3 class="sectionTitle purple">🤝 Top Closers</h3>${rankTable(sortList(closers(arr),'vgv').slice(0,5),true)}</div>
<div class="card pad span7"><h3 class="sectionTitle">⚡ Ações rápidas</h3><div class="quick"><button class="btn gold" onclick="go('junho')">+ Lançar Dados Junho</button><button class="btn" onclick="go('rankings')">Ranking completo</button><button class="btn" onclick="go('metas')">Premiações</button><button class="btn" onclick="window.print()">Exportar PDF</button></div></div>
<div class="card pad span5"><h3 class="sectionTitle goldtxt">👑 Pulsador do mês</h3><div class="person"><div class="avatar">${(top.nome||'A')[0]}</div><div><div class="big">${top.nome||'-'}</div><p>${top.casais||0} casais • ${money(top.vgv||0)} • ${pct(top.ef||0)}</p><button class="btn gold" onclick="openPerson('${(top.nome||'').replace(/'/g,"\\'")}')">Abrir perfil</button></div></div></div></div>`}
function rankTable(list,click=true,showMeta=false){return `<div class="tableWrap"><table class="rank"><thead><tr><th>#</th><th>Nome</th><th>Casais</th><th>Vendas</th><th>VGV</th><th>Ef.</th><th>Cancel.</th>${showMeta?'<th>Meta Promotor</th>':''}</tr></thead><tbody>${list.map((x,i)=>{let meta=x.casais>=35?'🏆 R$ 2.500':x.casais>=22?'🏅 R$ 2.000':`Faltam ${Math.max(0,22-x.casais)}`;return `<tr><td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td><td>${click?`<button class="link personlink" onclick="openPerson('${x.nome.replace(/'/g,"\'")}')">${x.nome}</button>`:x.nome}</td><td>${x.casais}</td><td>${x.vendas}</td><td>${money(x.vgv)}</td><td>${pct(x.ef)}</td><td>${x.cancel}</td>${showMeta?`<td>${meta}</td>`:''}</tr>`}).join("")}</tbody></table></div>`}
function rankings(kind){let arr=records();let list= state.view==="liners"?liners(arr):state.view==="closers"?closers(arr):promoters(arr);return `${periodBar()}<div class="card pad"><div class="toolbar"><select onchange="state.sort=this.value;render()"><option value="vgv">Ranking por VGV</option><option value="casais">Ranking por Casais</option><option value="vendas">Ranking por Vendas</option><option value="ef">Ranking por Eficiência</option><option value="cancel">Ranking por Cancelamentos</option><option value="az">Ordem Alfabética A-Z</option></select><input placeholder="Buscar profissional..." oninput="filterTable(this.value)"></div>${rankTable(sortList(list),true,state.view==='promotores'||state.view==='rankings')}</div>`}
function filterTable(q){q=norm(q);document.querySelectorAll("tbody tr").forEach(tr=>tr.style.display=norm(tr.textContent).includes(q)?"":"none")}
function teamView(team){let arr=records().filter(r=>r.equipe.includes(team));return `${periodBar()}${kpiCards(arr)}<div class="grid" style="margin-top:12px"><div class="card pad span6"><h3>Top ${team}</h3>${rankTable(sortList(promoters(arr),'vgv'),true,true)}</div><div class="card pad span6"><h3>Evolução ${team}</h3><canvas id="daily"></canvas></div></div>`}
function metas(){let list=sortList(promoters(records()),"casais");let m35=list.filter(x=>x.casais>=35),m22=list.filter(x=>x.casais>=22&&x.casais<35),faltam=list.filter(x=>x.casais<22);return `${periodBar()}<div class="grid"><div class="card pad span3"><span class="pill">Meta R$ 2.000</span><div class="big">22 casais</div><p>Somente promotores</p></div><div class="card pad span3"><span class="pill">Meta R$ 2.500</span><div class="big">35 casais</div><p>Somente promotores</p></div><div class="card pad span3"><span class="pill">Bateram 35</span><div class="big goldtxt">${m35.length}</div></div><div class="card pad span3"><span class="pill">Bateram 22</span><div class="big blue">${m22.length}</div></div><div class="card pad span6"><h3>🏆 Ganharam R$ 2.500</h3>${rankTable(m35,false,true)}</div><div class="card pad span6"><h3>🏅 Ganharam R$ 2.000</h3>${rankTable(m22,false,true)}</div><div class="card pad span12"><h3>Faltam bater meta</h3>${rankTable(faltam,false,true)}</div></div>`}
function cancelamentos(){let arr=records().filter(r=>r.cancelamentos>0);return `${periodBar()}<div class="card pad"><h3>🚫 Cancelamentos</h3><table class="rank"><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Status</th><th>Qtd</th><th>VGV</th><th>Closer</th><th>Liner</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${r.data}</td><td>${r.promotorName}</td><td>${r.cliente}</td><td class="red">${r.statusContrato}</td><td>${r.cancelamentos}</td><td>${money(r.valor)}</td><td>${r.closer||'-'}</td><td>${r.liner||'-'}</td></tr>`).join("")}</tbody></table></div>`}
function inativos(){let names=Object.entries(TEAM_MAP).filter(([n,v])=>v[0]==="INATIVO").map(([n,v])=>({nome:title(n),equipe:v[1]}));return `<div class="card pad"><h3>🧊 Inativos</h3><table class="rank"><thead><tr><th>Nome</th><th>Status</th><th>Equipe</th></tr></thead><tbody>${names.map(x=>`<tr><td>${x.nome}</td><td class="red">INATIVO</td><td>${x.equipe}</td></tr>`).join("")}</tbody></table></div>`}
function pulsador(){let all=[...promoters(records()).map(x=>({...x,tipo:"Promotor"})),...liners(records()).map(x=>({...x,tipo:"Liner"})),...closers(records()).map(x=>({...x,tipo:"Closer"}))].sort((a,b)=>a.nome.localeCompare(b.nome));let selected=state.person?all.find(x=>x.nome===state.person):all[0]; state.person=selected?selected.nome:"";return `${periodBar()}<div class="card pad"><div class="toolbar"><select onchange="state.person=this.value;render()">${all.map(x=>`<option ${x.nome===state.person?'selected':''}>${x.nome}</option>`).join("")}</select><select onchange="state.role=this.value;render()"><option value="todos">Todos</option><option value="promotor">Promotores</option><option value="liner">Liners</option><option value="closer">Closers</option></select></div>${selected?profile(selected):'<p>Nenhum dado.</p>'}</div>`}
function profile(p){let rows=p.rows||[];let isProm=(p.tipo||"").toLowerCase().includes("promotor");let falta22=Math.max(0,22-p.casais),falta35=Math.max(0,35-p.casais);return `<div class="grid"><div class="span4"><div class="person"><div class="avatar">${p.nome[0]}</div><div><h2>${p.nome}</h2><span class="pill">${p.tipo||"Profissional"} • ${p.equipe}</span><p>${p.casais} casais • ${p.vendas} vendas • ${money(p.vgv)}</p>${isProm?`<div class="bar"><i style="width:${Math.min(100,p.casais/35*100)}%"></i></div><p>${p.casais>=35?'🏆 Meta R$ 2.500 batida':p.casais>=22?'🏅 Meta R$ 2.000 batida • faltam '+falta35+' p/ R$ 2.500':'Faltam '+falta22+' casais p/ R$ 2.000'}</p>`:'<p class="mut">Meta 22/35 vale somente para promotores.</p>'}</div></div></div><div class="span8 grid"><div class="card pad span3"><b>Casais</b><div class="big">${p.casais}</div></div><div class="card pad span3"><b>Vendas</b><div class="big purple">${p.vendas}</div></div><div class="card pad span3"><b>VGV</b><div class="big green">${money(p.vgv)}</div></div><div class="card pad span3"><b>Eficiência</b><div class="big blue">${pct(p.ef)}</div></div></div><div class="card pad span6"><h3>Evolução individual</h3><canvas id="personChart"></canvas></div><div class="card pad span6"><h3>Histórico</h3><div class="tableWrap"><table class="rank"><thead><tr><th>Data</th><th>Cliente</th><th>Status</th><th>VGV</th></tr></thead><tbody>${rows.slice(-20).map(r=>`<tr><td>${r.data}</td><td>${r.cliente||'-'}</td><td>${r.statusContrato||r.statusAtendimento}</td><td>${money(r.valor)}</td></tr>`).join("")}</tbody></table></div></div></div>`}
function junhoView(){return `<div class="grid"><div class="card pad span12"><h3>🗓️ Lançar dados de Junho</h3><p class="mut">Preencha e clique em adicionar. Depois use período "Tudo" para somar Maio + Junho.</p><div class="formgrid"><input id="jdata" type="date" value="2026-06-01"><input id="jpromotor" class="wide" placeholder="Promotor"><input id="jcliente" class="wide" placeholder="Cliente"><input id="jvalor" placeholder="VGV"><select id="jstatus"><option>ATIVO</option><option>ATIVO # ATIVO</option><option>ATIVO # ATIVO # ATIVO</option><option>CANCELADO</option><option>ATIVO # CANCELADO</option><option></option></select><input id="jlocal" placeholder="Local"><input id="jcloser" placeholder="Closer"><input id="jliner" placeholder="Liner"><select id="jqual"><option>Q</option><option>NQ</option></select><button class="btn gold" onclick="addJunho()">Adicionar</button></div></div><div class="card pad span12"><h3>Registros de Junho (${junho().length})</h3><button class="btn" onclick="clearJunho()">Limpar Junho</button><div style="height:10px"></div><table class="rank"><thead><tr><th>Data</th><th>Promotor</th><th>Cliente</th><th>Status</th><th>VGV</th><th>Closer</th><th>Liner</th></tr></thead><tbody>${junho().map(r=>`<tr><td>${r.data}</td><td>${r.promotor}</td><td>${r.cliente}</td><td>${r.statusContrato}</td><td>${money(r.valor)}</td><td>${r.closer}</td><td>${r.liner}</td></tr>`).join("")}</tbody></table></div></div>`}
function addJunho(){let rec={promotor:jpromotor.value,cliente:jcliente.value,valor:+(jvalor.value||"0").replace(/\D/g,""),venda:norm(jstatus.value).includes("ATIVO"),cancelado:norm(jstatus.value).includes("CANCEL"),statusContrato:jstatus.value,data:jdata.value,dataHora:jdata.value,statusAtendimento:"Junho",qualificacao:jqual.value,local:jlocal.value,closer:jcloser.value,liner:jliner.value};let arr=junho();arr.push(rec);setJunho(arr);render()}
function clearJunho(){if(confirm("Limpar todos os lançamentos de Junho?")){setJunho([]);render()}}
function acessos(){let acc=JSON.parse(localStorage.getItem("acessos")||"[]");return `<div class="grid"><div class="card pad span6"><h3>Solicitação de acesso</h3><input id="anome" placeholder="Nome"><br><br><input id="aemail" placeholder="E-mail"><br><br><input id="aemp" placeholder="Empresa"><br><br><button class="btn gold" onclick="addAcesso()">Solicitar</button></div><div class="card pad span6"><h3>Pendentes/Aprovados</h3><table class="rank"><tbody>${acc.map((a,i)=>`<tr><td>${a.nome}</td><td>${a.email}</td><td>${a.empresa}</td><td>${a.ok?'✅ Aprovado':'⏳ Pendente'}</td><td><button class="btn" onclick="toggleAcc(${i})">Aprovar</button></td></tr>`).join("")}</tbody></table></div></div>`}
function addAcesso(){let acc=JSON.parse(localStorage.getItem("acessos")||"[]");acc.push({nome:anome.value,email:aemail.value,empresa:aemp.value,ok:false});localStorage.setItem("acessos",JSON.stringify(acc));render()}
function toggleAcc(i){let acc=JSON.parse(localStorage.getItem("acessos")||"[]");acc[i].ok=!acc[i].ok;localStorage.setItem("acessos",JSON.stringify(acc));render()}
function openPerson(n){state.view="pulsador";state.person=n;render()}
function drawCharts(){charts.forEach(c=>c.destroy());charts=[];let arr=records();let days=[...Array(31)].map((_,i)=>String(i+1).padStart(2,"0"));let dayV=days.map(d=>arr.filter(r=>(r.data||"").slice(8,10)===d).reduce((s,r)=>s+(+r.valor||0),0));let dayC=days.map(d=>arr.filter(r=>(r.data||"").slice(8,10)===d).length);let ctx=$("#daily");if(ctx)charts.push(new Chart(ctx,{type:"bar",data:{labels:days,datasets:[{label:"VGV",data:dayV,yAxisID:"y"},{label:"Casais",data:dayC,type:"line",yAxisID:"y1"}]},options:{responsive:true,plugins:{legend:{labels:{color:"#cbd5e1"}}},scales:{x:{ticks:{color:"#cbd5e1"}},y:{ticks:{color:"#cbd5e1"}},y1:{position:"right",ticks:{color:"#cbd5e1"}}}}}));let dn=$("#donut");if(dn)charts.push(new Chart(dn,{type:"doughnut",data:{labels:["Promotores","Liners","Closers"],datasets:[{data:[promoters(arr).length,liners(arr).length,closers(arr).length]}]},options:{plugins:{legend:{labels:{color:"#cbd5e1"}}}}}));let gg=$("#gauge");if(gg)charts.push(new Chart(gg,{type:"doughnut",data:{labels:["Realizado","Falta"],datasets:[{data:[kpis(arr).vgv,Math.max(0,15000000-kpis(arr).vgv)]}]},options:{circumference:180,rotation:270,plugins:{legend:{display:false}}}}));let pc=$("#personChart");if(pc){let all=[...promoters(arr),...liners(arr),...closers(arr)];let p=all.find(x=>x.nome===state.person);let rows=(p&&p.rows)||[];let pv=days.map(d=>rows.filter(r=>(r.data||"").slice(8,10)===d).reduce((s,r)=>s+(+r.valor||0),0));charts.push(new Chart(pc,{type:"line",data:{labels:days,datasets:[{label:"VGV",data:pv}]},options:{plugins:{legend:{labels:{color:"#cbd5e1"}}},scales:{x:{ticks:{color:"#cbd5e1"}},y:{ticks:{color:"#cbd5e1"}}}}}))}}
function render(){let html=""; if(state.view==="executivo")html=executive(); else if(state.view==="geral")html=executive(); else if(state.view==="park")html=teamView("PARK"); else if(state.view==="externa")html=teamView("EXTERNA"); else if(["rankings","promotores","liners","closers"].includes(state.view))html=rankings(); else if(state.view==="metas")html=metas(); else if(state.view==="junho")html=junhoView(); else if(state.view==="cancelamentos")html=cancelamentos(); else if(state.view==="inativos")html=inativos(); else if(state.view==="pulsador")html=pulsador(); else if(state.view==="acessos")html=acessos(); layout(html)}
render();
</script>
